name: Keep Supabase Awake

# 每 4 分鐘執行一次（GitHub 排程最少間隔 5 分鐘，但會大致準時）
on:
  schedule:
    - cron: '*/5 * * * *'
  # 也可以手動觸發測試
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          echo "🔄 Pinging Supabase to keep awake..."
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/members?select=id&limit=1")

          if [ "$response" = "200" ]; then
            echo "✅ Supabase is awake (HTTP $response)"
          else
            echo "⚠️ Unexpected response: HTTP $response"
            exit 1
          fi
