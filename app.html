<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>顧問PRO</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#111111;--bg2:#1A1A1A;--card:#242424;--bdr:rgba(255,255,255,.08);--bdr2:rgba(255,255,255,.15);
  --inp:#2E2E2E;--inpt:#EEE;
  --t0:#FFF;--t1:#CCC;--t2:#888;--t3:#555;
  --acc:#C8511A;--acc2:#E8712A;--al:rgba(200,81,26,.12);
  --grn:#2D8A4E;--gl:rgba(45,138,78,.12);
  --red:#C04030;--rl:rgba(192,64,48,.12);
  --yel:#B88020;--yl:rgba(184,128,32,.12);
  --blu:#2A6AB8;--bl:rgba(42,106,184,.12);
  --serif:'Georgia',serif;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--t0);font-family:var(--sans);overflow-x:hidden;font-size:16px}

/* ── LAYOUT ── */
#app{height:100%;display:flex;flex-direction:column}
.page{display:none;flex:1;overflow-y:auto}
.page.active{display:flex;flex-direction:column}

/* ── AUTH PAGES ── */
.auth-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:30px 16px;width:100%;overflow-y:auto}
.auth-logo{font-size:34px;font-weight:800;margin-bottom:8px;letter-spacing:-.5px;text-align:center}
.auth-logo span{color:var(--acc)}
.auth-sub{font-size:16px;color:var(--t2);margin-bottom:24px;text-align:center}
.auth-box{background:var(--card);border:0.5px solid var(--bdr2);border-radius:16px;padding:24px 18px;width:100%;max-width:480px}
.auth-title{font-size:20px;font-weight:600;margin-bottom:20px}
.auth-tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:20px}
.auth-tab{padding:11px 8px;font-size:14px;cursor:pointer;color:var(--t2);border:0.5px solid var(--bdr);background:transparent;font-family:var(--sans);border-radius:8px;transition:all .15s;text-align:center;font-weight:400;line-height:1.3}
.auth-tab.on{color:var(--acc);border-color:var(--acc);background:var(--al);font-weight:500}
.auth-tab:hover{border-color:var(--bdr2);color:var(--t0)}
.frow{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
.flbl{font-size:16px;color:var(--t1);font-weight:500}
.fi{width:100%;padding:12px 14px;background:var(--inp);border:0.5px solid var(--bdr2);border-radius:9px;color:var(--inpt);font-size:16px;font-family:var(--sans);transition:border-color .15s;-webkit-appearance:none}
.fi:focus{outline:none;border-color:var(--acc)}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-p{width:100%;padding:12px;background:var(--acc);color:#FFF;border:none;border-radius:9px;font-size:16px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:all .2s;margin-top:4px}
.btn-p:hover{background:var(--acc2)}
.btn-p:disabled{opacity:.5;cursor:not-allowed}
.btn-sm{padding:7px 14px;background:transparent;color:var(--t1);border:0.5px solid var(--bdr2);border-radius:7px;font-size:16px;cursor:pointer;font-family:var(--sans);transition:all .15s}
.btn-sm:hover{border-color:var(--t2)}
.btn-grn{padding:8px 16px;background:var(--grn);color:#FFF;border:none;border-radius:8px;font-size:16px;font-weight:500;cursor:pointer;font-family:var(--sans)}
.auth-hint{font-size:16px;color:var(--t2);text-align:center;margin-top:14px;line-height:1.5}
.err-msg{background:var(--rl);border:0.5px solid rgba(192,64,48,.3);border-radius:7px;padding:8px 12px;font-size:16px;color:#E06050;margin-bottom:12px;display:none}
.ok-msg{background:var(--gl);border:0.5px solid rgba(45,138,78,.3);border-radius:7px;padding:8px 12px;font-size:16px;color:#50C070;margin-bottom:12px;display:none}

/* ── TOPBAR ── */
.topbar{background:var(--bg);border-bottom:0.5px solid var(--bdr);padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;flex-shrink:0}
.top-logo{font-size:17px;font-weight:800;letter-spacing:-.3px}
.top-logo span{color:var(--acc)}
.top-right{display:flex;align-items:center;gap:8px}
.badge{display:inline-block;font-size:16px;padding:3px 9px;border-radius:20px;font-weight:500}
.b-acc{background:var(--al);color:var(--acc)}
.b-grn{background:var(--gl);color:var(--grn)}
.b-red{background:var(--rl);color:var(--red)}
.b-yel{background:var(--yl);color:var(--yel)}
.b-blu{background:var(--bl);color:var(--blu)}
.b-gray{background:rgba(255,255,255,.06);color:var(--t2)}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--al);color:var(--acc);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;cursor:pointer}

/* ── BOTTOM NAV ── */
.bottom-nav{background:var(--bg);border-top:0.5px solid var(--bdr);display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 6px;cursor:pointer;border:none;background:none;font-family:var(--sans);color:var(--t3);font-size:16px;gap:3px;transition:color .15s}
.bn-item.on{color:var(--acc)}
.bn-icon{font-size:20px;line-height:1}

/* ── CONTENT ── */
.content{padding:14px 16px;flex:1}
.card{background:var(--card);border:0.5px solid var(--bdr);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.ct{font-size:16px;font-weight:600;color:var(--t0);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:5px;flex-wrap:wrap}
.ri{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:0.5px solid var(--bdr);font-size:16px;gap:6px}
.ri:last-child{border-bottom:none}
.rl{color:var(--t2);font-size:16px;flex-shrink:0;min-width:85px}
.rv{font-weight:500;color:var(--t0);text-align:right;flex:1;font-size:16px}
.sl{font-size:16px;font-weight:600;color:var(--t1);margin:10px 0 6px;padding-bottom:4px;border-bottom:0.5px solid var(--bdr)}
.ib-acc{background:var(--al);border:0.5px solid rgba(200,81,26,.3);border-radius:8px;padding:8px 11px;font-size:16px;color:var(--acc);line-height:1.5;margin-bottom:8px}
.ib-grn{background:var(--gl);border:0.5px solid rgba(45,138,78,.3);border-radius:8px;padding:8px 11px;font-size:16px;color:var(--grn);line-height:1.5;margin-bottom:8px}
.ib-red{background:var(--rl);border:0.5px solid rgba(192,64,48,.3);border-radius:8px;padding:8px 11px;font-size:16px;color:var(--red);line-height:1.5;margin-bottom:8px}
.ib-yel{background:var(--yl);border:0.5px solid rgba(184,128,32,.3);border-radius:8px;padding:8px 11px;font-size:16px;color:var(--yel);line-height:1.5;margin-bottom:8px}

/* ── STATS ── */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
.stat-card{background:var(--card);border:0.5px solid var(--bdr);border-radius:10px;padding:11px 13px}
.stat-l{font-size:16px;color:var(--t2);margin-bottom:3px}
.stat-v{font-size:24px;font-weight:700;color:var(--t0)}
.stat-s{font-size:16px;color:var(--t3);margin-top:2px}

/* ── PROB CARDS ── */
.prob-row{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:6px}
.prob-row-2{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.pcard{border:0.5px solid var(--bdr);border-radius:8px;padding:7px;text-align:center;background:var(--inp)}
.pcard-n{font-size:16px;color:var(--t3);margin-bottom:3px}
.pcard-v{font-size:16px;font-weight:700}
.pb-w{height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;margin-top:3px}
.pb-f{height:100%;border-radius:2px}
.p-red{color:var(--red)}.pb-red{background:var(--red)}
.p-yel{color:var(--yel)}.pb-yel{background:var(--yel)}
.p-grn{color:var(--grn)}.pb-grn{background:var(--grn)}
.p-lgrn{color:#259A3E}.pb-lgrn{background:#259A3E}
.p-none{color:var(--t3)}.pb-none{background:var(--bdr2)}

/* ── LEADS LIST ── */
.lead-item{background:var(--card);border:0.5px solid var(--bdr);border-radius:10px;padding:11px 13px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;display:flex;align-items:center;gap:10px}
.lead-item:hover{border-color:var(--bdr2)}
.lead-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;flex-shrink:0}
.lead-info{flex:1;min-width:0}
.lead-name{font-size:16px;font-weight:500;color:var(--t0)}
.lead-sub{font-size:16px;color:var(--t2);margin-top:2px}
.lead-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}

/* ── FORM ── */
.form-section{background:var(--card);border:0.5px solid var(--bdr);border-radius:12px;padding:14px;margin-bottom:10px}
.fs-title{font-size:16px;font-weight:600;color:var(--t1);margin-bottom:10px;padding-bottom:6px;border-bottom:0.5px solid var(--bdr);display:flex;align-items:center;gap:6px}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.frow.full{grid-column:1/-1}
.req{color:var(--acc);font-size:16px}

/* ── TOGGLE ── */
.tgl-row{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border:0.5px solid var(--bdr);border-radius:8px;margin-bottom:5px;cursor:pointer;transition:border-color .15s}
.tgl-row.opted{border-color:var(--grn)}
.tgl-row.opted-blu{border-color:var(--blu)}
.tgl-row.req-row{opacity:.7;pointer-events:none}
.tgl-info{flex:1}
.tgl-t{font-size:16px;font-weight:500;color:var(--t0)}
.tgl-s{font-size:16px;color:var(--t2);margin-top:2px;line-height:1.4}
.tgl{width:32px;height:18px;border-radius:9px;background:var(--bdr2);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;display:inline-block;margin-top:2px}
.tgl.on{background:var(--grn)}
.tgl.on-blu{background:var(--blu)}
.tgl::after{content:'';position:absolute;width:12px;height:12px;border-radius:50%;background:white;top:3px;left:3px;transition:left .2s}
.tgl.on::after,.tgl.on-blu::after{left:17px}
.tgl-lbl{font-size:16px;margin-top:3px;text-align:center;white-space:nowrap}
.all-btn{display:flex;align-items:center;gap:8px;padding:8px 11px;background:var(--gl);border:0.5px solid rgba(45,138,78,.3);border-radius:8px;cursor:pointer;margin-bottom:6px}
.all-t{font-size:16px;color:var(--grn);font-weight:500}

/* ── STEPS ── */
.steps{display:flex;align-items:center;margin-bottom:14px}
.step{display:flex;flex-direction:column;align-items:center;flex:1}
.sc{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600}
.sc-done{background:var(--grn);color:#FFF}
.sc-act{background:var(--acc);color:#FFF}
.sc-todo{background:var(--inp);color:var(--t3);border:0.5px solid var(--bdr)}
.slbl{font-size:16px;margin-top:2px;text-align:center;white-space:nowrap}
.sld{color:var(--grn)}.sla{color:var(--acc)}.slt{color:var(--t3)}
.step-line{height:0.5px;flex:1;background:var(--bdr);margin-bottom:13px}
.step-line.done{background:var(--grn)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:20px 16px 32px}
.modal-handle{width:36px;height:4px;background:var(--bdr2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:600;margin-bottom:14px}

/* ── SCORE DISPLAY ── */
.score-prop{border-radius:9px;padding:10px 12px;margin-top:8px}
.sp-ok{background:var(--gl);border:0.5px solid rgba(45,138,78,.3)}
.sp-warn{background:var(--yl);border:0.5px solid rgba(184,128,32,.3)}
.sp-bad{background:var(--rl);border:0.5px solid rgba(192,64,48,.3)}

/* ── LOADING ── */
.loading{position:fixed;inset:0;background:rgba(10,10,10,.9);z-index:300;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.loading.show{display:flex}
.spinner{width:32px;height:32px;border:2px solid var(--bdr2);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-t{font-size:16px;color:var(--t1)}

/* ── DESKTOP ── */
@media(min-width:768px){
  .page.active{flex-direction:row}
  .desktop-sidebar{width:220px;min-width:220px;background:var(--bg2);border-right:0.5px solid var(--bdr);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;overflow-y:auto;flex-shrink:0}
  .ds-logo{padding:16px 16px 12px;border-bottom:0.5px solid var(--bdr);font-size:18px;font-weight:800}
  .ds-logo span{color:var(--acc)}
  .ds-navs{padding:8px 8px 0}
  .ds-lbl{font-size:16px;color:var(--t3);padding:0 7px;margin:6px 0 3px;text-transform:uppercase;letter-spacing:.07em}
  .ds-ni{display:flex;align-items:center;gap:7px;padding:9px 11px;border-radius:8px;cursor:pointer;font-size:16px;color:var(--t2);background:transparent;border:none;font-family:var(--sans);width:100%;text-align:left;transition:all .12s}
  .ds-ni:hover{background:rgba(255,255,255,.04);color:var(--t0)}
  .ds-ni.on{background:var(--al);color:var(--acc);font-weight:500}
  .desktop-main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
  .bottom-nav{display:none}
  .topbar{display:none}
  .stat-grid{grid-template-columns:repeat(4,1fr)}
  .prob-row,.prob-row-2{grid-template-columns:repeat(6,1fr)}
}
@media(max-width:767px){
  .desktop-sidebar{display:none}
}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-t" id="loading-text">載入中…</div>
</div>

<div id="app">

<!-- ── 登入/註冊頁 ── -->
<div class="page active" id="page-auth">
  <div class="auth-wrap">
    <div class="auth-logo">顧問<span>PRO</span></div>
    <div class="auth-sub">貸款評估專業平台</div>
    <div class="auth-box">
      <div class="auth-tabs">
        <button class="auth-tab on" onclick="switchAuthTab('login',this)">登入</button>
        <button class="auth-tab" onclick="switchAuthTab('register',this)">加入成為顧問</button>
      </div>
      <div id="err-msg" class="err-msg"></div>
      <div id="ok-msg" class="ok-msg"></div>

      <!-- 登入表單 -->
      <div id="form-login">
        <div class="frow">
          <div class="flbl">Email</div>
          <input class="fi" type="email" id="login-email" placeholder="your@email.com" autocomplete="email">
        </div>
        <div class="frow">
          <div class="flbl">密碼</div>
          <input class="fi" type="password" id="login-pw" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn-p" id="login-btn" onclick="doLogin()">登入</button>
        <div class="auth-hint">還沒有帳號？點上方「加入成為顧問」</div>
      </div>

      <!-- 註冊表單 -->
      <div id="form-register" style="display:none">
        <div class="fg2">
          <div class="frow">
            <div class="flbl">姓名 <span class="req">*</span></div>
            <input class="fi" id="reg-name" placeholder="真實姓名">
          </div>
          <div class="frow">
            <div class="flbl">公司名稱</div>
            <input class="fi" id="reg-company" placeholder="可空白">
          </div>
        </div>
        <div class="frow">
          <div class="flbl">Email <span class="req">*</span></div>
          <input class="fi" type="email" id="reg-email" placeholder="your@email.com" autocomplete="email">
        </div>
        <div class="frow">
          <div class="flbl">手機號碼</div>
          <input class="fi" type="tel" id="reg-phone" placeholder="09XX-XXXXXX">
        </div>
        <div class="fg2">
          <div class="frow">
            <div class="flbl">所在縣市</div>
            <select class="fi" id="reg-city" onchange="updateDistricts()">
              <option value="">選擇縣市</option>
              <option>台北市</option><option>新北市</option><option>桃園市</option>
              <option>台中市</option><option>台南市</option><option>高雄市</option>
              <option>基隆市</option><option>新竹市</option><option>新竹縣</option>
              <option>苗栗縣</option><option>彰化縣</option><option>南投縣</option>
              <option>雲林縣</option><option>嘉義市</option><option>嘉義縣</option>
              <option>屏東縣</option><option>宜蘭縣</option><option>花蓮縣</option>
              <option>台東縣</option><option>澎湖縣</option><option>金門縣</option><option>連江縣</option>
            </select>
          </div>
          <div class="frow">
            <div class="flbl">行政區</div>
            <select class="fi" id="reg-district"><option value="">請先選縣市</option></select>
          </div>

        </div>
        <div class="frow">
          <div class="flbl">密碼 <span class="req">*</span></div>
          <input class="fi" type="password" id="reg-pw" placeholder="至少8碼英數混合" autocomplete="new-password">
        </div>

        <!-- 服務須知 -->
        <div style="background:var(--inp);border-radius:8px;padding:12px 14px;font-size:16px;color:var(--t2);line-height:1.6;max-height:100px;overflow-y:auto;margin:10px 0">
          <strong style="color:var(--t0)">會員服務須知摘要</strong><br>
          本平台供貸款顧問使用。您有義務依個資法保護客戶個人資料，不得超出授權範圍使用、不得轉售客戶資料。違規者停權並保留法律追訴權。完整條款請見服務條款頁面。
        </div>
        <div class="tgl-row opted" id="terms-row" onclick="toggleTerms()">
          <div class="tgl-info">
            <div class="tgl-t">我已閱讀並同意會員服務須知與個資保護義務</div>
            <div class="tgl-s">必要同意，不同意無法建立帳號</div>
          </div>
          <div style="text-align:center">
            <div class="tgl on" id="terms-tgl"></div>
            <div class="tgl-lbl" id="terms-lbl" style="color:var(--grn)">同意</div>
          </div>
        </div>

        <button class="btn-p" id="reg-btn" onclick="doRegister()">建立顧問帳號</button>
        <div class="auth-hint">已有帳號？點上方「登入」</div>
      </div>
    </div>
  </div>
</div>

<!-- ── 會員後台 ── -->
<div class="page" id="page-member">
  <!-- 桌機側欄 -->
  <div class="desktop-sidebar">
    <div class="ds-logo">顧問<span>PRO</span></div>
    <div class="ds-navs">
      <div class="ds-lbl">會員後台</div>
      <button class="ds-ni on" onclick="navTo('dash',this)">📊 儀表板</button>
      <button class="ds-ni" onclick="navTo('leads',this)">👥 客戶名單</button>
      <button class="ds-ni" onclick="navTo('add-lead',this)">➕ 新增客戶</button>
      <button class="ds-ni" onclick="navTo('finance',this)">💰 收支理財</button>
      <button class="ds-ni" onclick="navTo('invite',this)">🎁 邀請碼</button>
      <button class="ds-ni" onclick="navTo('calc',this)">🧮 貸款試算</button>
      <button class="ds-ni" onclick="navTo('antifraud',this)">🛡️ 詐騙辨識</button>
      <div class="ds-lbl">評估設定</div>

// 評分引擎

function calcScores(lead) {
  var salary = lead.monthly_salary || 0;
  var laborSalary = lead.labor_salary || salary;
  var hasTransfer = lead.has_salary_transfer;
  var baseSalary = hasTransfer ? salary : (laborSalary || salary);
  var ccLimit = lead.credit_card_limit || 0;
  var maxLoan = Math.max(0, baseSalary * scoreRules.salaryMultiplier - ccLimit);
  var hasCarLic = lead.has_car_license;
  var hasBikeLic = lead.has_bike_license;
  var hasAlert = ['alert','negotiation','rehabilitation','liquidation'].indexOf(lead.alert_status) >= 0;
  var ccAge = lead.credit_card_age || 'none';
  var bankRejCount = parseInt(lead.bank_reject_count) || 0;
  var finRejCount = parseInt(lead.fin_reject_count) || 0;
  var bankRej = lead.bank_recent_reject || 'none';
  var finRej = lead.finance_recent_reject || 'none';
  var R = scoreRules;

  // ── 銀行信貸 ──
  var bank = 0;
  if (hasAlert && R.bankAlertBlock) {
    bank = 0;
  } else if (bankRejCount >= 4 && R.bankRej4Block) {
    bank = 0; // 4次以上封鎖
  } else {
    bank = 40;
    if (hasTransfer) bank += R.bankTransferBonus;
    if (ccAge === '1y+') bank += R.bankCC1y;
    else if (ccAge === '6m+') bank += R.bankCC6m;
    else if (ccAge === '3m+') bank += R.bankCC3m;
    // 婉拒次數（越多扣越重）
    if (bankRejCount === 1) bank += R.bankRej1;
    else if (bankRejCount === 2) bank += R.bankRej2;
    else if (bankRejCount === 3) bank += R.bankRej3;
    // 距今時間
    if (bankRej === '<1m') bank += R.bankRejectLt1m;
    else if (bankRej === '1-3m') bank += R.bankReject1_3m;
    else if (bankRej === 'none') bank += 12;
    bank = Math.min(95, Math.max(0, bank));
  }

  // ── 汽車貸款 ──
  var car = 0;
  if (salary > 0) {
    if (hasCarLic) car += R.carLicBonus;
    car += salary >= 50000 ? 35 : salary >= 35000 ? 25 : salary >= 25000 ? 15 : 5;
    if (finRejCount === 1) car += R.finRej1;
    else if (finRejCount === 2) car += R.finRej2;
    else if (finRejCount > 2) car += R.finRejOver2;
    if (finRej === '<1m') car += R.finRejectLt1m;
    else if (finRej === 'none') car += 15;
    car = Math.min(92, Math.max(0, car));
  }

  // ── 機車貸款 ──
  var bike = 0;
  if (salary > 0) {
    if (hasBikeLic) bike += R.bikeLicBonus;
    bike += salary >= 25000 ? 40 : salary >= 18000 ? 28 : 15;
    if (finRejCount >= 2) bike += R.finRej2;
    else if (finRejCount === 1) bike += R.finRej1;
    if (finRej === '<1m') bike += R.finRejectLt1m;
    else if (finRej === 'none') bike += 15;
    bike = Math.min(95, Math.max(0, bike));
  }

  // ── 商品手機貸 ──
  var phone = 0;
  if (salary >= 22000) {
    phone = 45 + (salary >= 40000 ? 20 : salary >= 30000 ? 12 : 5);
    if (finRejCount >= 2) phone += R.finRej2;
    if (finRej === '<1m') phone += R.finRejectLt1m;
    phone = Math.min(88, Math.max(0, phone));
  }

  // ── 當鋪借貸：沒借=0不扣，有借有擔=扣借貸分，有借無擔=兩項都扣 ──
  var pawn = 0;
  var hasPawnBorrow = lead.has_pawn_borrow;
  if (hasPawnBorrow) {
    pawn = 50 + R.pawnHasBorrow;
    if (!lead.has_collateral) pawn += R.pawnNoCollateral;
    pawn = Math.max(0, pawn);
  }

  // ── 遲繳警告（任一貸款有遲繳超過1個月→呆帳警告）──
  var lateWarning = false;
  if (lead.has_overdue_over1m) lateWarning = true;

  // ── 不動產 ──
  var propRatio = null, propStatus = null;
  if (lead.has_property && lead.property_valuation) {
    var td = (lead.property_loan1||0) + (lead.property_loan2||0) + (lead.property_loan3||0);
    propRatio = parseFloat((td / lead.property_valuation * 100).toFixed(1));
    propStatus = propRatio <= propThresholds.t1 ? 'ok' : propRatio <= propThresholds.t2 ? 'warn' : 'bad';
  }

  var noSalary = (salary <= 0);
  var bankBlocked = (bank === 0 && ((hasAlert && R.bankAlertBlock) || (bankRejCount >= 4 && R.bankRej4Block)));
  var bankNoData = (bank === 0 && !bankBlocked && noSalary);
  var noPawn = !lead.has_pawn_borrow;

  return { bank:bank, car:car, bike:bike, phone:phone, pawn:pawn, propRatio:propRatio, propStatus:propStatus, maxLoan:maxLoan, lateWarning:lateWarning, bankRejBlock: (bankRejCount>=4 && R.bankRej4Block), bankBlocked:bankBlocked, bankNoData:bankNoData, noSalary:noSalary, noPawn:noPawn };
}

function scoreColor(s) {
  return s >= 80 ? 'p-lgrn' : s >= 70 ? 'p-grn' : s >= 60 ? 'p-yel' : 'p-red';
}
function scoreBarColor(s) {
  return s >= 80 ? 'pb-lgrn' : s >= 70 ? 'pb-grn' : s >= 60 ? 'pb-yel' : 'pb-red';
}

function buildProbCards(scores) {
  var items = [
    ['銀行信貸', scores.bank, 'bank'],
    ['汽車貸款', scores.car, 'fin'],
    ['機車貸款', scores.bike, 'fin'],
    ['商品手機貸', scores.phone, 'fin'],
    ['當鋪借貸', scores.pawn, 'pawn'],
  ];
  var html = '';
  items.forEach(function(item) {
    var n = item[0], s = item[1], type = item[2];
    var label, vc, bc;
    if (type === 'bank') {
      if (scores.bankBlocked) {
        label = '封鎖'; vc = 'p-red'; bc = 'pb-red';
      } else if (scores.bankNoData) {
        label = '未填薪水'; vc = 'p-none'; bc = 'pb-none';
      } else {
        label = s > 0 ? s + '%' : '—';
        vc = s > 0 ? scoreColor(s) : 'p-none';
        bc = s > 0 ? scoreBarColor(s) : 'pb-none';
      }
    } else if (type === 'fin') {
      if (scores.noSalary) {
        label = '未填薪水'; vc = 'p-none'; bc = 'pb-none';
      } else {
        label = s > 0 ? s + '%' : '無';
        vc = s > 0 ? scoreColor(s) : 'p-none';
        bc = s > 0 ? scoreBarColor(s) : 'pb-none';
      }
    } else { // pawn
      label = scores.noPawn ? '無' : (s > 0 ? s + '%' : '—');
      vc = s > 0 ? scoreColor(s) : 'p-none';
      bc = s > 0 ? scoreBarColor(s) : 'pb-none';
    }
    html += '<div class="pcard">';
    html += '<div class="pcard-n">' + n + '</div>';
    html += '<div class="pcard-v ' + vc + '">' + label + '</div>';
    html += '<div class="pb-w"><div class="pb-f ' + bc + '" style="width:' + (s||0) + '%"></div></div>';
    html += '</div>';
  });
  if (scores.propRatio !== null) {
    var col = scores.propStatus === 'ok' ? 'p-lgrn' : scores.propStatus === 'warn' ? 'p-yel' : 'p-red';
    var bcol = scores.propStatus === 'ok' ? 'pb-lgrn' : scores.propStatus === 'warn' ? 'pb-yel' : 'pb-red';
    var lbl = scores.propStatus === 'ok' ? '有效成交' : scores.propStatus === 'warn' ? '有效買賣' : '空間不足';
    html += '<div class="pcard" style="border-color:var(--grn)">';
    html += '<div class="pcard-n">不動產</div>';
    html += '<div class="pcard-v ' + col + '" style="font-size:15px">' + scores.propRatio.toFixed(1) + '%</div>';
    html += '<div class="pb-w"><div class="pb-f ' + bcol + '" style="width:' + Math.min(100, scores.propRatio) + '%"></div></div>';
    html += '<div style="font-size:12px;color:var(--grn);margin-top:2px">' + lbl + '</div>';
    html += '</div>';
  } else {
    html += '<div class="pcard" style="opacity:.4"><div class="pcard-n">不動產</div><div class="pcard-v p-none">無</div><div class="pb-w"><div class="pb-f pb-none" style="width:0%"></div></div></div>';
  }
  return '<div class="prob-row">' + html + '</div>';
}

function buildLeadItem(l, showDate) {
  var s = calcScores(l);
  var bCol = s.bank>=70?'grn':s.bank>=60?'yel':'red';
  var biCol = s.bike>=70?'grn':s.bike>=60?'yel':'red';
  var html = '<div class="lead-item" onclick="showLeadDetail(\'' + l.id + '\')">';
  html += '<div class="lead-av" style="background:var(--al);color:var(--acc)">' + (l.name||'?').charAt(0) + '</div>';
  html += '<div class="lead-info"><div class="lead-name">' + (l.name||'—') + '</div>';
  html += '<div class="lead-sub">信貸 <span style="color:var(--' + bCol + ')">' + s.bank + '%</span>';
  html += ' · 機車 <span style="color:var(--' + biCol + ')">' + s.bike + '%</span>';
  if (s.propRatio !== null) {
    var pCol = s.propStatus==='ok'?'grn':s.propStatus==='warn'?'yel':'red';
    html += ' · 不動 <span style="color:var(--' + pCol + ')">' + s.propRatio.toFixed(0) + '%</span>';
  }
  html += '</div></div>';
  html += '<div class="lead-right"><span class="badge ' + statusBadge(l.status) + '">' + statusText(l.status) + '</span>';
  if (showDate && l.created_at) html += '<span style="font-size:12px;color:var(--t3)">' + new Date(l.created_at).toLocaleDateString('zh-TW') + '</span>';
  html += '</div></div>';
  return html;
}

async function init() {
  showLoading('啟動中…');
  var params = new URLSearchParams(window.location.search);
  var ref = params.get('ref');
  if (ref) { hideLoading(); await initClientFlow(ref); return; }
  var r = await sb.auth.getSession();
  if (r.data && r.data.session) {
    currentUser = r.data.session.user;
    await loadMember();
    showPage('member');
    renderDash();
  } else {
    showPage('auth');
  }
  hideLoading();
}

async function loadMember() {
  var r = await sb.from('members').select('*').eq('id', currentUser.id).single();
  if (r.data) {
    currentMember = r.data;
    var badge = document.getElementById('plan-badge');
    if (badge) badge.textContent = r.data.plan==='pro'?'進階版':r.data.plan==='team'?'團隊版':'基本版';
    var av = document.getElementById('member-avatar');
    if (av && r.data.name) av.textContent = r.data.name.charAt(0);
  }
}

function switchAuthTab(tab, el) {
  document.querySelectorAll('.auth-tab').forEach(function(t) { t.classList.remove('on'); });
  if (el) el.classList.add('on');
  var lf = document.getElementById('form-login');
  var rf = document.getElementById('form-register');
  if (lf) lf.style.display = tab === 'login' ? 'block' : 'none';
  if (rf) rf.style.display = tab === 'register' ? 'block' : 'none';
  clearMsgs();
}

function toggleTerms() {
  termsAgreed = !termsAgreed;
  var t = document.getElementById('terms-tgl');
  var l = document.getElementById('terms-lbl');
  var r = document.getElementById('terms-row');
  if (t) t.classList.toggle('on', termsAgreed);
  if (l) { l.textContent = termsAgreed ? '同意' : '不同意'; l.style.color = termsAgreed ? 'var(--grn)' : 'var(--t3)'; }
  if (r) r.classList.toggle('opted', termsAgreed);
}

async function doLogin() {
  var email = document.getElementById('login-email').value.trim();
  var pw = document.getElementById('login-pw').value;
  if (!email || !pw) { showErr('請填寫 Email 和密碼'); return; }
  showLoading('登入中…');
  var r = await sb.auth.signInWithPassword({ email:email, password:pw });
  hideLoading();
  if (r.error) { showErr('帳號或密碼錯誤'); return; }
  currentUser = r.data.user;
  await loadMember();
  showPage('member');
  renderDash();
}

async function doRegister() {
  if (!termsAgreed) { showErr('請先同意會員服務須知'); return; }
  var name = document.getElementById('reg-name').value.trim();
  var email = document.getElementById('reg-email').value.trim();
  var pw = document.getElementById('reg-pw').value;
  var company = document.getElementById('reg-company').value.trim();
  var phone = document.getElementById('reg-phone').value.trim();
  var city = document.getElementById('reg-city').value;
  var district = document.getElementById('reg-district').value;
  if (!name) { showErr('請填寫姓名'); return; }
  if (!email) { showErr('請填寫 Email'); return; }
  if (pw.length < 8) { showErr('密碼至少需要 8 碼'); return; }
  showLoading('建立帳號中…');
  var r = await sb.auth.signUp({ email:email, password:pw });
  if (r.error) { hideLoading(); showErr('帳號建立失敗：' + r.error.message); return; }
  var invCode = name.substring(0,2).toUpperCase() + Math.random().toString(36).substring(2,6).toUpperCase() + '-' + new Date().getFullYear();
  await sb.from('members').insert({ id:r.data.user.id, email:email, name:name, company:company, phone:phone, city:city, district:district, invite_code:invCode, plan:'free' });
  hideLoading();
  showOk('帳號建立成功！請檢查 Email 確認信後登入。');
}

async function doLogout() {
  await sb.auth.signOut();
  currentUser = null; currentMember = null; leads = [];
  showPage('auth');
  switchAuthTab('login', document.querySelectorAll('.auth-tab')[0]);
}

  };
  if (renders[key]) renders[key]();
}

// 儀表板
// ══════════════════════════════
async function renderDash() {
  var el = document.getElementById('member-content');
  el.innerHTML = '<div style="text-align:center;padding:30px;color:var(--t2)">載入中…</div>';
  var r = await sb.from('leads').select('*').eq('member_id', currentUser.id).order('created_at', { ascending: false });
  leads = r.data || [];

  // ── 時間區間計算 ──
  var now = new Date();
  var thisMonthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  var lastMonthStart = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  var lastMonthEnd   = new Date(now.getFullYear(), now.getMonth(), 1);
  var lastQStart     = new Date(now.getFullYear(), now.getMonth() - 3, 1);
  var lastQEnd       = thisMonthStart;
  var lastYStart     = new Date(now.getFullYear() - 1, now.getMonth(), 1);
  var lastYEnd       = new Date(now.getFullYear(), now.getMonth(), 1);

  function inRange(l, start, end) {
    var d = new Date(l.created_at);
    return d >= start && d < end;
  }
  function countIn(arr, start, end) {
    return arr.filter(function(l) { return inRange(l, start, end); }).length;
  }
  function closedIn(arr, start, end) {
    return arr.filter(function(l) { return l.status === 'closed' && inRange(l, start, end); }).length;
  }

  // 本月
  var thisLeads  = leads.filter(function(l) { return new Date(l.created_at) >= thisMonthStart; });
  var total      = thisLeads.length;
  var closed     = thisLeads.filter(function(l) { return l.status === 'closed'; }).length;
  var pending    = thisLeads.filter(function(l) { return ['new','active','invited'].indexOf(l.status) >= 0; }).length;
  var propLeads  = thisLeads.filter(function(l) { return l.has_property; }).length;

  // 前月
  var lmLeads  = countIn(leads, lastMonthStart, lastMonthEnd);
  var lmClosed = closedIn(leads, lastMonthStart, lastMonthEnd);
  // 前季（前三個月合計）
  var lqLeads  = countIn(leads, lastQStart, lastQEnd);
  var lqClosed = closedIn(leads, lastQStart, lastQEnd);
  // 前年同期（前一年同月）
  var lyLeads  = countIn(leads, lastYStart, lastYEnd);
  var lyClosed = closedIn(leads, lastYStart, lastYEnd);

  function arrow(now, prev) {
    if (prev === 0) return now > 0 ? '<span style="color:var(--grn)">↑ 新增</span>' : '<span style="color:var(--t3)">—</span>';
    var pct = Math.round((now - prev) / prev * 100);
    var col = pct > 0 ? 'var(--grn)' : pct < 0 ? 'var(--red)' : 'var(--t3)';
    var sym = pct > 0 ? '↑' : pct < 0 ? '↓' : '→';
    return '<span style="color:' + col + '">' + sym + ' ' + Math.abs(pct) + '%</span>';
  }

  var code = currentMember ? (currentMember.invite_code || '') : '';
  var linkUrl = BASE_URL + '/app.html?ref=' + code;

  // ── 四格統計卡 ──
  var html = '<div class="stat-grid">';
  html += '<div class="stat-card"><div class="stat-l">本月名單</div><div class="stat-v">' + total + '</div><div class="stat-s">vs 前月 ' + lmLeads + ' 筆 ' + arrow(total, lmLeads) + '</div></div>';
  html += '<div class="stat-card"><div class="stat-l">本月成交</div><div class="stat-v" style="color:var(--grn)">' + closed + '</div><div class="stat-s">vs 前月 ' + lmClosed + ' 筆 ' + arrow(closed, lmClosed) + '</div></div>';
  html += '<div class="stat-card"><div class="stat-l">待跟進</div><div class="stat-v" style="color:var(--acc)">' + pending + '</div><div class="stat-s">本月進行中</div></div>';
  html += '<div class="stat-card"><div class="stat-l">不動產名單</div><div class="stat-v">' + propLeads + '</div><div class="stat-s">本月有不動產</div></div>';
  html += '</div>';

  // ── 比較區塊 ──
  html += '<div class="card"><div class="ct">業績比較</div>';
  html += '<table style="width:100%;border-collapse:collapse;font-size:14px">';
  html += '<tr style="border-bottom:0.5px solid var(--bdr);color:var(--t2)">';
  html += '<th style="text-align:left;padding:6px 4px;font-weight:400">期間</th>';
  html += '<th style="text-align:center;padding:6px 4px;font-weight:400">新增名單</th>';
  html += '<th style="text-align:center;padding:6px 4px;font-weight:400">成交數</th>';
  html += '<th style="text-align:center;padding:6px 4px;font-weight:400">vs 本月名單</th>';
  html += '</tr>';

  var rows = [
    ['本月', total, closed, null],
    ['前月', lmLeads, lmClosed, lmLeads],
    ['前三個月', lqLeads, lqClosed, lqLeads],
    ['去年同月', lyLeads, lyClosed, lyLeads],
  ];
  rows.forEach(function(row, i) {
    var bg = i === 0 ? 'background:var(--al)' : '';
    var fw = i === 0 ? 'font-weight:600' : '';
    html += '<tr style="border-bottom:0.5px solid var(--bdr);' + bg + '">';
    html += '<td style="padding:8px 4px;' + fw + '">' + row[0] + '</td>';
    html += '<td style="text-align:center;padding:8px 4px;' + fw + '">' + row[1] + '</td>';
    html += '<td style="text-align:center;padding:8px 4px;color:var(--grn);' + fw + '">' + row[2] + '</td>';
    html += '<td style="text-align:center;padding:8px 4px">' + (row[3] !== null ? arrow(total, row[3]) : '<span style="color:var(--acc)">基準月</span>') + '</td>';
    html += '</tr>';
  });
  html += '</table></div>';

  var code = currentMember ? (currentMember.invite_code || '') : '';
  var linkUrl = BASE_URL + '/app.html?ref=' + code;

  // ── 最新名單 ──
  html += '<div class="card"><div class="ct">最新名單 <button class="btn-sm" onclick="navTo(\'leads\',null)">查看全部</button></div><div id="dash-list"></div></div>';

  // ── 推廣連結 ──
  html += '<div class="card"><div class="ct">我的推廣連結</div>';
  if (!code) {
    html += '<div class="ib-yel" style="font-size:14px">⚠️ 邀請碼尚未設定，請重新登出再登入，或聯繫客服。</div>';
  } else {
    html += '<div style="background:var(--inp);border-radius:8px;padding:10px 12px;font-size:13px;font-family:monospace;color:var(--acc);word-break:break-all;margin-bottom:8px">' + linkUrl + '</div>';
    html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">';
    html += '<button class="btn-sm" onclick="copyLink()">複製連結</button>';
    html += '<button class="btn-sm" onclick="shareToLine()">分享到 LINE</button>';
    html += '<button class="btn-sm" onclick="toggleQR()">顯示 QR Code</button>';
    html += '</div>';
    html += '<div class="ib-grn" style="font-size:13px">客戶點此連結後，會進入 AI 評估六步驟流程，資料自動歸入你的名單。</div>';
  }
  html += '<div id="qr-wrap" style="display:none;text-align:center;padding:12px 0">';
  html += '<canvas id="qr-canvas" width="180" height="180" style="border-radius:8px;background:white;padding:8px"></canvas>';
  html += '<div style="font-size:13px;color:var(--t2);margin-top:6px">掃描加入顧問PRO評估</div>';
  html += '<button class="btn-sm" style="margin-top:6px" onclick="downloadQR()">下載 QR Code</button>';
  html += '</div></div>';

  el.innerHTML = html;

  var dashList = document.getElementById('dash-list');
  if (dashList) {
    if (thisLeads.length === 0) {
      dashList.innerHTML = '<div style="text-align:center;padding:20px;color:var(--t2)">本月還沒有客戶，點底部「新增」開始</div>';
    } else {
      var lhtml = '';
      thisLeads.slice(0,5).forEach(function(l) { lhtml += buildLeadItem(l, false); });
      dashList.innerHTML = lhtml;
    }
  }
}

function togglePropFields(val) {
  var el = document.getElementById("prop-section");
  if (el) el.style.display = val === "true" ? "block" : "none";
}

function updatePropRatio() {
  var pv = gi('n-prop-val');
  var p1 = gi('n-prop1-amt'), p2 = gi('n-prop2-amt'), p3 = gi('n-prop3-amt');
  var el = document.getElementById('prop-ratio-display');
  if (!el || pv <= 0) { if (el) el.innerHTML = ''; return; }
  var ratio = parseFloat(((p1 + p2 + p3) / pv * 100).toFixed(1));
  var st = ratio <= propThresholds.t1 ? 'ok' : ratio <= propThresholds.t2 ? 'warn' : 'bad';
  var col = st === 'ok' ? 'grn' : st === 'warn' ? 'yel' : 'red';
  var lbl = st === 'ok' ? '有效成交' : st === 'warn' ? '有效買賣' : '空間不足';
  el.innerHTML = '<div style="background:var(--' + col + '-l);border:0.5px solid rgba(45,138,78,.15);border-radius:8px;padding:8px 12px">' +
    '<div style="font-size:14px;font-weight:500;color:var(--' + col + ')">負債比：' + ratio + '% — ' + lbl + '</div>' +
    '<div style="font-size:12px;color:var(--t2)">合計 $' + (p1+p2+p3).toLocaleString() + ' ÷ 估價 $' + pv.toLocaleString() + '</div></div>';
}

function calcMaxLoanDisplay() {
  var sal = parseInt(gv('n-salary')) || 0;
  var labSal = parseInt(gv('n-labor-salary')) || 0;
  var hasTransfer = gv('n-transfer') === 'true';
  var ccLimit = parseInt(gv('n-cc-limit')) || 0;
  var base = hasTransfer ? sal : (labSal || sal);
  var max = base > 0 ? Math.max(0, base * scoreRules.salaryMultiplier - ccLimit) : 0;
  var el = document.getElementById('max-loan-display');
  if (el) el.textContent = max > 0 ? '$' + max.toLocaleString() : '—';
}

async function saveLead() {
  var name = gv('n-name').trim();
  if (!name) { document.getElementById('add-err').textContent='請填寫客戶姓名'; document.getElementById('add-err').style.display='block'; return; }
  document.getElementById('add-err').style.display='none';
  showLoading('儲存中…');

  var hasProp = gv('n-property') === 'true';
  var propVal = gi('n-prop-val');
  var p1 = gi('n-prop1-amt'), p2 = gi('n-prop2-amt'), p3 = gi('n-prop3-amt');
  var totalPropDebt = p1 + p2 + p3;
  var propRatio = (hasProp && propVal > 0) ? parseFloat((totalPropDebt / propVal * 100).toFixed(1)) : null;

  var payload = {
    member_id: currentUser.id, name: name,
    age: parseInt(gv('n-age')) || null, work_type: gv('n-work'),
    alert_status: gv('n-alert'), address: gv('n-addr'), huji_address: gv('n-huji'),
    required_amount: parseInt(gv('n-amount')) || null, fund_purpose: gv('n-purpose'),
    monthly_salary: parseInt(gv('n-salary')) || null,
    has_salary_transfer: gv('n-transfer') === 'true',
    labor_insurance_years: gv('n-labor'), credit_card_age: gv('n-cc'),
    has_car_license: gv('n-car-lic') === 'true', has_bike_license: gv('n-bike-lic') === 'true',
    has_property: hasProp, has_collateral: gv('n-collateral') === 'true',
    bank_recent_reject: gv('n-bank-rej'), finance_recent_reject: gv('n-fin-rej'),
    advisor_note: gv('n-note'), status: 'new',
    property_ratio: propRatio, property_valuation: hasProp ? propVal : null,
    property_loan1: p1 || null, property_loan2: p2 || null, property_loan3: p3 || null,
  };

  var r = await sb.from('leads').insert(payload).select().single();
  if (r.error) { hideLoading(); document.getElementById('add-err').textContent='儲存失敗：'+r.error.message; document.getElementById('add-err').style.display='block'; return; }

  // 收集貸款
  var loans = [];
  var typeMap = { credit:'credit', car:'car_new', bike:'bike', phone:'phone', pawn:'pawn' };
  var itypeMap = { credit:'bank', car:'finance', bike:'finance', phone:'finance', pawn:'civil' };
  Object.keys(loanCounters).forEach(function(type) {
    for (var i = 1; i <= loanCounters[type]; i++) {
      var id = type + '_' + i;
      if (!document.getElementById('row_' + id)) continue;
      var amt = parseInt(document.getElementById(id + '_amt') ? document.getElementById(id + '_amt').value : 0) || 0;
      if (amt <= 0) continue;
      var loan = { lead_id: r.data.id, loan_type: typeMap[type], institution_type: itypeMap[type], balance: amt };
      var payEl = document.getElementById(id + '_pay');
      if (payEl) loan.monthly_payment = parseInt(payEl.value) || 0;
      var instEl = document.getElementById(id + '_inst');
      if (instEl) loan.institution_name = instEl.value;
      var penEl = document.getElementById(id + '_penalty');
      if (penEl) loan.penalty_fee = parseInt(penEl.value) || 0;
      loans.push(loan);
    }
  });
  [[p1,'property_1st','bank','n-prop1'],[p2,'property_2nd','bank','n-prop2'],[p3,'property_3rd','civil','n-prop3']].forEach(function(x) {
    if (x[0] > 0) {
      var instEl = document.getElementById(x[3]+'-inst');
      var payEl = document.getElementById(x[3]+'-pay');
      var penEl = document.getElementById(x[3]+'-penalty');
      loans.push({ lead_id:r.data.id, loan_type:x[1], institution_type:x[2], balance:x[0],
        institution_name: instEl ? instEl.value : '',
        monthly_payment: payEl ? (parseInt(payEl.value)||0) : 0,
        penalty_fee: penEl ? (parseInt(penEl.value)||0) : 0 });
    }
  });
  if (loans.length > 0) await sb.from('lead_loans').insert(loans);

  loanCounters = { credit:0, car:0, bike:0, phone:0, pawn:0 };
  hideLoading();
  leads.unshift(r.data);
  showLeadDetail(r.data.id);
}

async function updateStatus(id, status) {

  var lead = leads.find(function(l) { return l.id === id; });

}

async function saveNote(id) {

function renderFinance() {
  var el = document.getElementById('member-content');
  var totalFixed = fixedExpenses.reduce(function(s,e) { return s+e.amount; }, 0);
  var today = new Date();

  var tabBtns = ['overview','expenses','remind'].map(function(t) {
    var label = t==='overview'?'本月總覽':t==='expenses'?'固定費用':'繳款提醒';
    var on = financeTab===t;
    return '<button onclick="financeTab=\'' + t + '\';renderFinance()" style="padding:6px 14px;border-radius:20px;font-size:15px;cursor:pointer;border:0.5px solid ' + (on?'var(--acc)':'var(--bdr2)') + ';background:' + (on?'var(--al)':'transparent') + ';color:' + (on?'var(--acc)':'var(--t1)') + ';font-family:var(--sans)">' + label + '</button>';
  }).join('');

  var content = '';
  if (financeTab === 'overview') {
    var revenue = 284000;
    var totalExtraIn = extraIncome.reduce(function(s,e) { return s+e.amount; }, 0);
    var totalExtraOut = extraExpenses.reduce(function(s,e) { return s+e.amount; }, 0);
    var net = revenue + totalExtraIn - totalFixed - totalExtraOut;
    content = '<div style="background:var(--card);border:0.5px solid rgba(200,81,26,.3);border-radius:12px;padding:14px;margin-bottom:10px">';
    content += '<div class="ri"><span style="color:var(--t2)">業績收入</span><span style="color:var(--grn);font-weight:600">$' + revenue.toLocaleString() + '</span></div>';
    content += '<div class="ri"><span style="color:var(--t2)">固定支出</span><span style="color:var(--red);font-weight:600">-$' + totalFixed.toLocaleString() + '</span></div>';
    content += '<div style="display:flex;justify-content:space-between;padding-top:10px;border-top:0.5px solid rgba(200,81,26,.2);margin-top:6px">';
    content += '<span style="font-size:16px;font-weight:600">本月結餘</span>';
    content += '<span style="font-size:20px;font-weight:700;color:' + (net>0?'var(--acc)':'var(--red)') + '">$' + net.toLocaleString() + '</span></div></div>';
  } else if (financeTab === 'expenses') {
    content = '<div class="card"><div class="ct">固定費用清單 <button class="btn-sm" onclick="showAddExpense()">+ 新增</button></div>';
    fixedExpenses.forEach(function(e) {
      content += '<div style="display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:0.5px solid var(--bdr)">';
      content += '<span style="font-size:20px">' + e.icon + '</span><div style="flex:1"><div style="font-size:15px;font-weight:500">' + e.name + '</div>';
      content += '<div style="font-size:13px;color:var(--t2)">每月 ' + e.due_day + ' 日</div></div>';
      content += '<div style="font-size:15px;font-weight:600;color:var(--acc)">$' + e.amount.toLocaleString() + '</div>';
      content += '<button onclick="removeExpense(' + e.id + ')" style="font-size:13px;padding:3px 8px;border-radius:5px;border:0.5px solid rgba(192,64,48,.3);background:transparent;color:var(--red);cursor:pointer;font-family:var(--sans)">刪除</button></div>';
    });
    content += '<div style="display:flex;justify-content:space-between;padding-top:10px;border-top:0.5px solid var(--bdr);margin-top:4px"><span style="color:var(--t2)">固定支出合計</span><span style="font-weight:600;color:var(--red)">-$' + totalFixed.toLocaleString() + '/月</span></div></div>';
    content += '<div id="add-expense-form" style="display:none"><div class="card"><div class="ct">新增固定費用</div>';
    content += '<div class="frow2"><div class="frow"><div class="flbl">圖示</div><input class="fi" id="exp-icon" placeholder="🏠" maxlength="2" value="💳"></div>';
    content += '<div class="frow"><div class="flbl">項目名稱</div><input class="fi" id="exp-name" placeholder="房貸"></div></div>';
    content += '<div class="frow2"><div class="frow"><div class="flbl">金額（元）</div><input class="fi" id="exp-amount" type="number" placeholder="18500" inputmode="numeric"></div>';
    content += '<div class="frow"><div class="flbl">每月幾號繳</div><input class="fi" id="exp-day" type="number" placeholder="22" min="1" max="31" inputmode="numeric"></div></div>';
    content += '<div style="display:flex;gap:6px;margin-top:6px"><button class="btn-sm" onclick="document.getElementById(\'add-expense-form\').style.display=\'none\'">取消</button>';
    content += '<button class="btn-p" onclick="saveExpense()" style="flex:1">新增</button></div></div></div>';
  } else {
    content = '<div class="card"><div class="ct">本月繳款提醒</div>';
    fixedExpenses.forEach(function(e) {
      var due = new Date(today.getFullYear(), today.getMonth(), e.due_day);
      var diff = Math.ceil((due - today) / (1000*60*60*24));
      var color = diff <= 3 ? 'red' : diff <= 7 ? 'yel' : 'grn';
      var label = diff < 0 ? '已過期' : diff === 0 ? '今天到期' : '剩 ' + diff + ' 天';
      content += '<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--' + color + '-l);border-radius:8px;margin-bottom:6px">';
      content += '<span style="font-size:20px">' + e.icon + '</span><div style="flex:1"><div style="font-size:15px;font-weight:500">' + e.name + '</div>';
      content += '<div style="font-size:13px;color:var(--t2)">每月 ' + e.due_day + ' 日 · ' + label + '</div></div>';
      content += '<span style="font-size:15px;font-weight:600;color:var(--' + color + ')">$' + e.amount.toLocaleString() + '</span></div>';
    });
    content += '</div>';
  }

  el.innerHTML = '<div style="font-size:16px;font-weight:600;margin-bottom:10px">收支理財工具</div>';
  el.innerHTML += '<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">' + tabBtns + '</div>';
  el.innerHTML += content;
}

function showAddExpense() {
  var el = document.getElementById('add-expense-form');
  if (el) el.style.display = 'block';
}
function saveExpense() {
  var icon = (document.getElementById('exp-icon') ? document.getElementById('exp-icon').value : '') || '💳';
  var name = document.getElementById('exp-name') ? document.getElementById('exp-name').value.trim() : '';
  var amount = parseInt(document.getElementById('exp-amount') ? document.getElementById('exp-amount').value : 0) || 0;
  var due_day = parseInt(document.getElementById('exp-day') ? document.getElementById('exp-day').value : 1) || 1;
  if (!name || !amount) return;
  fixedExpenses.push({ id: Date.now(), icon:icon, name:name, amount:amount, due_day:due_day, remind_days:3 });
  renderFinance();
}
function removeExpense(id) {
  fixedExpenses = fixedExpenses.filter(function(e) { return e.id !== id; });
  renderFinance();
}

  html += '<div id="calc-detail" style="margin-top:12px"></div></div>';
  html += '<div class="card"><div class="ct">各類貸款參考利率</div>';
  [['銀行信用貸款','3.5–8%'],['汽車貸款（買車）','1.9–4%'],['機車貸款','6–18%'],['商品手機貸','18–24%'],['不動產一胎','1.5–2.5%'],['不動產二胎','6–15%'],['當鋪民間借貸','36–60%']].forEach(function(r) {
    html += '<div class="ri"><span class="rl">' + r[0] + '</span><span style="color:var(--acc);font-weight:500">' + r[1] + '</span></div>';
  });

  calcLoan();

function calcLoan() {
  var amt = parseFloat(gv('calc-amt')) || 0;
  var years = parseInt(gv('calc-years')) || 3;
  var rate = parseFloat(gv('calc-rate')) || 6;
  var monthlyEl = document.getElementById('calc-monthly');
  var detailEl = document.getElementById('calc-detail');
  if (!monthlyEl) return;
  if (amt <= 0) { monthlyEl.textContent = '—'; if (detailEl) detailEl.innerHTML = ''; return; }
  var mr = rate / 100 / 12;
  var n = years * 12;
  var payment = mr === 0 ? amt / n : amt * mr * Math.pow(1+mr,n) / (Math.pow(1+mr,n)-1);
  var totalPay = payment * n;
  var totalInt = totalPay - amt;
  monthlyEl.textContent = '$' + Math.round(payment).toLocaleString();
  if (detailEl) {
    detailEl.innerHTML = '<div class="ri"><span class="rl">總還款金額</span><span class="rv">$' + Math.round(totalPay).toLocaleString() + '</span></div>';
    detailEl.innerHTML += '<div class="ri"><span class="rl">總利息支出</span><span class="rv" style="color:var(--red)">$' + Math.round(totalInt).toLocaleString() + '</span></div>';
  }
}

async function analyzeScam() {
  var desc = gv('af-desc');
  var el = document.getElementById('af-analysis');
  if (!desc || !el) return;
  el.innerHTML = '<div class="ib-yel">AI 分析中…</div>';
  try {
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:400,
        messages:[{ role:'user', content:'你是台灣貸款詐騙辨識專家。分析以下情況，給出詐騙風險（0-100%）、手法說明、建議行動。用繁體中文，格式：風險：XX%\n手法：...\n建議：...\n\n情況：' + desc }]
      })
    });
    var data = await res.json();
    var text = data.content && data.content[0] ? data.content[0].text : '無法分析';
    var riskMatch = text.match(/風險[：:]\s*(\d+)/);
    var risk = riskMatch ? parseInt(riskMatch[1]) : 50;
    var color = risk >= 70 ? 'var(--red)' : risk >= 40 ? 'var(--yel)' : 'var(--grn)';
    el.innerHTML = '<div class="card"><div class="ct">AI 分析結果</div>';
    el.innerHTML += '<div style="text-align:center;padding:16px 0"><div style="font-size:16px;color:var(--t2);margin-bottom:6px">詐騙風險評估</div>';
    el.innerHTML += '<div style="font-size:48px;font-weight:700;color:' + color + '">' + risk + '%</div></div>';
    el.innerHTML += '<div style="font-size:15px;color:var(--t1);line-height:1.7;white-space:pre-line">' + text + '</div>';
    if (risk >= 40) el.innerHTML += '<div style="margin-top:10px;text-align:center"><a href="tel:165" style="display:inline-block;padding:10px 24px;background:var(--red);color:#FFF;border-radius:8px;font-size:15px;font-weight:500;text-decoration:none">撥打 165 確認</a></div>';
    el.innerHTML += '</div>';
  } catch(e) {
    el.innerHTML = '<div class="ib-red">分析失敗，請稍後再試或直接撥打 165</div>';
  }
}

function makeConsentRow(id, key, label, sub) {
  var row = document.createElement('div'); row.className = 'tgl-row'; row.id = id;
  var isMD = ['income','labor','health'].indexOf(key) >= 0;
  row.innerHTML = '<div class="tgl-info"><div class="tgl-t">' + label + '</div>' + (sub ? '<div class="tgl-s">' + sub + '</div>' : '') + '</div>' +
    '<div style="text-align:center"><div class="tgl" id="' + id + '-t"></div><div class="tgl-lbl" id="' + id + '-l" style="color:var(--t3)">不同意</div></div>';
  row.addEventListener('click', function() {
    var t = document.getElementById(id + '-t');
    var l = document.getElementById(id + '-l');
    if (!t) return;
    var on = t.classList.contains('on') || t.classList.contains('on-blu');
    if (on) {
      t.classList.remove('on', 'on-blu');
      if (l) { l.textContent = '不同意'; l.style.color = 'var(--t3)'; }
      row.classList.remove('opted', 'opted-blu');
      clientConsents[key] = false;
    } else {
      t.classList.add(isMD ? 'on-blu' : 'on');
      if (l) { l.textContent = '同意'; l.style.color = isMD ? 'var(--blu)' : 'var(--grn)'; }
      row.classList.add(isMD ? 'opted-blu' : 'opted');
      clientConsents[key] = true;
    }
  });
  return row;
}

function calcClientLoan() {
  var amtWan = parseFloat(document.getElementById('cc-amt') ? document.getElementById('cc-amt').value : 0) || 0;
  var amt = amtWan * 10000;
  var rate = parseFloat(document.getElementById('cc-rate') ? document.getElementById('cc-rate').value : 6) || 6;
  var years = parseInt(document.getElementById('cc-years') ? document.getElementById('cc-years').value : 3) || 3;
  var mEl = document.getElementById('cc-monthly');
  var dEl = document.getElementById('cc-detail');
  if (!mEl || amt <= 0) { if (mEl) mEl.textContent = '—'; return; }
  var mr = rate / 100 / 12;
  var n = years * 12;
  var payment = mr === 0 ? amt / n : amt * mr * Math.pow(1+mr,n) / (Math.pow(1+mr,n)-1);
  var total = payment * n;
  var interest = total - amt;
  mEl.textContent = '$' + Math.round(payment).toLocaleString();
  if (dEl) dEl.innerHTML = '總還款 $' + Math.round(total).toLocaleString() + '　利息 $' + Math.round(interest).toLocaleString() + '　共 ' + n + ' 期';
}

  t.classList.toggle('on', !on);
  if (l) { l.textContent = on ? '未確認' : '確認'; l.style.color = on ? 'var(--t3)' : 'var(--grn)'; }

function toggleConsent(rowId, tglId, lblId, key) {
  var t = document.getElementById(tglId);
  var l = document.getElementById(lblId);
  var r = document.getElementById(rowId);
  if (!t) return;
  var on = t.classList.contains('on') || t.classList.contains('on-blu');
  var isMD = ['income','labor','health'].indexOf(key) >= 0;
  if (on) {
    t.classList.remove('on','on-blu');
    if (l) { l.textContent='不同意'; l.style.color='var(--t3)'; }
    if (r) r.classList.remove('opted','opted-blu');
    clientConsents[key] = false;
  } else {
    t.classList.add(isMD ? 'on-blu' : 'on');
    if (l) { l.textContent='同意'; l.style.color=isMD?'var(--blu)':'var(--grn)'; }
    if (r) r.classList.add(isMD ? 'opted-blu' : 'opted');
    clientConsents[key] = true;
  }
}

async function submitClientForm() {
  if (!clientMember) return;
  showLoading('評估中…');
  // 先存一次確保最新值都在 clientFormData
  saveClientFormData();
  // 從 clientFormData 讀（DOM 在 step5 不一定存在）
  var gf = function(id) { return clientFormData[id] || ''; };
  var g  = function(id) { var el = document.getElementById(id); return (el ? el.value : '') || gf(id); };

  var salaryWan = parseFloat(gf('c-salary')) || 0;
  var salary = salaryWan > 0 ? Math.round(salaryWan * 10000) : null;
  var ccLimitWan = parseFloat(g('c-cc-limit')) || 0;
  var ccLimitYuan = Math.round(ccLimitWan * 10000);
  var laborType = g('c-labor-type') || 'none';
  var laborYears = g('c-labor-years') || '';

  // 只送 DB 確定存在的欄位
  var payload = {
    member_id: clientMember.id,

    age: parseInt(g('c-age')) || null,
    work_type: g('c-work'),

    has_salary_transfer: payload.has_salary_transfer,

    has_collateral: payload.has_collateral,
    has_pawn_borrow: false,
    alert_status: payload.alert_status,
    bank_reject_count: 0,
    fin_reject_count: 0,
    bank_recent_reject: payload.bank_recent_reject,
    finance_recent_reject: payload.finance_recent_reject,

  var scores = calcScores(scoreData);

    backBtn.textContent = '← 返回補充資料';
    backBtn.onclick = function() { renderClientStep(3); };
    missingDiv.appendChild(backBtn);
    scoreCard.appendChild(missingDiv);
  }

  scoreCard.appendChild(disclaimer);
  el.appendChild(scoreCard);

  // 個資權利說明
  var legalDiv = document.createElement('div');
  legalDiv.className = 'ib-blu';
  legalDiv.style.fontSize = '14px';

  // ── 留言給顧問 ──

    '<div class="frow" style="margin-bottom:10px">' +
      '<div class="flbl">方便聯繫的時間</div>' +
      '<select class="fi" id="client-contact-time">' +
        '<option value="">不指定</option>' +
        '<option>早上 9–12 點</option>' +
        '<option>下午 12–15 點</option>' +

    '<div style="font-size:13px;color:var(--t3);margin-top:6px">您的聯絡資訊已包含在填寫的資料中</div>';
  el.appendChild(msgCard);

  // 送出留言按鈕
  var sendBtn = document.createElement('button');
  sendBtn.className = 'btn-p';
  sendBtn.style.marginBottom = '20px';
  sendBtn.textContent = '送出留言';

// ── 最高可貸金額計算 ──
function calcMaxLoan() {
  var salary = parseInt(document.getElementById("n-salary") ? document.getElementById("n-salary").value : 0) || 0;
  var laborSalary = parseInt(document.getElementById("n-labor-salary") ? document.getElementById("n-labor-salary").value : 0) || 0;
  var hasTransfer = document.getElementById("n-transfer") ? document.getElementById("n-transfer").value === "true" : false;
  var ccLimit = parseInt(document.getElementById("n-cc-limit") ? document.getElementById("n-cc-limit").value : 0) || 0;
  var base = hasTransfer ? salary : (laborSalary || salary);
  var max = base > 0 ? Math.max(0, base * 22 - ccLimit) : 0;
  var el = document.getElementById("max-loan-display");
  if (el) el.textContent = max > 0 ? "$" + max.toLocaleString() : "—";
}

// ── 不動產比率計算 ──
function calcPropRatio() {
  var propVal = parseInt(document.getElementById("n-prop-val") ? document.getElementById("n-prop-val").value : 0) || 0;
  var p1 = parseInt(document.getElementById("n-prop1-amt") ? document.getElementById("n-prop1-amt").value : 0) || 0;
  var p2 = parseInt(document.getElementById("n-prop2-amt") ? document.getElementById("n-prop2-amt").value : 0) || 0;
  var p3 = parseInt(document.getElementById("n-prop3-amt") ? document.getElementById("n-prop3-amt").value : 0) || 0;
  var total = p1 + p2 + p3;
  var el = document.getElementById("prop-ratio-display");
  if (!el || propVal <= 0) { if (el) el.innerHTML = ""; return; }
  var ratio = parseFloat((total / propVal * 100).toFixed(1));
  var status = ratio <= propThresholds.t1 ? "ok" : ratio <= propThresholds.t2 ? "warn" : "bad";
  var col = status === "ok" ? "grn" : status === "warn" ? "yel" : "red";
  var label = status === "ok" ? "有效成交" : status === "warn" ? "有效買賣" : "空間不足";
  el.innerHTML = "<div style='background:var(--" + col + "-l);border:0.5px solid rgba(45,138,78,.2);border-radius:8px;padding:8px 12px'>" +
    "<div style='font-size:14px;font-weight:500;color:var(--" + col + ")'>負債比：" + ratio + "% — " + label + "</div>" +
    "<div style='font-size:12px;color:var(--t2);margin-top:2px'>合計 $" + total.toLocaleString() + " ÷ 估價 $" + propVal.toLocaleString() + "</div></div>";
}

    "② 在「設定人姓名」欄位輸入：<strong style='color:var(--t0)'>" + name + "</strong><br>" +
    "③ 查詢客戶名下汽機車動產擔保登記</div>" +
    "<a href='https://onlineadmin.doj.gov.tw/AOAPS/A2/A2.aspx' target='_blank' " +
    "style='display:inline-block;padding:8px 16px;background:var(--grn);color:#FFF;border-radius:7px;font-size:14px;text-decoration:none'>前往法務部動產擔保查詢 →</a></div>" +
    "<div style='font-size:12px;color:var(--t3)'>依個資法第19條第1項第5款（客戶已同意），查詢公開登記資料。</div>";
}

// ── 判決書查詢（爬司法院公開資料）──
async function queryVerdict(leadId, name) {
  var lead = leads.find(function(l) { return l.id === leadId; });
  var el = document.getElementById("verdict-result-" + leadId);
  if (!el) return;
  var addr = lead ? (lead.address || "") : "";
  var huji = lead ? (lead.huji_address || "") : "";
  var m1 = addr.match(/^(.{2,3}[市縣])(.{2,4}[區鄉鎮])/);
  var addrCity = m1 ? m1[1] + m1[2] : "";
  var m2 = huji.match(/^(.{2,3}[市縣])(.{2,4}[區鄉鎮])/);
  var hujiCity = m2 ? m2[1] + m2[2] : "";

  el.innerHTML = "<div style='text-align:center;padding:12px;color:var(--t2)'><div class='spinner' style='margin:0 auto 8px'></div>搜尋判決書中…</div>";

  var searchUrl = "https://judgment.judicial.gov.tw/FJUD/qryresult.aspx?kw=" + encodeURIComponent(name) + "&judtype=JUDBOOK&page=1";
  try {
    var proxyUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent(searchUrl);
    var res = await fetch(proxyUrl, { signal: AbortSignal.timeout(12000) });
    if (!res.ok) throw new Error("fetch failed");
    var data = await res.json();
    var rawHtml = data.contents || "";
    var results = parseVerdicts(rawHtml, name, addrCity, hujiCity);
    showVerdictResults(el, results, name, addrCity, hujiCity, searchUrl);
  } catch(e) {
    showVerdictFallback(el, name, addrCity, hujiCity, searchUrl);
  }
  logAccess(leadId, "verdict");
}

function parseVerdicts(rawHtml, name, addrCity, hujiCity) {
  var results = { total: 0, local: [], others: [] };
  var parser = new DOMParser();
  var doc = parser.parseFromString(rawHtml, "text/html");
  var seen = {};
  doc.querySelectorAll("a").forEach(function(a) {
    var title = a.textContent.trim();
    var href = a.href || a.getAttribute("href") || "";
    if (title.length < 6 || seen[title]) return;
    if (href && (href.includes("judicial") || href.includes("jud"))) {
      seen[title] = true;
      var isLocal = (addrCity && (title.includes(addrCity.slice(0,2)) || href.includes(addrCity.slice(0,2)))) ||
                    (hujiCity && (title.includes(hujiCity.slice(0,2)) || href.includes(hujiCity.slice(0,2))));
      var item = { title: title, href: href };
      if (isLocal) results.local.push(item);
      else results.others.push(item);
    }
  });
  results.total = results.local.length + results.others.length;
  return results;
}

function showVerdictResults(el, results, name, addrCity, hujiCity, searchUrl) {
  var locStr = [addrCity, hujiCity].filter(Boolean).join("、") || "未知地址";
  var h = "";
  if (results.total === 0) {
    h = "<div class='ib-grn' style='font-size:14px'>✓ 未查到「" + name + "」相關裁判書紀錄</div>";
  } else {
    h = "<div style='display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px'>";
    h += "<span class='badge b-yel'>共 " + results.total + " 筆</span>";
    if (results.local.length > 0) h += "<span class='badge b-red'>所在地區 " + results.local.length + " 筆</span>";
    h += "</div>";
    if (results.local.length > 0) {
      h += "<div style='background:var(--rl);border:0.5px solid rgba(192,64,48,.2);border-radius:8px;padding:10px 12px;margin-bottom:8px'>";
      h += "<div style='font-size:14px;font-weight:500;color:var(--red);margin-bottom:8px'>⚠️ " + locStr + " 地區相關（" + results.local.length + " 筆）</div>";
      results.local.forEach(function(item) {
        h += "<div style='padding:6px 0;border-bottom:0.5px solid rgba(192,64,48,.15)'>";
        h += "<div style='font-size:14px;color:var(--t0)'>" + item.title + "</div>";
        h += "<a href='" + item.href + "' target='_blank' style='font-size:12px;color:var(--blu)'>查看判決書全文 →</a></div>";
      });
      h += "</div>";
    }
    if (results.others.length > 0) {
      h += "<div style='font-size:14px;font-weight:500;color:var(--t2);margin-bottom:4px'>其他地區（" + results.others.length + " 筆）</div>";
      results.others.slice(0, 5).forEach(function(item) {
        h += "<div style='padding:5px 0;border-bottom:0.5px solid var(--bdr)'>";
        h += "<div style='font-size:13px;color:var(--t1)'>" + item.title + "</div>";
        h += "<a href='" + item.href + "' target='_blank' style='font-size:12px;color:var(--blu)'>查看 →</a></div>";
      });
      if (results.others.length > 5) h += "<div style='font-size:12px;color:var(--t3);margin-top:4px'>另有 " + (results.others.length - 5) + " 筆，請至司法院查看</div>";
    }
  }
  h += "<a href='" + searchUrl + "' target='_blank' style='display:inline-block;margin-top:8px;font-size:13px;color:var(--blu)'>在司法院查看完整結果 →</a>";
  h += "<div style='font-size:12px;color:var(--t3);margin-top:4px'>依個資法第19條第1項第5款（客戶已同意），查詢公開裁判書。不影響評估分數。</div>";
  el.innerHTML = h;
}

function showVerdictFallback(el, name, addrCity, hujiCity, searchUrl) {
  var locStr = [addrCity, hujiCity].filter(Boolean).join("、");
  el.innerHTML =
    "<div style='background:var(--inp);border-radius:8px;padding:10px 12px'>" +
    "<div style='font-size:14px;font-weight:500;color:var(--t1);margin-bottom:6px'>請手動查詢</div>" +
    "<div style='font-size:13px;color:var(--t2);line-height:1.7;margin-bottom:8px'>" +
    "點下方連結，已帶入姓名「<strong style='color:var(--t0)'>" + name + "</strong>」" +
    (locStr ? "<br>篩選 <strong style='color:var(--t0)'>" + locStr + "</strong> 地區判決書" : "") +
    "</div>" +
    "<a href='" + searchUrl + "' target='_blank' " +
    "style='display:inline-block;padding:8px 16px;background:var(--yel);color:#FFF;border-radius:7px;font-size:14px;text-decoration:none'>前往司法院裁判書搜尋（已帶入姓名）→</a>" +
    "</div>";
}

init();
</script>
