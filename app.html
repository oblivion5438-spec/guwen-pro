function renderTeamOverview(el, isLeader, isAdmin) {
  var now = new Date();
  var tms  = new Date(now.getFullYear(), now.getMonth(), 1);
  var lms  = new Date(now.getFullYear(), now.getMonth()-1, 1);
  var lme  = tms;
  var lqs  = new Date(now.getFullYear(), now.getMonth()-3, 1);
  var lqe  = tms;
  var lys  = new Date(now.getFullYear()-1, now.getMonth(), 1);
  var lye  = new Date(now.getFullYear(), now.getMonth(), 1);
  // 上上月（用於前月 vs 前前月比較）
  var llms = new Date(now.getFullYear(), now.getMonth()-2, 1);
  var llme = lms;

  function closedIn(s,e) { return teamLeads.filter(function(l){return l.status==='closed'&&new Date(l.created_at)>=s&&new Date(l.created_at)<e;}); }
  function countIn(s,e)  { return teamLeads.filter(function(l){return new Date(l.created_at)>=s&&new Date(l.created_at)<e;}); }

  var thisClosed = closedIn(tms, new Date());
  var lmClosed   = closedIn(lms, lme);
  var lqClosed   = closedIn(lqs, lqe);
  var lyClosed   = closedIn(lys, lye);
  var llmClosed  = closedIn(llms, llme);

  var thisLeads  = countIn(tms, new Date());
  var lmLeads    = countIn(lms, lme);

  // 收入估算（用 dealData 實際收入 or 均值）
  var perDeal = teamCompany.revenuePerDeal || 20000;
  function sumRevenue(arr) {
    return arr.reduce(function(s,l){ var d=dealData[l.id]||{}; return s+(d.actualIncome||l.closed_amount||perDeal); },0);
  }
  var thisRev  = sumRevenue(thisClosed);
  var lmRev    = sumRevenue(lmClosed);
  var lqRev    = sumRevenue(lqClosed);
  var lyRev    = sumRevenue(lyClosed);
  var llmRev   = sumRevenue(llmClosed);

  // 支出
  var companyRate = teamCompany.companyRate !== undefined ? teamCompany.companyRate : 40;
  var totalSalary  = (teamCompany.salaries||[]).reduce(function(s,e){return s+e.amount;},0);
  var fixedExp     = teamExpenses.filter(function(e){return e.type==='fixed';});
  var varExp       = teamExpenses.filter(function(e){return e.type!=='fixed';});
  var totalFixed   = fixedExp.reduce(function(s,e){return s+e.amount;},0);
  var totalVar     = varExp.reduce(function(s,e){return s+e.amount;},0);
  var totalOpsExp  = totalFixed + totalVar; // 公司營運支出（不含薪水）
  var totalExp     = totalSalary + totalFixed + totalVar; // 全部支出（含薪水）

  // 公司實際可得收入（只算公司抽成部份）
  var thisCoRev = Math.round(thisRev * companyRate / 100);
  var lmCoRev   = Math.round(lmRev  * companyRate / 100);
  var lqCoRev   = Math.round(lqRev  * companyRate / 100);
  var lyCoRev   = Math.round(lyRev  * companyRate / 100);

  // 淨利 = 公司抽成收入 - 固定開銷 - 非固定開銷（不扣薪水）
  var thisNet  = thisCoRev - totalOpsExp;
  var lmNet    = lmCoRev  - totalOpsExp;

  function pct(n,p) {
    if (!p) return n>0?'<span style="color:var(--grn)">↑ 新增</span>':'<span style="color:var(--t3)">—</span>';
    var v=Math.round((n-p)/Math.abs(p)*100);
    return '<span style="color:'+(v>=0?'var(--grn)':'var(--red)')+'\">'+(v>=0?'↑':'↓')+Math.abs(v)+'%</span>';
  }
  function fmt(n) { return '$'+(Math.round(n)||0).toLocaleString(); }

  // ── ① 核心四格 ──
  var s4 = document.createElement('div'); s4.className = 'stat-grid'; s4.style.marginBottom='12px';
  s4.innerHTML =
    '<div class="stat-card"><div class="stat-l">本月成交</div><div class="stat-v" style="color:var(--grn)">' + thisClosed.length + '</div><div class="stat-s">vs 前月 '+lmClosed.length+' 件 '+pct(thisClosed.length,lmClosed.length)+'</div></div>' +
    '<div class="stat-card"><div class="stat-l">估算總收入</div><div class="stat-v" style="color:var(--grn);font-size:20px">'+fmt(thisRev)+'</div><div class="stat-s">'+pct(thisRev,lmRev)+' vs 前月</div></div>' +
    '<div class="stat-card"><div class="stat-l">公司抽成 ('+companyRate+'%)</div><div class="stat-v" style="color:var(--acc);font-size:20px">'+fmt(thisCoRev)+'</div><div class="stat-s">'+pct(thisCoRev,lmCoRev)+' vs 前月</div></div>' +
    '<div class="stat-card"><div class="stat-l">公司淨利</div><div class="stat-v" style="color:'+(thisNet>=0?'var(--grn)':'var(--red)')+';font-size:20px">'+fmt(thisNet)+'</div><div class="stat-s">抽成 - 營運開銷</div></div>';
  el.appendChild(s4);

  // ── ② 月/季/年比較表 ──
  var cmpCard = document.createElement('div'); cmpCard.className = 'card';
  var cmpH = '<div class="ct">📊 營收與淨利歷史比較</div><div style="font-size:12px;color:var(--t3);margin-bottom:8px">*淨利不含薪資，薪資另計</div>';
  cmpH += '<table style="width:100%;border-collapse:collapse;font-size:13px">';
  cmpH += '<tr style="border-bottom:0.5px solid var(--bdr);color:var(--t2)">';
  ['期間','成交','總收入','公司抽成','淨利*','vs本月'].forEach(function(h2){
    cmpH += '<th style="text-align:'+(h2==='期間'?'left':'right')+';padding:6px 4px;font-weight:400">'+h2+'</th>';
  });
  cmpH += '</tr>';
  [
    {label:'本月',   deals:thisClosed.length, rev:thisRev,  coRev:thisCoRev,  net:thisNet,  cmp:null,     hl:true},
    {label:'前月',   deals:lmClosed.length,   rev:lmRev,    coRev:lmCoRev,    net:lmNet,    cmp:lmRev,    hl:false},
    {label:'前季均', deals:Math.round(lqClosed.length/3*10)/10, rev:Math.round(lqRev/3), coRev:Math.round(lqCoRev/3), net:Math.round(lqCoRev/3)-totalOpsExp, cmp:lqRev/3, hl:false},
    {label:'去年同月',deals:lyClosed.length,  rev:lyRev,    coRev:lyCoRev,    net:lyCoRev-totalOpsExp, cmp:lyRev, hl:false},
  ].forEach(function(r) {
    cmpH += '<tr style="border-bottom:0.5px solid var(--bdr);'+(r.hl?'background:var(--al)':'')+'">';
    cmpH += '<td style="padding:8px 4px;'+(r.hl?'font-weight:600;color:var(--acc)':'')+'">'+r.label+'</td>';
    cmpH += '<td style="text-align:right;padding:8px 4px;color:var(--grn)">'+r.deals+'件</td>';
    cmpH += '<td style="text-align:right;padding:8px 4px">'+fmt(r.rev)+'</td>';
    cmpH += '<td style="text-align:right;padding:8px 4px;color:var(--acc)">'+fmt(r.coRev)+'</td>';
    cmpH += '<td style="text-align:right;padding:8px 4px;color:'+(r.net>=0?'var(--grn)':'var(--red)')+'">'+fmt(r.net)+'</td>';
    cmpH += '<td style="text-align:right;padding:8px 4px">'+(r.hl?'<span style="color:var(--acc)">基準</span>':pct(thisRev,r.cmp))+'</td>';
    cmpH += '</tr>';
  });
  cmpH += '</table>';
  cmpCard.innerHTML = cmpH;
  el.appendChild(cmpCard);

  // ── ③ 支出分析 ──
  // 公司淨利說明卡
  // 計算實發薪資總計（含加扣項）
  var totalFinalSalary = (teamCompany.salaries||[]).reduce(function(s,emp){
    var adj = (emp.adjustments||[]).reduce(function(a,b){return a+(parseInt(b.amount)||0);},0);
    return s + (emp.amount||0) + adj;
  }, 0);

  var netCard = document.createElement('div'); netCard.className = 'card';
  netCard.innerHTML =
    '<div class="ct">💰 公司本月收益計算</div>' +
    '<div style="font-size:12px;color:var(--t3);margin-bottom:12px">公司淨利 = 公司抽成收入 − 固定開銷 − 非固定開銷（薪資為人事成本，分開計算）</div>' +

    // 第一區：收入端
    '<div style="background:var(--gl);border-radius:8px;padding:10px 12px;margin-bottom:8px">' +
      '<div style="font-size:12px;font-weight:600;color:var(--grn);margin-bottom:6px">📥 收入端</div>' +
      '<div class="ri"><span class="rl" style="font-size:13px">本月估算總收入</span><span class="rv" style="color:var(--grn);font-weight:600">'+fmt(thisRev)+'</span></div>' +
      '<div class="ri"><span class="rl" style="font-size:13px">公司抽成比率</span><span class="rv" style="color:var(--t2)">'+companyRate+'%</span></div>' +
      '<div class="ri" style="border-top:0.5px solid rgba(45,138,78,.2);margin-top:4px;padding-top:6px"><span class="rl" style="font-weight:600">公司抽成收入</span><span class="rv" style="font-size:16px;font-weight:700;color:var(--grn)">'+fmt(thisCoRev)+'</span></div>' +
    '</div>' +

    // 第二區：公司支出（不含薪資）
    '<div style="background:var(--rl);border-radius:8px;padding:10px 12px;margin-bottom:8px">' +
      '<div style="font-size:12px;font-weight:600;color:var(--red);margin-bottom:6px">📤 公司營運支出（不含薪資）</div>' +
      '<div class="ri"><span class="rl" style="font-size:13px">固定開銷</span><span class="rv" style="color:var(--red)">− '+fmt(totalFixed)+'</span></div>' +
      '<div class="ri"><span class="rl" style="font-size:13px">非固定開銷</span><span class="rv" style="color:var(--red)">− '+fmt(totalVar)+'</span></div>' +
      '<div class="ri" style="border-top:0.5px solid rgba(192,64,48,.2);margin-top:4px;padding-top:6px"><span class="rl" style="font-weight:600">營運支出合計</span><span class="rv" style="font-size:15px;font-weight:700;color:var(--red)">− '+fmt(totalOpsExp)+'</span></div>' +
    '</div>' +

    // 公司淨利結果
    '<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:'+(thisNet>=0?'var(--gl)':'var(--rl)')+';border-radius:8px;margin-bottom:12px">' +
      '<div><div style="font-size:15px;font-weight:700;color:'+(thisNet>=0?'var(--grn)':'var(--red)')+'">公司淨利</div>' +
      '<div style="font-size:12px;color:var(--t3);margin-top:2px">抽成收入 − 固定 − 非固定</div></div>' +
      '<div style="font-size:28px;font-weight:800;color:'+(thisNet>=0?'var(--grn)':'var(--red)')+'">'+fmt(thisNet)+'</div>' +
    '</div>' +

    // 第三區：薪資（人事成本，獨立計算）
    '<div style="background:var(--inp);border:0.5px solid var(--bdr2);border-radius:8px;padding:10px 12px">' +
      '<div style="font-size:12px;font-weight:600;color:var(--t2);margin-bottom:8px">👥 員工人事成本（獨立計算，不影響上方淨利）</div>' +
      (teamCompany.salaries && teamCompany.salaries.length > 0
        ? teamCompany.salaries.map(function(emp) {
            var adj = (emp.adjustments||[]).reduce(function(a,b){return a+(parseInt(b.amount)||0);},0);
            var final2 = (emp.amount||0) + adj;
            return '<div class="ri">' +
              '<span class="rl" style="font-size:13px">'+emp.name+'（底薪 '+fmt(emp.amount)+(adj!==0?' '+(adj>0?'+':'')+adj.toLocaleString():'')+'）</span>' +
              '<span class="rv" style="color:var(--red);font-weight:500">'+fmt(final2)+'</span>' +
            '</div>';
          }).join('')
        : '<div style="font-size:13px;color:var(--t3)">尚未設定員工薪資</div>'
      ) +
      '<div style="display:flex;justify-content:space-between;padding-top:8px;border-top:0.5px solid var(--bdr);margin-top:6px">' +
        '<span style="font-weight:600;font-size:14px">本月實發薪資總計</span>' +
        '<span style="font-weight:700;font-size:16px;color:var(--red)">'+fmt(totalFinalSalary)+'</span>' +
      '</div>' +
      '<div style="font-size:12px;color:var(--t3);margin-top:6px">人事成本合計 = 薪資合計 + 加扣項</div>' +
    '</div>';
  el.appendChild(netCard);

  // 支出結構（固定+非固定）
  var expCard = document.createElement('div'); expCard.className = 'card';
  var expH = '<div class="ct">💸 公司營運開銷明細</div>';
  expH += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">';
  expH += '<div style="background:var(--rl);border-radius:8px;padding:10px;text-align:center"><div style="font-size:11px;color:var(--t2);margin-bottom:3px">固定開銷</div><div style="font-size:18px;font-weight:700;color:var(--red)">'+fmt(totalFixed)+'</div></div>';
  expH += '<div style="background:var(--rl);border-radius:8px;padding:10px;text-align:center"><div style="font-size:11px;color:var(--t2);margin-bottom:3px">非固定開銷</div><div style="font-size:18px;font-weight:700;color:var(--red)">'+fmt(totalVar)+'</div></div>';
  expH += '</div>';
  [{label:'固定開銷',amt:totalFixed,color:'#B88020'},{label:'非固定開銷',amt:totalVar,color:'#C8511A'}].forEach(function(e) {
    var p2 = totalOpsExp>0?Math.round(e.amt/totalOpsExp*100):0;
    expH += '<div style="margin-bottom:6px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px"><span style="color:var(--t2)">'+e.label+'</span><span>'+fmt(e.amt)+' ('+p2+'%)</span></div>';
    expH += '<div style="background:rgba(255,255,255,.08);border-radius:4px;height:6px"><div style="height:100%;border-radius:4px;background:'+e.color+';width:'+p2+'%"></div></div></div>';
  });
  expH += '<div style="display:flex;justify-content:space-between;padding-top:8px;border-top:0.5px solid var(--bdr);margin-top:4px"><span style="font-weight:600">營運開銷合計</span><span style="font-weight:700;color:var(--red)">'+fmt(totalOpsExp)+'</span></div>';
  expCard.innerHTML = expH;
  el.appendChild(expCard);

  // ── ④ 員工表現 vs 前月 ──
  if (isAdmin && teamMembers.length > 0) {
    var empCard = document.createElement('div'); empCard.className = 'card';
    var empH = '<div class="ct">👥 員工本月表現</div>';

    var empRows = teamMembers.map(function(tm) {
      if (!tm.members) return null;
      var name = tm.members.name;
      var mid  = tm.member_id;
      var thisDone = thisClosed.filter(function(l){return l.member_id===mid;});
      var lmDone   = lmClosed.filter(function(l){return l.member_id===mid;});
      var llmDone  = llmClosed.filter(function(l){return l.member_id===mid;});
      var thisRev2 = sumRevenue(thisDone);
      var lmRev2   = sumRevenue(lmDone);
      var salary   = (teamCompany.salaries||[]).find(function(s){return s.name===name;});
      var base     = salary ? salary.amount : 0;
      var trend    = thisDone.length > lmDone.length ? 'up' : thisDone.length < lmDone.length ? 'down' : 'flat';
      // 前月 vs 前前月趨勢（連續下滑警示）
      var dropping = lmDone.length < llmDone.length && thisDone.length < lmDone.length;
      return { name:name, role:tm.role, mid:mid, thisDone:thisDone.length, lmDone:lmDone.length, thisRev:thisRev2, lmRev:lmRev2, base:base, trend:trend, dropping:dropping };
    }).filter(Boolean).sort(function(a,b){return b.thisDone-a.thisDone;});

    empRows.forEach(function(e, i) {
      var medal = i===0&&e.thisDone>0?'🥇':i===1&&e.thisDone>0?'🥈':i===2&&e.thisDone>0?'🥉':'';
      var trendIcon = e.trend==='up'?'📈':e.trend==='down'?'📉':'➡️';
      var warn = e.dropping;
      empH += '<div style="border:0.5px solid '+(warn?'rgba(192,64,48,.4)':'var(--bdr)')+';border-radius:9px;padding:10px 12px;margin-bottom:8px;background:'+(warn?'var(--rl)':'var(--inp)')+';">';
      empH += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
      empH += '<div style="width:34px;height:34px;border-radius:50%;background:var(--al);color:var(--acc);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0">' + e.name.charAt(0) + '</div>';
      empH += '<div style="flex:1"><div style="font-size:14px;font-weight:600">' + (medal?medal+' ':'') + e.name + ' <span style="font-size:13px">' + trendIcon + '</span></div>';
      empH += '<div style="font-size:12px;color:var(--t2)">' + (e.role==='leader'?'團長':e.role==='admin'?'管理員':'成員') + (e.base?' · 底薪 $'+e.base.toLocaleString():'') + '</div></div>';
      empH += '</div>';
      empH += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px">';
      empH += '<div style="text-align:center;background:var(--bg2);border-radius:6px;padding:6px"><div style="font-size:11px;color:var(--t2);margin-bottom:2px">本月成交</div><div style="font-size:16px;font-weight:700;color:var(--grn)">'+e.thisDone+'</div></div>';
      empH += '<div style="text-align:center;background:var(--bg2);border-radius:6px;padding:6px"><div style="font-size:11px;color:var(--t2);margin-bottom:2px">前月成交</div><div style="font-size:15px;font-weight:600;color:var(--t1)">'+e.lmDone+'</div></div>';
      empH += '<div style="text-align:center;background:var(--bg2);border-radius:6px;padding:6px"><div style="font-size:11px;color:var(--t2);margin-bottom:2px">本月貢獻</div><div style="font-size:13px;font-weight:600;color:var(--acc)">'+(e.thisRev?'$'+(e.thisRev/10000).toFixed(1)+'W':'—')+'</div></div>';
      empH += '<div style="text-align:center;background:var(--bg2);border-radius:6px;padding:6px"><div style="font-size:11px;color:var(--t2);margin-bottom:2px">vs前月</div><div style="font-size:14px;font-weight:600">'+pct(e.thisDone,e.lmDone)+'</div></div>';
      empH += '</div>';
      if (warn) empH += '<div style="font-size:12px;color:var(--red);margin-top:7px">⚠️ 連續兩個月業績下滑，建議關注與追蹤</div>';
      empH += '</div>';
    });
    empCard.innerHTML = empH;
    el.appendChild(empCard);
  }

  // ── ⑤ 智慧警示 ──
  var alerts = [];
  // 業績下滑
  if (lmRev>0 && thisRev < lmRev*0.8) alerts.push({ level:'red', msg:'本月估算收入較前月下滑 '+Math.round((1-thisRev/lmRev)*100)+'%，請確認成交狀況' });
  // 淨利轉負
  if (thisNet < 0) alerts.push({ level:'red', msg:'本月淨利為負（'+fmt(thisNet)+'），支出高於公司抽成收入' });
  // 支出超過收入60%
  if (thisCoRev>0 && totalExp/thisCoRev > 0.8) alerts.push({ level:'yel', msg:'總支出佔公司抽成收入的 '+Math.round(totalExp/thisCoRev*100)+'%，支出比重偏高' });
  // 非固定開銷偏高
  if (totalVar>0 && totalExp>0 && totalVar/totalExp > 0.4) alerts.push({ level:'yel', msg:'非固定開銷佔總支出 '+Math.round(totalVar/totalExp*100)+'%，建議檢視雜項支出' });
  // 季度下滑
  if (lqRev>0 && thisRev < lqRev/3*0.8) alerts.push({ level:'yel', msg:'本月收入低於前季月均 '+Math.round((1-thisRev/(lqRev/3))*100)+'%，留意業績趨勢' });
  // 員工連續下滑
  var droppingCount = (isAdmin ? teamMembers : []).filter(function(tm) {
    if (!tm.members) return false;
    var mid=tm.member_id;
    return lmClosed.filter(function(l){return l.member_id===mid;}).length < llmClosed.filter(function(l){return l.member_id===mid;}).length &&
           thisClosed.filter(function(l){return l.member_id===mid;}).length < lmClosed.filter(function(l){return l.member_id===mid;}).length;
  }).length;
  if (droppingCount>0) alerts.push({ level:'yel', msg: droppingCount+'位員工連續兩個月業績下滑，建議個別追蹤' });

  if (alerts.length > 0) {
    var alertCard = document.createElement('div'); alertCard.className = 'card';
    var alertH = '<div class="ct">🚨 智慧警示</div>';
    alerts.forEach(function(a) {
      alertH += '<div style="display:flex;gap:8px;align-items:flex-start;padding:9px 10px;background:var(--'+a.level+'l);border:0.5px solid rgba('+(a.level==='red'?'192,64,48':'184,128,32')+',.3);border-radius:8px;margin-bottom:6px">';
      alertH += '<span style="font-size:18px;flex-shrink:0">'+(a.level==='red'?'🔴':'🟡')+'</span>';
      alertH += '<span style="font-size:13px;color:var(--t1);line-height:1.5">'+a.msg+'</span></div>';
    });
    alertCard.innerHTML = alertH;
    el.appendChild(alertCard);
  }

  // ── ⑥ 名單統計 ──
  var statCard = document.createElement('div'); statCard.className = 'card';
  statCard.innerHTML =
    '<div class="ct">📋 本月名單統計</div>' +
    '<div class="ri"><span class="rl">新增名單</span><span class="rv">'+thisLeads.length+' 筆 '+pct(thisLeads.length,lmLeads.length)+' vs 前月</span></div>' +
    '<div class="ri"><span class="rl">成交件數</span><span class="rv" style="color:var(--grn)">'+thisClosed.length+' 件</span></div>' +
    '<div class="ri"><span class="rl">轉換率</span><span class="rv">'+(thisLeads.length?Math.round(thisClosed.length/thisLeads.length*100):0)+'%</span></div>' +
    '<div class="ri"><span class="rl">團隊成員</span><span class="rv">'+teamMembers.length+' 人</span></div>' +
    '<div class="ri"><span class="rl">累計客戶</span><span class="rv">'+teamLeads.length+' 筆</span></div>';
  el.appendChild(statCard);
}

function renderTeamMembers(el, isLeader, isAdmin) {
  var card = document.createElement('div'); card.className = 'card';
  var h = '<div class="ct">團隊成員 <span class="badge b-gray">' + teamMembers.length + '人</span></div>';

  teamMembers.forEach(function(tm) {
    var m = tm.members || {};
    var isMe = tm.member_id === currentUser.id;
    var memberLeads = teamLeads.filter(function(l){return l.member_id===tm.member_id;});
    var now = new Date();

    h += '<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--bdr)">';

    h += '<span class="badge ' + (tm.role==='leader'?'b-acc':tm.role==='admin'?'b-yel':'b-gray') + '">' + (tm.role==='leader'?'團長':tm.role==='admin'?'管理員':'成員') + '</span>';
    if (isMe) h += '<span class="badge b-grn">我</span>';
    h += '</div>';
    h += '<div style="font-size:13px;color:var(--t2);margin-top:2px">本月 ' + thisLeads.filter(function(l){return l.member_id===tm.member_id;}).length + ' 件 · 成交 ' + thisLeads.filter(function(l){return l.member_id===tm.member_id&&l.status==='closed';}).length + ' 件</div>';
    h += '</div>';

    if (isLeader && !isMe) {
      h += '<div style="display:flex;flex-direction:column;gap:4px">';

        h += '<button class="btn-sm" style="font-size:12px;padding:3px 8px" onclick="setMemberRole(\'' + tm.id + '\',\'admin\')">升管理員</button>';

        h += '<button class="btn-sm" style="font-size:12px;padding:3px 8px" onclick="setMemberRole(\'' + tm.id + '\',\'member\')">降為成員</button>';
      }
      h += '<button class="btn-sm" style="font-size:12px;padding:3px 8px;color:var(--red);border-color:rgba(192,64,48,.3)" onclick="removeMember(\'' + tm.id + '\',\'' + (m.name||'') + '\')">移除</button>';
      h += '</div>';
    }
    h += '</div>';
  });
  card.innerHTML = h;
  el.appendChild(card);

  // 邀請新成員（團長/管理員）
  if (isAdmin) {
    var invCard = document.createElement('div'); invCard.className = 'card';
    invCard.innerHTML =
      '<div class="ct">邀請新成員</div>' +
      '<div class="frow"><div class="flbl">會員 Email</div><input class="fi" id="invite-email" type="email" placeholder="對方的登入 Email"></div>' +
      '<button class="btn-p" style="width:100%;margin-top:10px" onclick="inviteMember()">發送邀請</button>' +
      '<div style="font-size:13px;color:var(--t2);margin-top:8px">對方需持有<strong style="color:var(--t0)">專業版</strong>才能加入，一人只能加入一個團隊</div>';
    el.appendChild(invCard);
  }
}

async function setMemberRole(tmId, newRole) {
  await sb.from('team_members').update({ role: newRole }).eq('id', tmId);
  renderTeam();
}

async function removeMember(tmId, name) {
  if (!confirm('確定移除「' + name + '」？')) return;
  await sb.from('team_members').update({ status: 'left' }).eq('id', tmId);
  renderTeam();
}

async function inviteMember() {
  var email = document.getElementById('invite-email') ? document.getElementById('invite-email').value.trim() : '';
  if (!email) { alert('請填寫 Email'); return; }
  // 查找該 email 的 member（包含 plan 欄位）
  var res = await sb.from('members').select('id,name,plan').eq('email', email).single();
  if (!res.data) { alert('找不到此 Email 的會員，請確認對方已註冊'); return; }
  if (res.data.id === currentUser.id) { alert('不能邀請自己'); return; }
  // 確認對方持有專業版或團隊版
  var memberPlan = res.data.plan || 'free';
  if (memberPlan !== 'pro' && memberPlan !== 'team') {
    alert('「' + res.data.name + '」目前方案為' + (memberPlan==='trial'?'試用中':'基本版') + '，需先升級至專業版（$799/月）才能加入團隊。');
    return;
  }
  // 確認對方沒有在其他團隊
  var existing = await sb.from('team_members').select('id').eq('member_id', res.data.id).eq('status', 'active');
  if (existing.data && existing.data.length > 0) { alert('「' + res.data.name + '」已在其他團隊，無法邀請'); return; }
  // 發送邀請
  await sb.from('team_members').insert({ team_id: teamData.id, member_id: res.data.id, role: 'member', status: 'pending' });
  alert('✓ 已傳送邀請給 ' + res.data.name);
  document.getElementById('invite-email').value = '';
}

function filterTeamLeads(memberId) {
  var list = document.getElementById('team-leads-list');
  if (!list) return;
  var filtered = memberId === 'all' ? teamLeads : teamLeads.filter(function(l){return l.member_id===memberId;});
  if (filtered.length === 0) { list.innerHTML = '<div style="text-align:center;padding:16px;color:var(--t2)">沒有客戶資料</div>'; return; }

  // 把 teamLeads 合併進 leads，讓 showLeadDetail 找得到
  filtered.forEach(function(tl) {
    if (!leads.find(function(l){return l.id===tl.id;})) leads.push(tl);
  });

  list.innerHTML = '';
  filtered.slice(0,50).forEach(function(l) {
    var sc = calcScores(l);
    var addrShort = '';
    if (l.address) { var m=l.address.match(/^(.{2,3}[市縣])(.{2,4}[區鄉鎮])/); if(m) addrShort=m[1]+m[2]; }
    var advisor = teamMembers.find(function(tm){return tm.member_id===l.member_id;});
    var advisorName = advisor&&advisor.members ? advisor.members.name : '—';
    var badgeClass = statusBadge(l.status);
    var badgeText  = statusText(l.status);

    var item = document.createElement('div');
    item.className = 'lead-item';
    item.style.borderLeft = '3px solid var(--acc)';
    item.style.cursor = 'pointer';
    item.innerHTML =
      '<div style="width:36px;height:36px;border-radius:50%;background:var(--al);color:var(--acc);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;flex-shrink:0">' + (l.name||'?').charAt(0) + '</div>' +
      '<div class="lead-info">' +
        '<div style="display:flex;align-items:center;gap:6px"><span class="lead-name">' + (l.name||'—') + '</span>' +
        (addrShort?'<span style="font-size:12px;color:var(--t2)">'+addrShort+'</span>':'') + '</div>' +
        '<div style="font-size:13px;color:var(--t2);margin-top:1px">顧問：' + advisorName + ' · 信貸 <span style="color:var(--grn)">' + sc.bank + '%</span></div>' +
      '</div>' +
      '<span class="badge ' + badgeClass + '">' + badgeText + '</span>';
    item.addEventListener('click', function() { showLeadDetail(l.id); });
    list.appendChild(item);
  });
  if (filtered.length > 50) {
    var more = document.createElement('div');
    more.style.cssText = 'text-align:center;padding:10px;font-size:13px;color:var(--t2)';
    more.textContent = '顯示前50筆，共' + filtered.length + '筆';
    list.appendChild(more);
  }
}

function renderTeamFinance(el, isLeader, isAdmin) {
  var now = new Date();
  var thisM  = new Date(now.getFullYear(), now.getMonth(), 1);

  // 測試按鈕（無員工且無案件時顯示）
  if (isAdmin && teamCompany.salaries.length === 0) {
    var testDiv = document.createElement('div');
    testDiv.style.cssText = 'background:var(--yl);border:0.5px solid rgba(184,128,32,.3);border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between';
    testDiv.innerHTML = '<span style="font-size:13px;color:var(--yel)">🧪 尚無員工資料，可載入測試資料查看效果</span>' +
      '<button onclick="injectTestData()" style="font-size:13px;padding:5px 12px;background:var(--yel);color:#FFF;border:none;border-radius:6px;cursor:pointer;font-family:var(--sans)">載入測試資料</button>';
    el.appendChild(testDiv);
  }

  var lastM  = new Date(now.getFullYear(), now.getMonth()-1, 1);
  var lastME = thisM;
  var lastQ  = new Date(now.getFullYear(), now.getMonth()-3, 1);
  var lastY  = new Date(now.getFullYear()-1, now.getMonth(), 1);
  var lastYE = new Date(now.getFullYear(), now.getMonth(), 1);

  function closedIn(s,e) { return teamLeads.filter(function(l){return l.status==='closed'&&new Date(l.created_at)>=s&&new Date(l.created_at)<e;}).length; }
  function arrow(n,p) {
    if(p===0) return n>0?'<span style="color:var(--grn)">↑新增</span>':'—';
    var pct=Math.round((n-p)/p*100);
    return '<span style="color:'+(pct>=0?'var(--grn)':'var(--red)')+'\">'+(pct>=0?'↑':'↓')+Math.abs(pct)+'%</span>';
  }

  var thisClosed = closedIn(thisM, new Date());
  var lastClosed = closedIn(lastM, lastME);

  // 開銷分類
  var fixedExp  = teamExpenses.filter(function(e){return e.type==='fixed';});
  var varExp    = teamExpenses.filter(function(e){return e.type!=='fixed';});
  var totalFixed   = fixedExp.reduce(function(s,e){return s+e.amount;},0);
  var totalVar     = varExp.reduce(function(s,e){return s+e.amount;},0);
  var totalSalary  = (teamCompany.salaries||[]).reduce(function(s,e){return s+e.amount;},0);
  var totalOpsExp2 = totalFixed + totalVar; // 營運開銷（不含薪水）
  var totalExp     = totalFixed + totalVar + totalSalary; // 含薪水總支出
  var splitItems2  = teamCompany.splitItems || [{ name:'公司', rate:40 }];
  var companyRate2 = splitItems2.reduce(function(s,i){return s+(parseFloat(i.rate)||0);},0);
  var estRevenue   = thisClosed * (teamCompany.revenuePerDeal||20000);
  var estCoRev     = Math.round(estRevenue * companyRate2 / 100);
  var netProfit    = estCoRev - totalOpsExp2; // 淨利不含薪水

  // ── 本月業績總覽 ──
  var perfCard = document.createElement('div'); perfCard.className = 'card';
  perfCard.innerHTML =
    '<div class="ct">📈 本月業績總覽</div>' +
    '<div style="font-size:12px;color:var(--t3);margin-bottom:8px">淨利 = 公司抽成收入 − 固定開銷 − 非固定開銷（薪資另計）</div>' +
    '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px">' +
      '<div style="background:var(--al);border-radius:8px;padding:10px;text-align:center"><div style="font-size:12px;color:var(--t2);margin-bottom:4px">本月成交</div><div style="font-size:22px;font-weight:800;color:var(--acc)">' + thisClosed + '</div><div style="font-size:11px;color:var(--t3)">件 ' + arrow(thisClosed,lastClosed) + ' vs前月</div></div>' +
      '<div style="background:var(--gl);border-radius:8px;padding:10px;text-align:center"><div style="font-size:12px;color:var(--t2);margin-bottom:4px">公司抽成收入</div><div style="font-size:20px;font-weight:800;color:var(--grn)">$' + (estCoRev/10000).toFixed(1) + 'W</div><div style="font-size:11px;color:var(--t3)">佔收入 '+companyRate2+'%</div></div>' +
      '<div style="background:var(--rl);border-radius:8px;padding:10px;text-align:center"><div style="font-size:12px;color:var(--t2);margin-bottom:4px">營運開銷</div><div style="font-size:20px;font-weight:800;color:var(--red)">$' + (totalOpsExp2/10000).toFixed(1) + 'W</div><div style="font-size:11px;color:var(--t3)">固定+非固定</div></div>' +
      '<div style="background:' + (netProfit>=0?'var(--gl)':'var(--rl)') + ';border-radius:8px;padding:10px;text-align:center"><div style="font-size:12px;color:var(--t2);margin-bottom:4px">公司淨利</div><div style="font-size:20px;font-weight:800;color:' + (netProfit>=0?'var(--grn)':'var(--red)') + '">$' + (netProfit/10000).toFixed(1) + 'W</div><div style="font-size:11px;color:var(--t3)">薪資另計 $'+(totalSalary/10000).toFixed(1)+'W</div></div>' +
    '</div>' +
    '<div class="ri"><span class="rl">前月成交</span><span class="rv">' + lastClosed + ' 件</span></div>' +
    '<div class="ri"><span class="rl">前三個月均</span><span class="rv">' + Math.round(closedIn(lastQ,thisM)/3*10)/10 + ' 件/月</span></div>' +
    '<div class="ri"><span class="rl">去年同月</span><span class="rv">' + closedIn(lastY,lastYE) + ' 件</span></div>' +
    (isAdmin?'<div class="frow" style="margin-top:10px"><div class="flbl">每件成交均收（元）</div><input class="fi" id="tc-per-deal" type="number" inputmode="numeric" value="'+(teamCompany.revenuePerDeal||20000)+'" onchange="teamCompany.revenuePerDeal=parseInt(this.value)||20000;renderTeam()"></div>':'');
  el.appendChild(perfCard);

  // 薪資相關移到「員工薪資」tab
}

function renderTeamSalary(el, isLeader, isAdmin) {
  var now = new Date();
  var thisM = new Date(now.getFullYear(), now.getMonth(), 1);

  var splitItems = teamCompany.splitItems || [{ name:'公司', rate:40 }];
  var totalSplitRate = splitItems.reduce(function(s,i){ return s+(parseFloat(i.rate)||0); },0);
  var empSplitRate = Math.max(0, 100 - totalSplitRate);
  var companyRate = totalSplitRate;
  var totalSalary = (teamCompany.salaries||[]).reduce(function(s,e){return s+e.amount;},0);

  var splitCard = document.createElement('div'); splitCard.className = 'card';
  var splitH = '<div class="ct">⚙️ 公司收入拆分設定';
  if (isAdmin) splitH += ' <button class="btn-sm" onclick="addSplitItem()">+ 新增項目</button>';
  splitH += '</div>';
  splitH += '<div style="font-size:13px;color:var(--t2);margin-bottom:10px">自訂公司各項抽成，加總後剩餘為員工可分配比率</div>';

  // 新增項目表單
  splitH += '<div id="add-split-form" style="display:none;background:var(--inp);border-radius:8px;padding:12px;margin-bottom:10px">';
  splitH += '<div class="frow2"><div class="frow"><div class="flbl">項目名稱</div><input class="fi" id="si-name" placeholder="公積金"></div>';
  splitH += '<div class="frow"><div class="flbl">比率 %</div><input class="fi" id="si-rate" type="number" min="0" max="100" placeholder="10" inputmode="numeric"></div></div>';
  splitH += '<div style="display:flex;gap:6px;margin-top:8px"><button class="btn-sm" onclick="document.getElementById(\'add-split-form\').style.display=\'none\'">取消</button>';
  splitH += '<button class="btn-p" onclick="saveSplitItem()" style="flex:1">新增</button></div></div>';

  // 拆分項目列表
  splitItems.forEach(function(item, ii) {
    var itemAmt = 0; // 僅示意，無總收入上下文
    splitH += '<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--inp);border-radius:8px;margin-bottom:6px">';
    splitH += '<div style="flex:1"><div style="font-size:14px;font-weight:500">🏢 ' + item.name + '</div></div>';
    if (isAdmin) {
      splitH += '<input type="number" min="0" max="100" value="' + item.rate + '" ';
      splitH += 'style="width:58px;padding:6px 8px;background:var(--bg2);border:0.5px solid var(--bdr2);border-radius:7px;color:var(--inpt);font-size:14px;font-weight:600;font-family:var(--sans);text-align:center" ';
      splitH += 'oninput="teamCompany.splitItems[' + ii + '].rate=parseInt(this.value)||0" onchange="renderTeam()">';
      splitH += '<span style="font-size:13px;color:var(--t2)">%</span>';
      splitH += '<button onclick="removeSplitItem(' + ii + ')" style="font-size:12px;padding:2px 8px;border-radius:5px;border:0.5px solid rgba(192,64,48,.3);background:transparent;color:var(--red);cursor:pointer;font-family:var(--sans)">刪</button>';
    } else {
      splitH += '<span style="font-size:16px;font-weight:700;color:var(--acc)">' + item.rate + '%</span>';
    }
    splitH += '</div>';
  });

  // 合計顯示
  var rateOk = Math.round(totalSplitRate) <= 100;
  splitH += '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:8px;margin-top:4px;background:' + (rateOk?'var(--inp)':'var(--rl)') + ';border:0.5px solid ' + (rateOk?'var(--bdr)':'rgba(192,64,48,.3)') + '">';
  splitH += '<div><div style="font-size:13px;color:var(--t2)">公司合計抽成</div><div style="font-size:11px;color:var(--t3);margin-top:1px">' + splitItems.map(function(i){return i.name+' '+i.rate+'%';}).join(' + ') + '</div></div>';
  splitH += '<div style="text-align:right"><div style="font-size:18px;font-weight:800;color:'+(rateOk?'var(--acc)':'var(--red)')+'">' + Math.round(totalSplitRate) + '%</div>';
  splitH += '<div style="font-size:13px;color:var(--grn)">員工留 ' + Math.round(empSplitRate) + '%</div></div>';
  splitH += '</div>';
  if (!rateOk) splitH += '<div style="font-size:13px;color:var(--red);margin-top:6px">⚠️ 公司抽成總計超過100%，請調整</div>';
  splitCard.innerHTML = splitH;
  el.appendChild(splitCard);

  // ── 員工案件統計與薪資 ──
  var salCard = document.createElement('div'); salCard.className = 'card';
  var salH = '<div class="ct">👥 員工薪資與案件統計';
  if (isAdmin) salH += ' <button class="btn-sm" onclick="showAddSalary()">+ 新增員工</button>';
  salH += '</div>';

  // 新增員工表單
  salH += '<div id="add-salary-form" style="display:none;background:var(--inp);border-radius:8px;padding:12px;margin-bottom:10px">';
  salH += '<div class="frow2"><div class="frow"><div class="flbl">員工姓名</div><input class="fi" id="ts-name" placeholder="王小明"></div>';
  salH += '<div class="frow"><div class="flbl">底薪（元）</div><input class="fi" id="ts-amount" type="number" inputmode="numeric" placeholder="35000"></div></div>';
  salH += '<div style="display:flex;gap:6px;margin-top:8px">';
  salH += '<button class="btn-sm" onclick="document.getElementById(\'add-salary-form\').style.display=\'none\'">取消</button>';
  salH += '<button class="btn-p" onclick="saveTeamSalary()" style="flex:1">新增</button></div></div>';

  if (!teamCompany.salaries || teamCompany.salaries.length === 0) {
    salH += '<div style="text-align:center;padding:12px;color:var(--t2)">尚未新增員工</div>';
  } else {
    teamCompany.salaries.forEach(function(s, si) {
      var tm = teamMembers.find(function(m){ return m.members && m.members.name === s.name; });
      var memberId = tm ? tm.member_id : null;
      var memberClosed = memberId
        ? teamLeads.filter(function(l){ return l.member_id===memberId && l.status==='closed' && new Date(l.created_at)>=thisM; })
        : [];

      // 薪資加扣計算
      var adjustments = s.adjustments || [];
      var totalAdj = adjustments.reduce(function(sum,a){ return sum+(parseInt(a.amount)||0); },0);
      var base = s.amount || 0;
      var finalSalary = base + totalAdj;

      // 案件收入比對
      var totalActual = 0;
      var warnings = [];
      memberClosed.forEach(function(l) {
        var d = dealData[l.id] || {};
        var actual = d.actualIncome || l.closed_amount || 0;
        totalActual += actual;
        if (d.isEmployee && actual > 0) {
          var empTotalCoRate = parseFloat(d.companyRate || 0);
          if (Math.abs(empTotalCoRate - totalSplitRate) > 1) {
            warnings.push({ name: l.name, reported: empTotalCoRate, expected: Math.round(totalSplitRate), diff: Math.round(actual * Math.abs(empTotalCoRate - totalSplitRate) / 100) });
          }
        }
      });
      var companyShare = totalActual > 0 ? Math.round(totalActual * totalSplitRate / 100) : 0;

      salH += '<div style="border:0.5px solid '+(warnings.length>0?'rgba(192,64,48,.4)':'var(--bdr2)')+';border-radius:10px;padding:12px;margin-bottom:10px">';

      // 員工標題
      salH += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
      salH += '<div style="display:flex;align-items:center;gap:8px">';
      salH += '<div style="width:36px;height:36px;border-radius:50%;background:var(--al);color:var(--acc);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700">' + (s.name||'?').charAt(0) + '</div>';

function showAddSalary() {
  var el = document.getElementById('add-salary-form');
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}
function addSplitItem() {
  var el = document.getElementById('add-split-form');
  if (el) el.style.display = el.style.display==='none'?'block':'none';
}
function saveSplitItem() {
  var name = document.getElementById('si-name') ? document.getElementById('si-name').value.trim() : '';
  var rate = parseInt(document.getElementById('si-rate') ? document.getElementById('si-rate').value : 0) || 0;
  if (!name) { alert('請填寫項目名稱'); return; }
  if (!teamCompany.splitItems) teamCompany.splitItems = [];
  teamCompany.splitItems.push({ name:name, rate:rate });
  renderTeam();
}
function removeSplitItem(idx) {
  if (teamCompany.splitItems) { teamCompany.splitItems.splice(idx,1); renderTeam(); }
}
function addAdjustment(si) {
  var el = document.getElementById('adj-form-' + si);
  if (el) el.style.display = el.style.display==='none'?'block':'none';
}
function saveAdjustment(si) {
  var icon   = document.getElementById('adj-icon-'  +si) ? document.getElementById('adj-icon-'  +si).value||'📋' : '📋';
  var name   = document.getElementById('adj-name-'  +si) ? document.getElementById('adj-name-'  +si).value.trim() : '';
  var amount = parseInt(document.getElementById('adj-amount-'+si) ? document.getElementById('adj-amount-'+si).value : 0) || 0;
  if (!name) { alert('請填寫項目名稱'); return; }
  if (!teamCompany.salaries[si].adjustments) teamCompany.salaries[si].adjustments = [];
  teamCompany.salaries[si].adjustments.push({ icon:icon, name:name, amount:amount });
  renderTeam();
}
function removeAdjustment(si, ai) {
  if (teamCompany.salaries[si] && teamCompany.salaries[si].adjustments) {
    teamCompany.salaries[si].adjustments.splice(ai, 1);
    renderTeam();
  }
}

function saveTeamSalary() {
  var name   = document.getElementById('ts-name')   ? document.getElementById('ts-name').value.trim()         : '';
  var amount = parseInt(document.getElementById('ts-amount') ? document.getElementById('ts-amount').value : 0) || 0;
  if (!name||!amount) { alert('請填寫姓名和金額'); return; }
  if (!teamCompany.salaries) teamCompany.salaries = [];
  teamCompany.salaries.push({ name:name, amount:amount });
  document.getElementById('add-salary-form').style.display = 'none';
  renderTeam();
}
function removeTeamSalary(idx) {
  if (teamCompany.salaries) { teamCompany.salaries.splice(idx,1); renderTeam(); }
}
function showAddTeamExpense(type) {
  var id = type==='fixed' ? 'add-fixed-expense-form' : type==='var' ? 'add-var-expense-form' : 'add-team-expense';
  var el = document.getElementById(id);
  if (el) {
    el.style.display = el.style.display==='none'?'block':'none';
    var d = el.querySelector('input[type=date]');
    if (d) d.value = new Date().toISOString().split('T')[0];
  }
}
function saveTeamExpense(type) {
  var prefix = type==='fixed'?'tfe':type==='var'?'tve':'te';
  var icon   = document.getElementById(prefix+'-icon')   ? document.getElementById(prefix+'-icon').value   || '💳' : '💳';
  var name   = document.getElementById(prefix+'-name')   ? document.getElementById(prefix+'-name').value.trim()   : '';
  var amount = parseInt(document.getElementById(prefix+'-amount') ? document.getElementById(prefix+'-amount').value : 0) || 0;
  var date   = document.getElementById(prefix+'-date')   ? document.getElementById(prefix+'-date').value   : '';
  if (!name||!amount) { alert('請填寫名稱和金額'); return; }
  teamExpenses.push({ icon:icon, name:name, amount:amount, date:date, type: type||'var' });
  renderTeam();
}
function removeTeamExpenseByType(type, idx) {
  var filtered = teamExpenses.filter(function(e){ return e.type===(type==='fixed'?'fixed':'var')||(!e.type&&type==='var'); });
  var target = filtered[idx];
  if (target) { var i=teamExpenses.indexOf(target); if(i>-1) teamExpenses.splice(i,1); }
  renderTeam();
}
function removeTeamExpense(idx) { teamExpenses.splice(idx,1); renderTeam(); }

function showTeamSettings() {
  var name = prompt('團隊名稱：', teamData ? teamData.name : '');
  if (name && name.trim() && teamData) {
    sb.from('teams').update({name: name.trim()}).eq('id', teamData.id).then(function(){renderTeam();});
  }
}

async function renderInvite() {
  var code = currentMember ? (currentMember.invite_code || '—') : '—';
  var plan = currentMember ? (currentMember.plan || 'free') : 'free';
  var planPrice = plan === 'team' ? 999 : plan === 'pro' ? 799 : 0;
  var el = document.getElementById('member-content');
  el.innerHTML = '<div style="text-align:center;padding:20px;color:var(--t2)">載入中…</div>';

  // 查詢已邀請的會員
  var invitedRes = await sb.from('members')
    .select('id,name,plan,created_at')
    .eq('invited_by', currentUser.id);
  var invitedMembers = invitedRes.data || [];
  // 有效付費人數（非 free）
  var paidCount = invitedMembers.filter(function(m){ return m.plan !== 'free'; }).length;
  // 折扣計算
  var discount = paidCount >= 15 ? 600 : paidCount >= 10 ? 400 : paidCount >= 5 ? 200 : 0;
  var actualFee = Math.max(0, planPrice - discount);
  // 進度條百分比（最多到15人）
  var progressPct = Math.min(100, (paidCount / 15) * 100);

  var linkUrl = BASE_URL + '/app.html?ref=' + code;

  var h = '';

  // ── 標題列 ──
  h += '<div style="margin-bottom:16px">';
  h += '<div style="font-size:20px;font-weight:700">邀請碼 / 折扣機制</div>';
  h += '<div style="font-size:14px;color:var(--t2);margin-top:3px">邀請5位以上會員，每位折抵月費 $200</div>';
  h += '</div>';

function inviteBySMS(code) {
  var url = BASE_URL + '/app.html?ref=' + code;
  var msg = '邀請你加入顧問PRO貸款評估平台，使用邀請碼 ' + code + ' 註冊：' + url;

    navigator.clipboard.writeText(msg).then(function(){ alert('已複製邀請訊息，請貼到簡訊傳送'); });
  }
}

var currentBilling = 'monthly';
function setBilling(type) {
  currentBilling = type;
  var isYear = type === 'yearly';
  var mBtn = document.getElementById('btn-monthly');
  var yBtn = document.getElementById('btn-yearly');
  if (mBtn) { mBtn.style.background = isYear?'transparent':'var(--acc)'; mBtn.style.color = isYear?'var(--t2)':'#FFF'; }
  if (yBtn) { yBtn.style.background = isYear?'var(--acc)':'transparent'; yBtn.style.color = isYear?'#FFF':'var(--t2)'; }
  var proP = document.getElementById('pro-price');
  var proPd = document.getElementById('pro-period');
  var teamP = document.getElementById('team-price');
  var teamPd = document.getElementById('team-period');
  if (proP) proP.textContent = isYear ? '$7,990' : '$799';
  if (proPd) proPd.textContent = isYear ? '/年（約 $666/月）' : '/月';
  if (teamP) teamP.textContent = isYear ? '$9,990' : '$999';
  if (teamPd) teamPd.textContent = isYear ? '/年（約 $833/月）' : '/月';
  // 更新付款資訊
  var info = document.getElementById('upgrade-info');
  if (info && info.style.display !== 'none') {
    var planType = info.dataset.plan;
    if (planType) showUpgradeInfo(planType);
  }
}

function showUpgradeInfo(planType) {
  var info = document.getElementById('upgrade-info');
  if (!info) return;
  info.dataset.plan = planType;
  var isYear = currentBilling === 'yearly';
  var isTeam = planType === 'team';
  var m = currentMember || {};
  var currentPlan = m.plan || 'trial';
  var isPro = currentPlan === 'pro';

  // 計算實際應付金額
  var fullPrice = isTeam ? (isYear ? 9990 : 999) : (isYear ? 7990 : 799);
  var alreadyPaid = 0;
  var isDiff = false;

  // 已付專業版升團隊版→只收差額
  if (isTeam && isPro) {
    alreadyPaid = isYear ? 7990 : 799;
    isDiff = true;
  }
  var payAmount = fullPrice - alreadyPaid;
  var planName = isTeam ? '團隊版' : '專業版';
  var period = isYear ? '年' : '月';

  var priceHtml = isDiff
    ? '<div class="ri"><span class="rl">原方案已付</span><span class="rv" style="color:var(--t2)">專業版 -$' + alreadyPaid.toLocaleString() + '</span></div>' +
      '<div class="ri"><span class="rl">補繳差額</span><span class="rv" style="font-size:18px;font-weight:700;color:var(--acc)">$' + payAmount.toLocaleString() + ' /' + period + '</span></div>'

      '🏢 <strong style="color:var(--grn)">團長</strong>需持有團隊版，<strong style="color:var(--grn)">團員</strong>持有專業版即可加入，不需另外升級。' +

  var diffNote = isDiff
    ? '<div style="background:var(--yl);border:0.5px solid rgba(184,128,32,.3);border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:14px;color:var(--yel)">' +

    : '';

  info.style.display = 'block';
  info.innerHTML =
    '<div class="card" style="border-color:var(--acc)">' +
    '<div class="ct">📋 付款資訊</div>' +
    teamNote +
    diffNote +
    '<div style="background:var(--al);border-radius:8px;padding:12px 14px;margin-bottom:12px">' +
    '<div class="ri"><span class="rl">方案</span><span class="rv" style="color:var(--acc);font-weight:600">' + planName + ' · ' + (isYear?'年繳':'月繳') + '</span></div>' +
    priceHtml +
    '<div class="ri"><span class="rl">帳號</span><span class="rv" style="font-size:13px">' + (m.email||'—') + '</span></div>' +
    '</div>' +
    '<div style="font-size:14px;color:var(--t2);line-height:1.9;margin-bottom:12px">' +
    '① 完成付款後，請傳送以下資訊給管理員：<br>' +
    '&nbsp;&nbsp;· Email：<strong style="color:var(--t0)">' + (m.email||'—') + '</strong><br>' +
    '&nbsp;&nbsp;· 方案：<strong style="color:var(--t0)">' + planName + ' ' + (isYear?'年繳':'月繳') + (isDiff?' （補差額）':'') + '</strong><br>' +
    '&nbsp;&nbsp;· 付款截圖<br>' +
    '② 管理員確認後於 1 個工作天內開通' +
    '</div>' +
    '<div style="background:var(--inp);border-radius:8px;padding:12px;margin-bottom:12px;text-align:center">' +
    '<div style="font-size:13px;color:var(--t3);margin-bottom:6px">付款方式（金流串接完成後開放）</div>' +
    '<div style="font-size:15px;color:var(--t2)">🔧 即將上線</div>' +
    '</div>' +
    '<button onclick="document.getElementById(\'upgrade-info\').style.display=\'none\'" style="width:100%;padding:8px;background:transparent;border:0.5px solid var(--bdr2);border-radius:8px;color:var(--t2);cursor:pointer;font-family:var(--sans)">取消</button>' +

// ══════════════════════════════
// 貸款試算
// ══════════════════════════════
// ══════════════════════════════
// 行事曆
// ══════════════════════════════
var schedules = [];
var loanReminders = [];
var calViewDate = new Date();
var calTab = 'month'; // month | week | add

async function renderCalendar() {
  var el = document.getElementById('member-content');
  el.innerHTML = '<div style="text-align:center;padding:30px;color:var(--t2)"><div class="spinner" style="margin:0 auto 10px"></div>載入行程中...</div>';

  // 載入資料
  var now = new Date();
  var monthStart = new Date(calViewDate.getFullYear(), calViewDate.getMonth(), 1);
  var monthEnd   = new Date(calViewDate.getFullYear(), calViewDate.getMonth()+1, 31);

  var [schRes, remRes] = await Promise.all([
    sb.from('schedules').select('*, leads(name)').eq('member_id', currentUser.id)
      .gte('schedule_date', monthStart.toISOString().split('T')[0])
      .lte('schedule_date', monthEnd.toISOString().split('T')[0])
      .order('schedule_date').order('schedule_time'),
    sb.from('loan_reminders').select('*, leads(name)').eq('member_id', currentUser.id)
  ]);
  schedules = schRes.data || [];
  loanReminders = remRes.data || [];

  // 計算貸款提醒到期日
  var loanAlerts = loanReminders.map(function(r) {
    if (!r.last_loan_date) return null;
    var d = new Date(r.last_loan_date);
    d.setMonth(d.getMonth() + (r.remind_after_months||6));
    return { id: r.id, lead_name: r.leads ? r.leads.name : '—', loan_type: r.loan_type, remind_date: d.toISOString().split('T')[0], note: r.note, months: r.remind_after_months };
  }).filter(Boolean);

  buildCalendarUI(el, loanAlerts);
  // 請求推播權限
  requestNotificationPermission();
  // 排程提醒
  scheduleNotifications(loanAlerts);
}

function buildCalendarUI(el, loanAlerts) {
  el.innerHTML = '';
  var now = new Date();
  var todayStr = now.toISOString().split('T')[0];

  // 本週待辦摘要（頂部）
  var weekStart = new Date(now); weekStart.setDate(now.getDate() - now.getDay() + 1);
  var weekEnd   = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6);
  var weekScheds = schedules.filter(function(s){
    return s.schedule_date >= weekStart.toISOString().split('T')[0] && s.schedule_date <= weekEnd.toISOString().split('T')[0] && !s.is_done;
  });
  var todayScheds = schedules.filter(function(s){ return s.schedule_date === todayStr && !s.is_done; });
  var urgentLoan = loanAlerts.filter(function(r){
    var d = new Date(r.remind_date);
    var diff = Math.ceil((d - now)/(1000*60*60*24));
    return diff <= 7 && diff >= 0;
  });

  // 頂部提醒條
  if (todayScheds.length > 0 || urgentLoan.length > 0) {
    var alertDiv = document.createElement('div');
    alertDiv.style.cssText = 'background:var(--al);border:0.5px solid rgba(200,81,26,.3);border-radius:10px;padding:10px 14px;margin-bottom:12px';
    var alertH = '<div style="font-size:13px;font-weight:600;color:var(--acc);margin-bottom:6px">🔔 今日提醒</div>';
    todayScheds.forEach(function(s){
      alertH += '<div style="font-size:13px;color:var(--t1);padding:3px 0">📅 ' + (s.schedule_time?s.schedule_time.slice(0,5)+' ':'') + s.title + (s.leads?' · '+s.leads.name:'') + '</div>';
    });
    urgentLoan.forEach(function(r){
      var diff = Math.ceil((new Date(r.remind_date)-now)/(1000*60*60*24));
      alertH += '<div style="font-size:13px;color:var(--yel);padding:3px 0">💰 ' + r.lead_name + ' · ' + (r.loan_type||'貸款') + ' 再辦提醒（' + (diff===0?'今天':diff+'天後') + '）</div>';
    });
    alertDiv.innerHTML = alertH;
    el.appendChild(alertDiv);
  }

  // Tab 切換
  var tabDiv = document.createElement('div');
  tabDiv.style.cssText = 'display:flex;gap:6px;margin-bottom:12px;align-items:center';
  tabDiv.innerHTML =
    ['month','week'].map(function(t){
      var label = t==='month'?'📅 月曆':'📋 本週待辦';
      var on = calTab===t;
      return '<button onclick="calTab=\''+t+'\';buildCalendarUI(document.getElementById(\'member-content\'),'+JSON.stringify(loanAlerts)+')" style="padding:6px 14px;border-radius:20px;font-size:14px;cursor:pointer;border:0.5px solid '+(on?'var(--acc)':'var(--bdr2)')+';background:'+(on?'var(--al)':'transparent')+';color:'+(on?'var(--acc)':'var(--t1)')+';font-family:var(--sans)">'+label+'</button>';
    }).join('') +
    '<button onclick="showAddSchedule()" style="margin-left:auto;padding:6px 14px;border-radius:20px;font-size:14px;cursor:pointer;border:0.5px solid var(--acc);background:var(--acc);color:#FFF;font-family:var(--sans)">+ 新增行程</button>';
  el.appendChild(tabDiv);

  if (calTab === 'month') {
    buildMonthView(el, loanAlerts, todayStr);
  } else {
    buildWeekView(el, loanAlerts, weekStart, weekEnd, todayStr);
  }

  // 新增行程表單
  var formDiv = document.createElement('div');
  formDiv.id = 'add-schedule-form';
  formDiv.style.display = 'none';
  formDiv.className = 'card';
  formDiv.innerHTML = buildAddScheduleForm();
  el.appendChild(formDiv);

  // 貸款提醒設定
  buildLoanReminderSection(el, loanAlerts);
}

function buildMonthView(el, loanAlerts, todayStr) {
  var year = calViewDate.getFullYear(), month = calViewDate.getMonth();
  var firstDay = new Date(year, month, 1).getDay();
  if (firstDay === 0) firstDay = 7; // 週一開始
  var daysInMonth = new Date(year, month+1, 0).getDate();

  var card = document.createElement('div'); card.className = 'card';
  var h = '';

  // 月份導航
  h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">';
  h += '<button onclick="calViewDate.setMonth(calViewDate.getMonth()-1);renderCalendar()" style="padding:6px 12px;background:transparent;border:0.5px solid var(--bdr2);border-radius:7px;color:var(--t1);cursor:pointer;font-family:var(--sans);font-size:16px">‹</button>';
  h += '<div style="font-size:17px;font-weight:700">' + year + ' 年 ' + (month+1) + ' 月</div>';
  h += '<button onclick="calViewDate.setMonth(calViewDate.getMonth()+1);renderCalendar()" style="padding:6px 12px;background:transparent;border:0.5px solid var(--bdr2);border-radius:7px;color:var(--t1);cursor:pointer;font-family:var(--sans);font-size:16px">›</button>';
  h += '</div>';

  // 星期標頭
  h += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">';
  ['一','二','三','四','五','六','日'].forEach(function(d,i){
    h += '<div style="text-align:center;font-size:12px;color:'+(i>=5?'var(--red)':'var(--t2)')+';padding:4px 0">'+d+'</div>';
  });
  h += '</div>';

  // 日期格子
  h += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">';

  // 空格
  for (var b = 1; b < firstDay; b++) h += '<div></div>';

  for (var d = 1; d <= daysInMonth; d++) {
    var dateStr = year + '-' + String(month+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    var dayScheds = schedules.filter(function(s){ return s.schedule_date === dateStr; });
    var dayLoans  = loanAlerts.filter(function(r){ return r.remind_date === dateStr; });
    var isToday   = dateStr === todayStr;
    var dayOfWeek = new Date(year, month, d).getDay();
    var isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
    var hasEvent  = dayScheds.length > 0 || dayLoans.length > 0;

    h += '<div onclick="showDayDetail(\''+dateStr+'\')" style="min-height:52px;padding:4px;border-radius:6px;cursor:'+(hasEvent?'pointer':'default')+';background:'+(isToday?'var(--acc)':hasEvent?'var(--inp)':'transparent')+';border:0.5px solid '+(isToday?'var(--acc)':hasEvent?'var(--bdr2)':'transparent')+';position:relative">';
    h += '<div style="font-size:13px;font-weight:'+(isToday?'700':'400')+';color:'+(isToday?'#FFF':isWeekend?'var(--red)':'var(--t1)')+';margin-bottom:2px">'+d+'</div>';

    // 點點指示
    if (dayScheds.length > 0) {
      dayScheds.slice(0,2).forEach(function(s){
        h += '<div style="font-size:10px;padding:1px 3px;border-radius:3px;margin-bottom:1px;background:'+(isToday?'rgba(255,255,255,.25)':'var(--al)')+';color:'+(isToday?'#FFF':'var(--acc)')+';overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:100%">' + (s.schedule_time?s.schedule_time.slice(0,5)+' ':'') + s.title + '</div>';
      });
      if (dayScheds.length > 2) h += '<div style="font-size:10px;color:'+(isToday?'rgba(255,255,255,.7)':'var(--t3)')+'>+' + (dayScheds.length-2) + '</div>';
    }
    if (dayLoans.length > 0) {
      h += '<div style="font-size:10px;padding:1px 3px;border-radius:3px;background:'+(isToday?'rgba(255,255,255,.2)':'var(--yl)')+';color:'+(isToday?'#FFF':'var(--yel)')+';overflow:hidden;white-space:nowrap">💰 貸款提醒</div>';

  h += '<div id="day-detail" style="margin-top:12px"></div>';

function buildWeekView(el, loanAlerts, weekStart, weekEnd, todayStr) {
  var card = document.createElement('div'); card.className = 'card';
  var h = '<div class="ct">📋 本週待辦（' + (weekStart.getMonth()+1) + '/' + weekStart.getDate() + ' – ' + (weekEnd.getMonth()+1) + '/' + weekEnd.getDate() + '）</div>';

  var weekDays = [];
  for (var i=0; i<7; i++) { var d = new Date(weekStart); d.setDate(weekStart.getDate()+i); weekDays.push(d); }
  var hasAny = false;

  weekDays.forEach(function(day) {
    var dateStr = day.toISOString().split('T')[0];
    var dayScheds = schedules.filter(function(s){ return s.schedule_date === dateStr; });
    var dayLoans  = loanAlerts.filter(function(r){ return r.remind_date === dateStr; });
    if (dayScheds.length === 0 && dayLoans.length === 0) return;
    hasAny = true;
    var isToday = dateStr === todayStr;
    var dayNames = ['日','一','二','三','四','五','六'];
    h += '<div style="margin-bottom:12px">';
    h += '<div style="font-size:14px;font-weight:600;color:'+(isToday?'var(--acc)':'var(--t2)')+';margin-bottom:6px;padding:4px 8px;background:'+(isToday?'var(--al)':'var(--inp)')+';border-radius:6px">';
    h += (day.getMonth()+1) + '/' + day.getDate() + ' 週' + dayNames[day.getDay()] + (isToday?' · 今天':'');
    h += '</div>';
    dayScheds.forEach(function(s){
      h += buildScheduleItem(s);
    });
    dayLoans.forEach(function(r){
      h += '<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--yl);border-radius:8px;margin-bottom:5px">';
      h += '<span style="font-size:18px">💰</span><div style="flex:1"><div style="font-size:14px;font-weight:500">' + r.lead_name + ' · ' + (r.loan_type||'貸款') + ' 再辦提醒</div>';
      h += '<div style="font-size:12px;color:var(--t2)">距設定日起 ' + r.months + ' 個月</div></div></div>';
    });
    h += '</div>';
  });

  if (!hasAny) h += '<div style="text-align:center;padding:20px;color:var(--t2)">本週無待辦行程</div>';
  card.innerHTML = h;
  el.appendChild(card);
}

function buildScheduleItem(s) {
  var isAuto = s.type === 'auto_status';

  var typeLabel = isAuto?'進度更新':s.type==='follow_up'?'跟進':s.type==='loan_apply'?'送件':s.type==='reminder'?'提醒':'其他';
  var editId = 'sch-edit-' + s.id;
  var leadOptions = '<option value="">— 無 —</option>' + leads.map(function(l){
    return '<option value="'+l.id+'"'+(s.lead_id===l.id?' selected':'')+'>'+l.name+'</option>';
  }).join('');

  var h = '<div style="background:'+(isAuto?'var(--bl)':'var(--inp)')+';border-left:3px solid '+typeColor+';border-radius:0 8px 8px 0;margin-bottom:6px;overflow:hidden">';

  h += '<div style="flex:1">';
  h += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">';
  h += '<span style="font-size:14px;font-weight:500;'+(s.is_done?'text-decoration:line-through;color:var(--t3)':'color:var(--t1)')+'">'+s.title+'</span>';
  h += '<span style="font-size:11px;padding:1px 5px;border-radius:4px;background:'+(isAuto?'var(--bl)':'var(--al)')+';color:'+typeColor+'">'+typeLabel+'</span>';
  if (s.is_done) h += '<span style="font-size:11px;color:var(--grn)">✓</span>';
  h += '</div>';
  if (s.leads) h += '<div style="font-size:12px;color:var(--t2)">👤 ' + s.leads.name + '</div>';
  if (s.schedule_time) h += '<div style="font-size:12px;color:var(--t3)">🕐 ' + s.schedule_time.slice(0,5) + '</div>';
  if (s.description) h += '<div style="font-size:12px;color:var(--t2);margin-top:2px">'+s.description+'</div>';
  h += '</div>';
  h += '<span style="font-size:12px;color:var(--t3);align-self:center">✏️</span>';
  h += '</div>';

  // 展開編輯區
  h += '<div id="'+editId+'" style="display:none;padding:10px 12px;border-top:0.5px solid var(--bdr);background:var(--card)">';
  if (!isAuto) {
    h += '<div class="frow"><div class="flbl">標題</div><input class="fi" id="se-title-'+s.id+'" value="'+(s.title||'').replace(/"/g,'&quot;')+'"></div>';
    h += '<div class="frow2" style="margin-top:6px"><div class="frow"><div class="flbl">日期</div><input class="fi" id="se-date-'+s.id+'" type="date" value="'+(s.schedule_date||'')+'"></div>';
    h += '<div class="frow"><div class="flbl">時間</div><input class="fi" id="se-time-'+s.id+'" type="time" value="'+(s.schedule_time?s.schedule_time.slice(0,5):'')+'"></div></div>';
    h += '<div class="frow2" style="margin-top:6px"><div class="frow"><div class="flbl">類型</div><select class="fi" id="se-type-'+s.id+'">';
    ['follow_up:跟進','loan_apply:送件','reminder:提醒','other:其他'].forEach(function(opt){
      var v=opt.split(':')[0], l2=opt.split(':')[1];
      h += '<option value="'+v+'"'+(s.type===v?' selected':'')+'>'+l2+'</option>';
    });
    h += '</select></div>';
    h += '<div class="frow"><div class="flbl">綁定客戶</div><select class="fi" id="se-lead-'+s.id+'">'+leadOptions+'</select></div></div>';
    h += '<div class="frow" style="margin-top:6px"><div class="flbl">備註</div><input class="fi" id="se-desc-'+s.id+'" value="'+(s.description||'').replace(/"/g,'&quot;')+'"></div>';
    h += '<div style="display:flex;gap:6px;margin-top:8px">';
    if (!s.is_done) h += '<button onclick="doneSchedule(\''+s.id+'\')" style="padding:6px 10px;background:transparent;border:0.5px solid rgba(45,138,78,.3);color:var(--grn);border-radius:6px;cursor:pointer;font-family:var(--sans);font-size:13px">✓ 完成</button>';
    h += '<button onclick="deleteSchedule(\''+s.id+'\')" style="padding:6px 10px;background:transparent;border:0.5px solid rgba(192,64,48,.3);color:var(--red);border-radius:6px;cursor:pointer;font-family:var(--sans);font-size:13px">刪除</button>';

  }
  h += '</div></div>';
  return h;

  var el = document.getElementById('member-content');
  var html = '<div style="font-size:18px;font-weight:600;margin-bottom:14px">貸款試算工具</div>';
  html += '<div class="card"><div class="ct">月繳金額試算</div>';
  html += '<div class="frow"><div class="flbl">貸款金額（元）</div><input class="fi" id="calc-amt" type="number" placeholder="500000" inputmode="numeric" oninput="calcLoan()"></div>';
  html += '<div class="frow2" style="margin-top:10px"><div class="frow"><div class="flbl">貸款年限</div><select class="fi" id="calc-years" onchange="calcLoan()"><option value="1">1年</option><option value="2">2年</option><option value="3" selected>3年</option><option value="5">5年</option><option value="7">7年</option><option value="10">10年</option><option value="20">20年</option><option value="30">30年</option></select></div>';
  html += '<div class="frow"><div class="flbl">年利率（%）</div><input class="fi" id="calc-rate" type="number" placeholder="6.0" step="0.1" value="6.0" inputmode="decimal" oninput="calcLoan()"></div></div>';
  html += '<div style="background:linear-gradient(135deg,var(--al),rgba(200,81,26,.05));border:0.5px solid rgba(200,81,26,.3);border-radius:10px;padding:16px;margin-top:14px;text-align:center">';
  html += '<div style="font-size:15px;color:var(--t2);margin-bottom:6px">每月應繳</div>';
  html += '<div style="font-size:36px;font-weight:700;color:var(--acc)" id="calc-monthly">—</div></div>';
  html += '<div id="calc-detail" style="margin-top:12px"></div></div>';
  el.innerHTML = html;
  calcLoan();
}

function calcLoan() {
  var amt = parseFloat(gv('calc-amt')) || 0;
  var years = parseInt(gv('calc-years')) || 3;
  var rate = parseFloat(gv('calc-rate')) || 6;
  var monthlyEl = document.getElementById('calc-monthly');
  var detailEl = document.getElementById('calc-detail');
  if (!monthlyEl) return;
  if (amt <= 0) { monthlyEl.textContent = '—'; if (detailEl) detailEl.innerHTML = ''; return; }
  var mr = rate / 100 / 12;
  var n = years * 12;
  var payment = mr === 0 ? amt / n : amt * mr * Math.pow(1+mr,n) / (Math.pow(1+mr,n)-1);
  var totalPay = payment * n;
  var totalInt = totalPay - amt;
  monthlyEl.textContent = '$' + Math.round(payment).toLocaleString();
  if (detailEl) {
    detailEl.innerHTML = '<div class="ri"><span class="rl">總還款金額</span><span class="rv">$' + Math.round(totalPay).toLocaleString() + '</span></div>';
    detailEl.innerHTML += '<div class="ri"><span class="rl">總利息支出</span><span class="rv" style="color:var(--red)">$' + Math.round(totalInt).toLocaleString() + '</span></div>';
  }
}

async function analyzeScam() {
  var desc = gv('af-desc');
  var el = document.getElementById('af-analysis');
  if (!desc || !el) return;
  el.innerHTML = '<div class="ib-yel">AI 分析中…</div>';
  try {
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:400,
        messages:[{ role:'user', content:'你是台灣貸款詐騙辨識專家。分析以下情況，給出詐騙風險（0-100%）、手法說明、建議行動。用繁體中文，格式：風險：XX%\n手法：...\n建議：...\n\n情況：' + desc }]
      })
    });
    var data = await res.json();
    var text = data.content && data.content[0] ? data.content[0].text : '無法分析';
    var riskMatch = text.match(/風險[：:]\s*(\d+)/);
    var risk = riskMatch ? parseInt(riskMatch[1]) : 50;
    var color = risk >= 70 ? 'var(--red)' : risk >= 40 ? 'var(--yel)' : 'var(--grn)';
    el.innerHTML = '<div class="card"><div class="ct">AI 分析結果</div>';
    el.innerHTML += '<div style="text-align:center;padding:16px 0"><div style="font-size:16px;color:var(--t2);margin-bottom:6px">詐騙風險評估</div>';
    el.innerHTML += '<div style="font-size:48px;font-weight:700;color:' + color + '">' + risk + '%</div></div>';
    el.innerHTML += '<div style="font-size:15px;color:var(--t1);line-height:1.7;white-space:pre-line">' + text + '</div>';
    if (risk >= 40) el.innerHTML += '<div style="margin-top:10px;text-align:center"><a href="tel:165" style="display:inline-block;padding:10px 24px;background:var(--red);color:#FFF;border-radius:8px;font-size:15px;font-weight:500;text-decoration:none">撥打 165 確認</a></div>';
    el.innerHTML += '</div>';
  } catch(e) {
    el.innerHTML = '<div class="ib-red">分析失敗，請稍後再試或直接撥打 165</div>';
  }
}

function makeStepsHtml(step) {
  var names = ['確認顧問','授權同意','基本資料','收入負債','MyData','確認送出'];
  var html = '<div class="steps" style="margin-bottom:14px">';
  names.forEach(function(s, i) {
    var sc = i < step ? 'sc-done' : i === step ? 'sc-act' : 'sc-todo';
    var lb = i < step ? 'sld' : i === step ? 'sla' : 'slt';
    var num = i < step ? '✓' : (i+1);
    html += '<div class="step"><div class="sc ' + sc + '">' + num + '</div><div class="slbl ' + lb + '">' + s + '</div></div>';
    if (i < names.length - 1) html += '<div class="step-line' + (i < step ? ' done' : '') + '"></div>';
  });
  html += '</div>';
  return html;
}

function makeConsentRow(id, key, label, sub) {
  var row = document.createElement('div'); row.className = 'tgl-row'; row.id = id;
  var isMD = ['income','labor','health'].indexOf(key) >= 0;
  row.innerHTML = '<div class="tgl-info"><div class="tgl-t">' + label + '</div>' + (sub ? '<div class="tgl-s">' + sub + '</div>' : '') + '</div>' +
    '<div style="text-align:center"><div class="tgl" id="' + id + '-t"></div><div class="tgl-lbl" id="' + id + '-l" style="color:var(--t3)">不同意</div></div>';
  row.addEventListener('click', function() {
    var t = document.getElementById(id + '-t');
    var l = document.getElementById(id + '-l');
    if (!t) return;
    var on = t.classList.contains('on') || t.classList.contains('on-blu');
    if (on) {
      t.classList.remove('on', 'on-blu');
      if (l) { l.textContent = '不同意'; l.style.color = 'var(--t3)'; }
      row.classList.remove('opted', 'opted-blu');
      clientConsents[key] = false;
    } else {
      t.classList.add(isMD ? 'on-blu' : 'on');
      if (l) { l.textContent = '同意'; l.style.color = isMD ? 'var(--blu)' : 'var(--grn)'; }
      row.classList.add(isMD ? 'opted-blu' : 'opted');
      clientConsents[key] = true;
    }
  });
  return row;
}

function calcClientLoan() {
  var amtWan = parseFloat(document.getElementById('cc-amt') ? document.getElementById('cc-amt').value : 0) || 0;
  var amt = amtWan * 10000;
  var rate = parseFloat(document.getElementById('cc-rate') ? document.getElementById('cc-rate').value : 6) || 6;
  var years = parseInt(document.getElementById('cc-years') ? document.getElementById('cc-years').value : 3) || 3;
  var mEl = document.getElementById('cc-monthly');
  var dEl = document.getElementById('cc-detail');
  if (!mEl || amt <= 0) { if (mEl) mEl.textContent = '—'; return; }
  var mr = rate / 100 / 12;
  var n = years * 12;
  var payment = mr === 0 ? amt / n : amt * mr * Math.pow(1+mr,n) / (Math.pow(1+mr,n)-1);
  var total = payment * n;
  var interest = total - amt;
  mEl.textContent = '$' + Math.round(payment).toLocaleString();
  if (dEl) dEl.innerHTML = '總還款 $' + Math.round(total).toLocaleString() + '　利息 $' + Math.round(interest).toLocaleString() + '　共 ' + n + ' 期';
}

function toggleConsent(rowId, tglId, lblId, key) {
  var t = document.getElementById(tglId);
  var l = document.getElementById(lblId);
  var r = document.getElementById(rowId);
  if (!t) return;
  var on = t.classList.contains('on') || t.classList.contains('on-blu');
  var isMD = ['income','labor','health'].indexOf(key) >= 0;
  if (on) {
    t.classList.remove('on','on-blu');
    if (l) { l.textContent='不同意'; l.style.color='var(--t3)'; }
    if (r) r.classList.remove('opted','opted-blu');
    clientConsents[key] = false;
  } else {
    t.classList.add(isMD ? 'on-blu' : 'on');
    if (l) { l.textContent='同意'; l.style.color=isMD?'var(--blu)':'var(--grn)'; }
    if (r) r.classList.add(isMD ? 'opted-blu' : 'opted');
    clientConsents[key] = true;
  }
}

  // 先存一次確保最新值都在 clientFormData

  // 從 clientFormData 讀（DOM 在 step5 不一定存在）
  var gf = function(id) { return clientFormData[id] || ''; };
  var g  = function(id) { var el = document.getElementById(id); return (el ? el.value : '') || gf(id); };

  var salaryWan = parseFloat(gf('c-salary')) || 0;
  var salary = salaryWan > 0 ? Math.round(salaryWan * 10000) : null;

  var ccLimitYuan = Math.round(ccLimitWan * 10000);
  var laborType = g('c-labor-type') || 'none';

    age: parseInt(g('c-age')) || null,

    has_collateral: payload.has_collateral,

    alert_status: payload.alert_status,

    fin_reject_count: 0,

  // 送出留言按鈕
  var sendBtn = document.createElement('button');

// ── 最高可貸金額計算 ──
function calcMaxLoan() {
  var salary = parseInt(document.getElementById("n-salary") ? document.getElementById("n-salary").value : 0) || 0;
  var laborSalary = parseInt(document.getElementById("n-labor-salary") ? document.getElementById("n-labor-salary").value : 0) || 0;
  var hasTransfer = document.getElementById("n-transfer") ? document.getElementById("n-transfer").value === "true" : false;
  var ccLimit = parseInt(document.getElementById("n-cc-limit") ? document.getElementById("n-cc-limit").value : 0) || 0;
  var base = hasTransfer ? salary : (laborSalary || salary);
  var max = base > 0 ? Math.max(0, base * 22 - ccLimit) : 0;
  var el = document.getElementById("max-loan-display");
  if (el) el.textContent = max > 0 ? "$" + max.toLocaleString() : "—";
}

// ── 不動產比率計算 ──
function calcPropRatio() {
  var propVal = parseInt(document.getElementById("n-prop-val") ? document.getElementById("n-prop-val").value : 0) || 0;
  var p1 = parseInt(document.getElementById("n-prop1-amt") ? document.getElementById("n-prop1-amt").value : 0) || 0;
  var p2 = parseInt(document.getElementById("n-prop2-amt") ? document.getElementById("n-prop2-amt").value : 0) || 0;
  var p3 = parseInt(document.getElementById("n-prop3-amt") ? document.getElementById("n-prop3-amt").value : 0) || 0;
  var total = p1 + p2 + p3;
  var el = document.getElementById("prop-ratio-display");
  if (!el || propVal <= 0) { if (el) el.innerHTML = ""; return; }
  var ratio = parseFloat((total / propVal * 100).toFixed(1));
  var status = ratio <= propThresholds.t1 ? "ok" : ratio <= propThresholds.t2 ? "warn" : "bad";
  var col = status === "ok" ? "grn" : status === "warn" ? "yel" : "red";
  var label = status === "ok" ? "有效成交" : status === "warn" ? "有效買賣" : "空間不足";
  el.innerHTML = "<div style='background:var(--" + col + "-l);border:0.5px solid rgba(45,138,78,.2);border-radius:8px;padding:8px 12px'>" +
    "<div style='font-size:14px;font-weight:500;color:var(--" + col + ")'>負債比：" + ratio + "% — " + label + "</div>" +
    "<div style='font-size:12px;color:var(--t2);margin-top:2px'>合計 $" + total.toLocaleString() + " ÷ 估價 $" + propVal.toLocaleString() + "</div></div>";
}

// 開啟網頁並自動複製文字到剪貼簿
function openAndCopy(url, text, btnId) {
  // 先複製
  navigator.clipboard.writeText(text).then(function() {
    var btn = document.getElementById(btnId);
    if (btn) {
      var orig = btn.innerHTML;
      btn.innerHTML = '✓ 已複製「' + text + '」，請貼到網頁';
      btn.style.background = 'var(--grn)';
      btn.style.color = '#FFF';
      btn.style.borderColor = 'var(--grn)';
      setTimeout(function() {
        if (btn) { btn.innerHTML = orig; btn.style.background = ''; btn.style.color = ''; btn.style.borderColor = ''; }
      }, 4000);
    }
  }).catch(function() {
    // 複製失敗也沒關係，還是開啟網頁
  });
  // 開啟網頁
  window.open(url, '_blank');
}

  var el = document.getElementById("verdict-result-" + leadId);
  if (!el) return;
  var addr = lead ? (lead.address || "") : "";
  var huji = lead ? (lead.huji_address || "") : "";
  var m1 = addr.match(/^(.{2,3}[市縣])(.{2,4}[區鄉鎮])/);
  var addrCity = m1 ? m1[1] + m1[2] : "";
  var m2 = huji.match(/^(.{2,3}[市縣])(.{2,4}[區鄉鎮])/);
  var hujiCity = m2 ? m2[1] + m2[2] : "";

  el.innerHTML = "<div style='text-align:center;padding:12px;color:var(--t2)'><div class='spinner' style='margin:0 auto 8px'></div>搜尋判決書中…</div>";

  var searchUrl = "https://lawsearch.judicial.gov.tw/default.aspx#searchBar/?kw=" + encodeURIComponent(name) + "&judtype=JUDBOOK";
  try {
    var proxyUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent(searchUrl);
    var res = await fetch(proxyUrl, { signal: AbortSignal.timeout(12000) });
    if (!res.ok) throw new Error("fetch failed");
    var data = await res.json();
    var rawHtml = data.contents || "";
    var results = parseVerdicts(rawHtml, name, addrCity, hujiCity);
    showVerdictResults(el, results, name, addrCity, hujiCity, searchUrl);
  } catch(e) {
    showVerdictFallback(el, name, addrCity, hujiCity, searchUrl);
  }
  logAccess(leadId, "verdict");
}

function parseVerdicts(rawHtml, name, addrCity, hujiCity) {
  var results = { total: 0, local: [], others: [], byCity: {} };
  var parser = new DOMParser();
  var doc = parser.parseFromString(rawHtml, "text/html");
  var seen = {};

  // 台灣各地方法院對應縣市
  var courtCityMap = {
    '臺北':'台北市', '台北':'台北市',
    '新北':'新北市',
    '桃園':'桃園市',
    '新竹':'新竹市',
    '苗栗':'苗栗縣',
    '臺中':'台中市', '台中':'台中市',
    '彰化':'彰化縣',
    '南投':'南投縣',
    '雲林':'雲林縣',
    '嘉義':'嘉義市',
    '臺南':'台南市', '台南':'台南市',
    '高雄':'高雄市',
    '屏東':'屏東縣',
    '宜蘭':'宜蘭縣',
    '花蓮':'花蓮縣',
    '臺東':'台東縣', '台東':'台東縣',
    '澎湖':'澎湖縣',
    '金門':'金門縣',
    '連江':'連江縣',
  };

  doc.querySelectorAll("a").forEach(function(a) {
    var title = a.textContent.trim();
    var href = a.href || a.getAttribute("href") || "";
    if (title.length < 6 || seen[title]) return;
    if (href && (href.includes("judicial") || href.includes("jud") || href.includes("lawsearch"))) {
      seen[title] = true;

      // 判斷屬於哪個縣市法院
      var detectedCity = '';
      Object.keys(courtCityMap).forEach(function(key) {
        if (title.includes(key)) detectedCity = courtCityMap[key];
      });
      if (!detectedCity) detectedCity = '其他';

      var isLocal = (addrCity && (title.includes(addrCity.slice(0,2)) || addrCity.includes(detectedCity.slice(0,2)))) ||
                   (hujiCity && (title.includes(hujiCity.slice(0,2)) || hujiCity.includes(detectedCity.slice(0,2))));

      var item = { title: title, href: href, city: detectedCity };
      if (isLocal) results.local.push(item);
      else results.others.push(item);

      // 依縣市分組
      if (!results.byCity[detectedCity]) results.byCity[detectedCity] = [];
      results.byCity[detectedCity].push(item);
    }
  });
  results.total = results.local.length + results.others.length;
  return results;
}

function showVerdictResults(el, results, name, addrCity, hujiCity, searchUrl) {
  var locStr = [addrCity, hujiCity].filter(Boolean).join("、") || "";
  var h = "";

  if (results.total === 0) {
    h = "<div class='ib-grn' style='font-size:14px'>✓ 未查到「" + name + "」相關裁判書紀錄</div>";
  } else {
    // 統計列
    h += "<div style='display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px'>";
    h += "<span class='badge b-yel'>共 " + results.total + " 筆</span>";
    if (results.local.length > 0) h += "<span class='badge b-red'>⚠️ " + (locStr||'居住地') + " " + results.local.length + " 筆</span>";
    Object.keys(results.byCity).forEach(function(city) {
      if (city !== '其他') h += "<span class='badge b-gray'>" + city + " " + results.byCity[city].length + "筆</span>";
    });
    h += "</div>";

    // 居住地/戶籍地相關（紅色警示）
    if (results.local.length > 0) {
      h += "<div style='background:var(--rl);border:0.5px solid rgba(192,64,48,.3);border-radius:10px;padding:12px;margin-bottom:10px'>";
      h += "<div style='font-size:14px;font-weight:600;color:var(--red);margin-bottom:8px'>⚠️ " + (locStr||'居住地區') + " 相關判決書（" + results.local.length + " 筆）</div>";
      results.local.forEach(function(item) {
        h += "<div style='padding:8px 0;border-bottom:0.5px solid rgba(192,64,48,.15)'>";
        h += "<div style='font-size:14px;color:var(--t0);margin-bottom:3px'>" + item.title + "</div>";
        h += "<a href='" + item.href + "' target='_blank' style='font-size:12px;color:var(--blu)'>查看判決書全文 →</a></div>";
      });
      h += "</div>";
    }

    // 依縣市分組顯示其他結果
    Object.keys(results.byCity).forEach(function(city) {
      var items = results.byCity[city];
      var isLocal = results.local.some(function(l){return l.city===city;});
      if (isLocal) return; // 已在上方顯示
      h += "<div style='margin-bottom:8px'>";
      h += "<div style='font-size:13px;font-weight:600;color:var(--t2);margin-bottom:4px;padding:4px 0;border-bottom:0.5px solid var(--bdr)'>";
      h += "📍 " + city + "（" + items.length + " 筆）</div>";
      items.slice(0, 3).forEach(function(item) {
        h += "<div style='padding:5px 0;border-bottom:0.5px solid rgba(255,255,255,.05)'>";
        h += "<div style='font-size:13px;color:var(--t1)'>" + item.title + "</div>";
        h += "<a href='" + item.href + "' target='_blank' style='font-size:12px;color:var(--blu)'>查看 →</a></div>";
      });
      if (items.length > 3) h += "<div style='font-size:12px;color:var(--t3);padding:3px 0'>另有 " + (items.length-3) + " 筆…</div>";
      h += "</div>";
    });
  }

  h += "<div style='margin-top:8px;padding-top:8px;border-top:0.5px solid var(--bdr)'>";
  h += "<a href='" + searchUrl + "' target='_blank' style='display:inline-block;font-size:13px;padding:7px 14px;background:var(--yel);color:#FFF;border-radius:7px;text-decoration:none'>司法院完整查詢（帶入姓名）→</a>";
  h += "<div style='font-size:12px;color:var(--t3);margin-top:6px'>依個資法第19條第1項第5款，查詢公開裁判書。不影響評估分數。</div>";
  h += "</div>";
  el.innerHTML = h;
}

function showVerdictFallback(el, name, addrCity, hujiCity, searchUrl) {
  var locStr = [addrCity, hujiCity].filter(Boolean).join("、");
  el.innerHTML =
    "<div style='background:var(--inp);border-radius:8px;padding:10px 12px'>" +
    "<div style='font-size:14px;font-weight:500;color:var(--t1);margin-bottom:6px'>請手動查詢</div>" +
    "<div style='font-size:13px;color:var(--t2);line-height:1.7;margin-bottom:8px'>" +
    "點下方連結，已帶入姓名「<strong style='color:var(--t0)'>" + name + "</strong>」" +
    (locStr ? "<br>篩選 <strong style='color:var(--t0)'>" + locStr + "</strong> 地區判決書" : "") +
    "</div>" +
    "<a href='" + searchUrl + "' target='_blank' " +
    "style='display:inline-block;padding:8px 16px;background:var(--yel);color:#FFF;border-radius:7px;font-size:14px;text-decoration:none'>前往司法院裁判書搜尋（已帶入姓名）→</a>" +
    "</div>";
}

init();
</script>
