<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>顧問PRO</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#111111;--bg2:#1A1A1A;--card:#242424;--bdr:rgba(255,255,255,.08);--bdr2:rgba(255,255,255,.15);
  --inp:#2E2E2E;--inpt:#EEE;
  --t0:#FFF;--t1:#CCC;--t2:#888;--t3:#555;
  --acc:#C8511A;--acc2:#E8712A;--al:rgba(200,81,26,.12);
  --grn:#2D8A4E;--gl:rgba(45,138,78,.12);
  --red:#C04030;--rl:rgba(192,64,48,.12);
  --yel:#B88020;--yl:rgba(184,128,32,.12);
  --blu:#2A6AB8;--bl:rgba(42,106,184,.12);
  --serif:'Georgia',serif;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--t0);font-family:var(--sans);overflow-x:hidden;font-size:16px}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}

/* ── LAYOUT ── */
#app{height:100%;display:flex;flex-direction:column}
.page{display:none;flex:1;overflow-y:auto}
.page.active{display:flex;flex-direction:column}

/* ── AUTH PAGES ── */
.auth-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:30px 16px;width:100%;overflow-y:auto}
.auth-logo{font-size:34px;font-weight:800;margin-bottom:8px;letter-spacing:-.5px;text-align:center}
.auth-logo span{color:var(--acc)}
.auth-sub{font-size:16px;color:var(--t2);margin-bottom:24px;text-align:center}
.auth-box{background:var(--card);border:0.5px solid var(--bdr2);border-radius:16px;padding:24px 18px;width:100%;max-width:480px}
.auth-title{font-size:20px;font-weight:600;margin-bottom:20px}
.auth-tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:20px}
.auth-tab{padding:11px 8px;font-size:14px;cursor:pointer;color:var(--t2);border:0.5px solid var(--bdr);background:transparent;font-family:var(--sans);border-radius:8px;transition:all .15s;text-align:center;font-weight:400;line-height:1.3}
.auth-tab.on{color:var(--acc);border-color:var(--acc);background:var(--al);font-weight:500}
.auth-tab:hover{border-color:var(--bdr2);color:var(--t0)}
.frow{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
.flbl{font-size:16px;color:var(--t1);font-weight:500}
.fi{width:100%;padding:12px 14px;background:var(--inp);border:0.5px solid var(--bdr2);border-radius:9px;color:var(--inpt);font-size:16px;font-family:var(--sans);transition:border-color .15s;-webkit-appearance:none}
.fi:focus{outline:none;border-color:var(--acc)}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-p{width:100%;padding:12px;background:var(--acc);color:#FFF;border:none;border-radius:9px;font-size:16px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:all .2s;margin-top:4px}
.btn-p:hover{background:var(--acc2)}
.btn-p:disabled{opacity:.5;cursor:not-allowed}
.btn-sm{padding:7px 14px;background:transparent;color:var(--t1);border:0.5px solid var(--bdr2);border-radius:7px;font-size:16px;cursor:pointer;font-family:var(--sans);transition:all .15s}
.btn-sm:hover{border-color:var(--t2)}
.btn-grn{padding:8px 16px;background:var(--grn);color:#FFF;border:none;border-radius:8px;font-size:16px;font-weight:500;cursor:pointer;font-family:var(--sans)}
.auth-hint{font-size:16px;color:var(--t2);text-align:center;margin-top:14px;line-height:1.5}
.err-msg{background:var(--rl);border:0.5px solid rgba(192,64,48,.3);border-radius:7px;padding:8px 12px;font-size:16px;color:#E06050;margin-bottom:12px;display:none}
.ok-msg{background:var(--gl);border:0.5px solid rgba(45,138,78,.3);border-radius:7px;padding:8px 12px;font-size:16px;color:#50C070;margin-bottom:12px;display:none}

/* ── TOPBAR ── */
.topbar{background:var(--bg);border-bottom:0.5px solid var(--bdr);padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;flex-shrink:0}
.top-logo{font-size:17px;font-weight:800;letter-spacing:-.3px}
.top-logo span{color:var(--acc)}
.top-right{display:flex;align-items:center;gap:8px}
.badge{display:inline-block;font-size:16px;padding:3px 9px;border-radius:20px;font-weight:500}
.b-acc{background:var(--al);color:var(--acc)}
.b-grn{background:var(--gl);color:var(--grn)}
.b-red{background:var(--rl);color:var(--red)}
.b-yel{background:var(--yl);color:var(--yel)}
.b-blu{background:var(--bl);color:var(--blu)}
.b-gray{background:rgba(255,255,255,.06);color:var(--t2)}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--al);color:var(--acc);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;cursor:pointer}

/* ── BOTTOM NAV ── */
.bottom-nav{background:var(--bg);border-top:0.5px solid var(--bdr);display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 6px;cursor:pointer;border:none;background:none;font-family:var(--sans);color:var(--t3);font-size:16px;gap:3px;transition:color .15s}
.bn-item.on{color:var(--acc)}
.bn-icon{font-size:20px;line-height:1}

/* ── CONTENT ── */
.content{padding:14px 16px;flex:1}
.card{background:var(--card);border:0.5px solid var(--bdr);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.ct{font-size:16px;font-weight:600;color:var(--t0);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:5px;flex-wrap:wrap}
.ri{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:0.5px solid var(--bdr);font-size:16px;gap:6px}
.ri:last-child{border-bottom:none}
.rl{color:var(--t2);font-size:16px;flex-shrink:0;min-width:85px}
.rv{font-weight:500;color:var(--t0);text-align:right;flex:1;font-size:16px}
.sl{font-size:16px;font-weight:600;color:var(--t1);margin:10px 0 6px;padding-bottom:4px;border-bottom:0.5px solid var(--bdr)}
.ib-acc{background:var(--al);border:0.5px solid rgba(200,81,26,.3);border-radius:8px;padding:8px 11px;font-size:16px;color:var(--acc);line-height:1.5;margin-bottom:8px}
.ib-grn{background:var(--gl);border:0.5px solid rgba(45,138,78,.3);border-radius:8px;padding:8px 11px;font-size:16px;color:var(--grn);line-height:1.5;margin-bottom:8px}
.ib-red{background:var(--rl);border:0.5px solid rgba(192,64,48,.3);border-radius:8px;padding:8px 11px;font-size:16px;color:var(--red);line-height:1.5;margin-bottom:8px}
.ib-yel{background:var(--yl);border:0.5px solid rgba(184,128,32,.3);border-radius:8px;padding:8px 11px;font-size:16px;color:var(--yel);line-height:1.5;margin-bottom:8px}

/* ── STATS ── */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
.stat-card{background:var(--card);border:0.5px solid var(--bdr);border-radius:10px;padding:11px 13px}
.stat-l{font-size:16px;color:var(--t2);margin-bottom:3px}
.stat-v{font-size:24px;font-weight:700;color:var(--t0)}
.stat-s{font-size:16px;color:var(--t3);margin-top:2px}

/* ── PROB CARDS ── */
.prob-row{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:6px}
.prob-row-2{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.pcard{border:0.5px solid var(--bdr);border-radius:8px;padding:7px;text-align:center;background:var(--inp)}
.pcard-n{font-size:16px;color:var(--t3);margin-bottom:3px}
.pcard-v{font-size:16px;font-weight:700}
.pb-w{height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;margin-top:3px}
.pb-f{height:100%;border-radius:2px}
.p-red{color:var(--red)}.pb-red{background:var(--red)}
.p-yel{color:var(--yel)}.pb-yel{background:var(--yel)}
.p-grn{color:var(--grn)}.pb-grn{background:var(--grn)}
.p-lgrn{color:#259A3E}.pb-lgrn{background:#259A3E}
.p-none{color:var(--t3)}.pb-none{background:var(--bdr2)}

/* ── LEADS LIST ── */
.lead-item{background:var(--card);border:0.5px solid var(--bdr);border-radius:10px;padding:11px 13px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;display:flex;align-items:center;gap:10px}
.lead-item:hover{border-color:var(--bdr2)}
.lead-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;flex-shrink:0}
.lead-info{flex:1;min-width:0}
.lead-name{font-size:16px;font-weight:500;color:var(--t0)}
.lead-sub{font-size:16px;color:var(--t2);margin-top:2px}
.lead-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}

/* ── FORM ── */
.form-section{background:var(--card);border:0.5px solid var(--bdr);border-radius:12px;padding:14px;margin-bottom:10px}
.fs-title{font-size:16px;font-weight:600;color:var(--t1);margin-bottom:10px;padding-bottom:6px;border-bottom:0.5px solid var(--bdr);display:flex;align-items:center;gap:6px}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.frow.full{grid-column:1/-1}
.req{color:var(--acc);font-size:16px}

/* ── TOGGLE ── */
.tgl-row{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border:0.5px solid var(--bdr);border-radius:8px;margin-bottom:5px;cursor:pointer;transition:border-color .15s}
.tgl-row.opted{border-color:var(--grn)}
.tgl-row.opted-blu{border-color:var(--blu)}
.tgl-row.req-row{opacity:.7;pointer-events:none}
.tgl-info{flex:1}
.tgl-t{font-size:16px;font-weight:500;color:var(--t0)}
.tgl-s{font-size:16px;color:var(--t2);margin-top:2px;line-height:1.4}
.tgl{width:32px;height:18px;border-radius:9px;background:var(--bdr2);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;display:inline-block;margin-top:2px}
.tgl.on{background:var(--grn)}
.tgl.on-blu{background:var(--blu)}
.tgl::after{content:'';position:absolute;width:12px;height:12px;border-radius:50%;background:white;top:3px;left:3px;transition:left .2s}
.tgl.on::after,.tgl.on-blu::after{left:17px}
.tgl-lbl{font-size:16px;margin-top:3px;text-align:center;white-space:nowrap}
.all-btn{display:flex;align-items:center;gap:8px;padding:8px 11px;background:var(--gl);border:0.5px solid rgba(45,138,78,.3);border-radius:8px;cursor:pointer;margin-bottom:6px}
.all-t{font-size:16px;color:var(--grn);font-weight:500}

/* ── STEPS ── */
.steps{display:flex;align-items:center;margin-bottom:14px}
.step{display:flex;flex-direction:column;align-items:center;flex:1}
.sc{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600}
.sc-done{background:var(--grn);color:#FFF}
.sc-act{background:var(--acc);color:#FFF}
.sc-todo{background:var(--inp);color:var(--t3);border:0.5px solid var(--bdr)}
.slbl{font-size:16px;margin-top:2px;text-align:center;white-space:nowrap}
.sld{color:var(--grn)}.sla{color:var(--acc)}.slt{color:var(--t3)}
.step-line{height:0.5px;flex:1;background:var(--bdr);margin-bottom:13px}
.step-line.done{background:var(--grn)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:20px 16px 32px}
.modal-handle{width:36px;height:4px;background:var(--bdr2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:600;margin-bottom:14px}

/* ── SCORE DISPLAY ── */
.score-prop{border-radius:9px;padding:10px 12px;margin-top:8px}
.sp-ok{background:var(--gl);border:0.5px solid rgba(45,138,78,.3)}
.sp-warn{background:var(--yl);border:0.5px solid rgba(184,128,32,.3)}
.sp-bad{background:var(--rl);border:0.5px solid rgba(192,64,48,.3)}

/* ── LOADING ── */
.loading{position:fixed;inset:0;background:rgba(10,10,10,.9);z-index:300;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.loading.show{display:flex}
.spinner{width:32px;height:32px;border:2px solid var(--bdr2);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-t{font-size:16px;color:var(--t1)}

/* ── DESKTOP ── */
@media(min-width:768px){
  .page.active{flex-direction:row}
  .desktop-sidebar{width:220px;min-width:220px;background:var(--bg2);border-right:0.5px solid var(--bdr);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;overflow-y:auto;flex-shrink:0}
  .ds-logo{padding:16px 16px 12px;border-bottom:0.5px solid var(--bdr);font-size:18px;font-weight:800}
  .ds-logo span{color:var(--acc)}
  .ds-navs{padding:8px 8px 0}
  .ds-lbl{font-size:11px;color:var(--t3);padding:0 7px;margin:6px 0 3px;text-transform:uppercase;letter-spacing:.07em}
  .ds-ni{display:flex;align-items:center;gap:7px;padding:9px 11px;border-radius:8px;cursor:pointer;font-size:14px;color:var(--t2);background:transparent;border:none;font-family:var(--sans);width:100%;text-align:left;transition:all .12s}
  .ds-ni:hover{background:rgba(255,255,255,.04);color:var(--t0)}
  .ds-ni.on{background:var(--al);color:var(--acc);font-weight:500}
  .desktop-main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
  .bottom-nav{display:none}
  .topbar{display:none}
  #desktop-topbar{display:flex !important}
  .stat-grid{grid-template-columns:repeat(4,1fr)}
  .prob-row,.prob-row-2{grid-template-columns:repeat(6,1fr)}
}
@media(max-width:767px){
  .desktop-sidebar{display:none}
}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-t" id="loading-text">載入中…</div>
</div>

<div id="app">

<!-- ── 登入/註冊頁 ── -->
<div class="page active" id="page-auth">
  <div class="auth-wrap">
    <div class="auth-logo">顧問<span>PRO</span></div>
    <div class="auth-sub">貸款評估專業平台</div>
    <div class="auth-box">
      <div class="auth-tabs">
        <button class="auth-tab on" onclick="switchAuthTab('login',this)">登入</button>
        <button class="auth-tab" onclick="switchAuthTab('register',this)">加入成為顧問</button>
      </div>
      <div id="err-msg" class="err-msg"></div>
      <div id="ok-msg" class="ok-msg"></div>

      <!-- 登入表單 -->
      <div id="form-login">
        <div class="frow">
          <div class="flbl">Email</div>
          <input class="fi" type="email" id="login-email" placeholder="your@email.com" autocomplete="email">
        </div>
        <div class="frow">
          <div class="flbl">密碼</div>
          <input class="fi" type="password" id="login-pw" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn-p" id="login-btn" onclick="doLogin()">登入</button>
        <div class="auth-hint">還沒有帳號？點上方「加入成為顧問」</div>
      </div>

      <!-- 註冊表單 -->
      <div id="form-register" style="display:none">
        <div class="fg2">
          <div class="frow">
            <div class="flbl">姓名 <span class="req">*</span></div>
            <input class="fi" id="reg-name" placeholder="真實姓名">
          </div>
          <div class="frow">
            <div class="flbl">公司名稱</div>
            <input class="fi" id="reg-company" placeholder="可空白">
          </div>
        </div>
        <div class="frow">
          <div class="flbl">Email <span class="req">*</span></div>
          <input class="fi" type="email" id="reg-email" placeholder="your@email.com" autocomplete="email">
        </div>
        <div class="frow">
          <div class="flbl">手機號碼</div>
          <input class="fi" type="tel" id="reg-phone" placeholder="09XX-XXXXXX">
        </div>
        <div class="fg2">
          <div class="frow">
            <div class="flbl">所在縣市</div>
            <select class="fi" id="reg-city" onchange="updateDistricts()">
              <option value="">選擇縣市</option>
              <option>台北市</option><option>新北市</option><option>桃園市</option>
              <option>台中市</option><option>台南市</option><option>高雄市</option>
              <option>基隆市</option><option>新竹市</option><option>新竹縣</option>
              <option>苗栗縣</option><option>彰化縣</option><option>南投縣</option>
              <option>雲林縣</option><option>嘉義市</option><option>嘉義縣</option>
              <option>屏東縣</option><option>宜蘭縣</option><option>花蓮縣</option>
              <option>台東縣</option><option>澎湖縣</option><option>金門縣</option><option>連江縣</option>
            </select>
          </div>
          <div class="frow">
            <div class="flbl">行政區</div>
            <select class="fi" id="reg-district"><option value="">請先選縣市</option></select>
          </div>

        </div>
        <div class="frow">
          <div class="flbl">密碼 <span class="req">*</span></div>
          <input class="fi" type="password" id="reg-pw" placeholder="至少8碼英數混合" autocomplete="new-password">
        </div>

        <!-- 服務須知 -->
        <div style="background:var(--inp);border-radius:8px;padding:12px 14px;font-size:16px;color:var(--t2);line-height:1.6;max-height:100px;overflow-y:auto;margin:10px 0">
          <strong style="color:var(--t0)">會員服務須知摘要</strong><br>
          本平台供貸款顧問使用。您有義務依個資法保護客戶個人資料，不得超出授權範圍使用、不得轉售客戶資料。違規者停權並保留法律追訴權。完整條款請見服務條款頁面。
        </div>
        <div class="tgl-row opted" id="terms-row" onclick="toggleTerms()">
          <div class="tgl-info">
            <div class="tgl-t">我已閱讀並同意會員服務須知與個資保護義務</div>
            <div class="tgl-s">必要同意，不同意無法建立帳號</div>
          </div>
          <div style="text-align:center">
            <div class="tgl on" id="terms-tgl"></div>
            <div class="tgl-lbl" id="terms-lbl" style="color:var(--grn)">同意</div>
          </div>
        </div>

        <button class="btn-p" id="reg-btn" onclick="doRegister()">建立顧問帳號</button>
        <div class="auth-hint">已有帳號？點上方「登入」</div>
      </div>
    </div>
  </div>
</div>

<!-- ── 會員後台 ── -->
<div class="page" id="page-member">
  <!-- 桌機側欄 -->
  <div class="desktop-sidebar">
    <div class="ds-logo">顧問<span>PRO</span>
      <div style="font-size:12px;color:var(--t3);font-weight:400;margin-top:2px">貸款評估平台</div>
    </div>
    <div class="ds-navs">
      <div class="ds-lbl">會員後台</div>
      <button class="ds-ni on" onclick="navTo('dash',this)">📊 儀表板</button>
      <button class="ds-ni" onclick="navTo('leads',this)">👥 客戶名單</button>
      <button class="ds-ni" onclick="navTo('add-lead',this)">➕ 新增客戶資料</button>
      <button class="ds-ni" onclick="navTo('calendar',this)">📅 行事曆</button>

async function loadDocuments(leadId) {
  var res = await sb.from('lead_documents').select('*').eq('lead_id', leadId).order('created_at');
  if (!res.data) return;
  if (!leadDocuments[leadId]) leadDocuments[leadId] = {};
  res.data.forEach(function(doc) {
    if (!leadDocuments[leadId][doc.type]) leadDocuments[leadId][doc.type] = [];
    var url = sb.storage.from('lead-documents').getPublicUrl(doc.storage_path).data.publicUrl;
    var existing = leadDocuments[leadId][doc.type].find(function(d){return d.id===doc.id;});
    if (!existing) leadDocuments[leadId][doc.type].push({ id: doc.id, url: url, filename: doc.storage_path.split('/').pop(), ai_summary: doc.ai_summary, uploaded_at: new Date(doc.created_at).toLocaleDateString('zh-TW') });
  });
  var lead = leads.find(function(l){return l.id===leadId;});
  if (lead) showLeadDetail(leadId);
}

// ── 上傳圖片並 AI 讀取 ──
async function uploadDoc(event, leadId, type, aiPrompt) {
  var file = event.target.files[0];
  if (!file) return;
  var loadEl = document.getElementById('doc-loading-' + leadId + '-' + type);
  if (loadEl) { loadEl.style.display = 'block'; loadEl.textContent = '⏳ 上傳中...'; }
  try {
    var ext = file.name.split('.').pop() || 'jpg';
    var path = currentUser.id + '/' + leadId + '/' + type + '_' + Date.now() + '.' + ext;
    var upRes = await sb.storage.from('lead-documents').upload(path, file, { upsert: false });
    if (upRes.error) throw new Error('上傳失敗：' + upRes.error.message);
    var publicUrl = sb.storage.from('lead-documents').getPublicUrl(path).data.publicUrl;

    // 存 DB（無 AI 摘要）
    await sb.from('lead_documents').insert({ lead_id: leadId, member_id: currentUser.id, type: type, storage_path: path, ai_summary: null });

    if (!leadDocuments[leadId]) leadDocuments[leadId] = {};
    if (!leadDocuments[leadId][type]) leadDocuments[leadId][type] = [];
    leadDocuments[leadId][type].push({ url: publicUrl, filename: file.name, ai_summary: null, uploaded_at: new Date().toLocaleDateString('zh-TW') });
    if (loadEl) loadEl.style.display = 'none';
    showLeadDetail(leadId);
  } catch(err) {
    if (loadEl) loadEl.style.display = 'none';
    alert('錯誤：' + (err.message||String(err)));
  }
}

async function deleteDoc(leadId, type, idx) {
  if (!confirm('確定刪除此文件？')) return;
  var docs = leadDocuments[leadId] && leadDocuments[leadId][type];
  if (!docs || !docs[idx]) return;
  var doc = docs[idx];
  if (doc.id) await sb.from('lead_documents').delete().eq('id', doc.id);
  docs.splice(idx, 1);
  showLeadDetail(leadId);
}

function fileToBase64(file) {
  return new Promise(function(resolve, reject) {
    var r = new FileReader();
    r.onload = function(e) { resolve(e.target.result.split(',')[1]); };
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

// ══════════════════════════════
// 評分引擎
// ══════════════════════════════
function calcScores(lead) {
  var salary = lead.monthly_salary || 0;
  var laborSalary = lead.labor_salary || salary;
  var hasTransfer = lead.has_salary_transfer;
  var baseSalary = hasTransfer ? salary : (laborSalary || salary);
  var ccLimit = lead.credit_card_limit || 0;
  var maxLoan = Math.max(0, baseSalary * scoreRules.salaryMultiplier - ccLimit);
  var hasCarLic = lead.has_car_license;
  var hasBikeLic = lead.has_bike_license;
  var hasAlert = ['alert','negotiation','rehabilitation','liquidation'].indexOf(lead.alert_status) >= 0;
  var ccAge = lead.credit_card_age || 'none';
  var bankRejCount = parseInt(lead.bank_reject_count) || 0;
  var finRejCount = parseInt(lead.fin_reject_count) || 0;
  var bankRej = lead.bank_recent_reject || 'none';
  var finRej = lead.finance_recent_reject || 'none';
  var R = scoreRules;

  // ── 銀行信貸 ──
  var bank = 0;
  if (hasAlert && R.bankAlertBlock) {
    bank = 0;
  } else if (bankRejCount >= 4 && R.bankRej4Block) {
    bank = 0; // 4次以上封鎖
  } else {
    bank = 40;
    if (hasTransfer) bank += R.bankTransferBonus;
    if (ccAge === '1y+') bank += R.bankCC1y;
    else if (ccAge === '6m+') bank += R.bankCC6m;
    else if (ccAge === '3m+') bank += R.bankCC3m;
    // 婉拒次數（越多扣越重）
    if (bankRejCount === 1) bank += R.bankRej1;
    else if (bankRejCount === 2) bank += R.bankRej2;
    else if (bankRejCount === 3) bank += R.bankRej3;
    // 距今時間
    if (bankRej === '<1m') bank += R.bankRejectLt1m;
    else if (bankRej === '1-3m') bank += R.bankReject1_3m;
    else if (bankRej === 'none') bank += 12;
    bank = Math.min(95, Math.max(0, bank));
  }

  // ── 汽車貸款 ──
  var car = 0;
  if (salary > 0) {
    if (hasCarLic) car += R.carLicBonus;
    car += salary >= 50000 ? 35 : salary >= 35000 ? 25 : salary >= 25000 ? 15 : 5;
    if (finRejCount === 1) car += R.finRej1;
    else if (finRejCount === 2) car += R.finRej2;
    else if (finRejCount > 2) car += R.finRejOver2;
    if (finRej === '<1m') car += R.finRejectLt1m;
    else if (finRej === 'none') car += 15;
    car = Math.min(92, Math.max(0, car));
  }

  // ── 機車貸款 ──
  var bike = 0;
  if (salary > 0) {
    if (hasBikeLic) bike += R.bikeLicBonus;
    bike += salary >= 25000 ? 40 : salary >= 18000 ? 28 : 15;
    if (finRejCount >= 2) bike += R.finRej2;
    else if (finRejCount === 1) bike += R.finRej1;
    if (finRej === '<1m') bike += R.finRejectLt1m;
    else if (finRej === 'none') bike += 15;
    bike = Math.min(95, Math.max(0, bike));
  }

  // ── 商品手機貸 ──
  var phone = 0;
  if (salary >= 22000) {
    phone = 45 + (salary >= 40000 ? 20 : salary >= 30000 ? 12 : 5);
    if (finRejCount >= 2) phone += R.finRej2;
    if (finRej === '<1m') phone += R.finRejectLt1m;
    phone = Math.min(88, Math.max(0, phone));
  }

  // ── 當鋪借貸：沒借=0不扣，有借有擔=扣借貸分，有借無擔=兩項都扣 ──
  var pawn = 0;
  var hasPawnBorrow = lead.has_pawn_borrow;
  if (hasPawnBorrow) {
    pawn = 50 + R.pawnHasBorrow;
    if (!lead.has_collateral) pawn += R.pawnNoCollateral;
    pawn = Math.max(0, pawn);
  }

  // ── 遲繳警告（任一貸款有遲繳超過1個月→呆帳警告）──
  var lateWarning = false;
  if (lead.has_overdue_over1m) lateWarning = true;

  // ── 不動產 ──
  var propRatio = null, propStatus = null;
  if (lead.has_property && lead.property_valuation) {
    var td = (lead.property_loan1||0) + (lead.property_loan2||0) + (lead.property_loan3||0);
    propRatio = parseFloat((td / lead.property_valuation * 100).toFixed(1));
    propStatus = propRatio <= propThresholds.t1 ? 'ok' : propRatio <= propThresholds.t2 ? 'warn' : 'bad';
  }

  var noSalary = (salary <= 0);
  var bankBlocked = (bank === 0 && ((hasAlert && R.bankAlertBlock) || (bankRejCount >= 4 && R.bankRej4Block)));
  var bankNoData = (bank === 0 && !bankBlocked && noSalary);
  var noPawn = !lead.has_pawn_borrow;

  return { bank:bank, car:car, bike:bike, phone:phone, pawn:pawn, propRatio:propRatio, propStatus:propStatus, maxLoan:maxLoan, lateWarning:lateWarning, bankRejBlock: (bankRejCount>=4 && R.bankRej4Block), bankBlocked:bankBlocked, bankNoData:bankNoData, noSalary:noSalary, noPawn:noPawn };
}

function scoreColor(s) {
  return s >= 80 ? 'p-lgrn' : s >= 70 ? 'p-grn' : s >= 60 ? 'p-yel' : 'p-red';
}
function scoreBarColor(s) {
  return s >= 80 ? 'pb-lgrn' : s >= 70 ? 'pb-grn' : s >= 60 ? 'pb-yel' : 'pb-red';
}

function buildProbCards(scores) {
  var items = [
    ['銀行信貸', scores.bank, 'bank'],
    ['汽車貸款', scores.car, 'fin'],
    ['機車貸款', scores.bike, 'fin'],
    ['商品手機貸', scores.phone, 'fin'],
    ['當鋪借貸', scores.pawn, 'pawn'],
  ];
  var html = '';
  items.forEach(function(item) {
    var n = item[0], s = item[1], type = item[2];
    var label, vc, bc;
    if (type === 'bank') {
      if (scores.bankBlocked) {
        label = '封鎖'; vc = 'p-red'; bc = 'pb-red';
      } else if (scores.bankNoData) {
        label = '未填薪水'; vc = 'p-none'; bc = 'pb-none';
      } else {
        label = s > 0 ? s + '%' : '—';
        vc = s > 0 ? scoreColor(s) : 'p-none';
        bc = s > 0 ? scoreBarColor(s) : 'pb-none';
      }
    } else if (type === 'fin') {
      if (scores.noSalary) {
        label = '未填薪水'; vc = 'p-none'; bc = 'pb-none';
      } else {
        label = s > 0 ? s + '%' : '無';
        vc = s > 0 ? scoreColor(s) : 'p-none';
        bc = s > 0 ? scoreBarColor(s) : 'pb-none';
      }
    } else { // pawn
      label = scores.noPawn ? '無' : (s > 0 ? s + '%' : '—');
      vc = s > 0 ? scoreColor(s) : 'p-none';
      bc = s > 0 ? scoreBarColor(s) : 'pb-none';
    }
    html += '<div class="pcard">';
    html += '<div class="pcard-n">' + n + '</div>';
    html += '<div class="pcard-v ' + vc + '">' + label + '</div>';
    html += '<div class="pb-w"><div class="pb-f ' + bc + '" style="width:' + (s||0) + '%"></div></div>';
    html += '</div>';
  });
  if (scores.propRatio !== null) {
    var col = scores.propStatus === 'ok' ? 'p-lgrn' : scores.propStatus === 'warn' ? 'p-yel' : 'p-red';
    var bcol = scores.propStatus === 'ok' ? 'pb-lgrn' : scores.propStatus === 'warn' ? 'pb-yel' : 'pb-red';
    var lbl = scores.propStatus === 'ok' ? '有效成交' : scores.propStatus === 'warn' ? '有效買賣' : '空間不足';
    html += '<div class="pcard" style="border-color:var(--grn)">';
    html += '<div class="pcard-n">不動產</div>';
    html += '<div class="pcard-v ' + col + '" style="font-size:15px">' + scores.propRatio.toFixed(1) + '%</div>';
    html += '<div class="pb-w"><div class="pb-f ' + bcol + '" style="width:' + Math.min(100, scores.propRatio) + '%"></div></div>';
    html += '<div style="font-size:12px;color:var(--grn);margin-top:2px">' + lbl + '</div>';
    html += '</div>';
  } else {
    html += '<div class="pcard" style="opacity:.4"><div class="pcard-n">不動產</div><div class="pcard-v p-none">無</div><div class="pb-w"><div class="pb-f pb-none" style="width:0%"></div></div></div>';
  }
  return '<div class="prob-row">' + html + '</div>';
}

function buildLeadItem(l, showDate) {
  var s = calcScores(l);
  var bCol = s.bank>=70?'grn':s.bank>=60?'yel':'red';
  var biCol = s.bike>=70?'grn':s.bike>=60?'yel':'red';
  var addrShort = '';
  if (l.address) { var ma = l.address.match(/^(.{2,3}[市縣])(.{2,4}[區鄉鎮])/); if(ma) addrShort = ma[1]+ma[2]; }
  var pCol = s.propRatio!==null ? (s.propStatus==="ok"?"grn":s.propStatus==="warn"?"yel":"red") : "";
  var propHtml = s.propRatio!==null ? " · 不動 <span style=\"color:var(--"+pCol+")\">" + s.propRatio.toFixed(0) + "%</span>" : "";
  var nameHtml = (l.name||"—") + (addrShort ? " <span style=\"font-size:12px;color:var(--t2);font-weight:400\">" + addrShort + "</span>" : "");
  var dateHtml = (showDate && l.created_at) ? "<span style=\"font-size:12px;color:var(--t3)\">" + new Date(l.created_at).toLocaleDateString("zh-TW") + "</span>" : "";
  // 用純 HTML string，但刪除按鈕用 data-id 之後事件委派
  return "<div class=\"lead-item\" style=\"display:flex;align-items:center;gap:10px\">" +
    "<div class=\"lead-av\" style=\"background:var(--al);color:var(--acc);cursor:pointer\" onclick=\"showLeadDetail('"+l.id+"')\">" + (l.name||"?").charAt(0) + "</div>" +
    "<div class=\"lead-info\" style=\"cursor:pointer;flex:1;min-width:0\" onclick=\"showLeadDetail('"+l.id+"')\">" +
      "<div class=\"lead-name\">" + nameHtml + "</div>" +
      "<div class=\"lead-sub\">信貸 <span style=\"color:var(--"+bCol+")\">" + s.bank + "%</span> · 機車 <span style=\"color:var(--"+biCol+")\">" + s.bike + "%</span>" + propHtml + "</div>" +
    "</div>" +
    "<div class=\"lead-right\">" +
      "<span class=\"badge " + statusBadge(l.status) + "\">" + statusText(l.status) + "</span>" +
      dateHtml +
    "</div>" +
    "<button onclick=\"deleteLead('"+l.id+"','"+((l.name||"").replace(/'/g,""))+"');event.stopPropagation()\" " +
      "style=\"width:30px;height:30px;border-radius:7px;border:0.5px solid rgba(192,64,48,.3);background:transparent;color:var(--red);cursor:pointer;font-size:14px;flex-shrink:0;margin-left:2px\" " +
      "title=\"刪除\">&#128465;</button>" +
    "</div>";
}

async function doLogin() {
  var email = document.getElementById('login-email').value.trim();
  var pw = document.getElementById('login-pw').value;
  if (!email || !pw) { showErr('請填寫 Email 和密碼'); return; }
  showLoading('登入中…');
  var r = await sb.auth.signInWithPassword({ email:email, password:pw });
  hideLoading();
  if (r.error) { showErr('帳號或密碼錯誤'); return; }
  currentUser = r.data.user;
  await loadMember();
  showPage('member');
  renderDash();
}

async function doRegister() {
  if (!termsAgreed) { showErr('請先同意會員服務須知'); return; }
  var name = document.getElementById('reg-name').value.trim();
  var email = document.getElementById('reg-email').value.trim();
  var pw = document.getElementById('reg-pw').value;
  var company = document.getElementById('reg-company').value.trim();
  var phone = document.getElementById('reg-phone').value.trim();
  var city = document.getElementById('reg-city').value;
  var district = document.getElementById('reg-district').value;
  if (!name) { showErr('請填寫姓名'); return; }
  if (!email) { showErr('請填寫 Email'); return; }
  if (pw.length < 8) { showErr('密碼至少需要 8 碼'); return; }
  showLoading('建立帳號中…');
  var r = await sb.auth.signUp({ email:email, password:pw });
  if (r.error) { hideLoading(); showErr('帳號建立失敗：' + r.error.message); return; }
  // 邀請碼只用英數字，避免中文字在 URL 被編碼導致找不到
  var nameEn = name.replace(/[^\x00-\x7F]/g, '').substring(0,2).toUpperCase() || 'GW';
  if (nameEn.length < 2) nameEn = ('GW' + nameEn).slice(-2);
  var invCode = nameEn + Math.random().toString(36).substring(2,6).toUpperCase() + '-' + new Date().getFullYear();
  await sb.from('members').insert({ id:r.data.user.id, email:email, name:name, company:company, phone:phone, city:city, district:district, invite_code:invCode, plan:'free' });
  hideLoading();
  showOk('帳號建立成功！請檢查 Email 確認信後登入。');
}

async function renderDash() {
  var el = document.getElementById('member-content');
  el.innerHTML = '<div style="text-align:center;padding:30px;color:var(--t2)">載入中…</div>';
  var r = await sb.from('leads').select('*').eq('member_id', currentUser.id).order('created_at', { ascending: false });
  leads = r.data || [];

  var now = new Date();
  var tms = new Date(now.getFullYear(), now.getMonth(), 1);
  var lms = new Date(now.getFullYear(), now.getMonth()-1, 1);
  var lme = tms;
  var lqs = new Date(now.getFullYear(), now.getMonth()-3, 1);
  var lys = new Date(now.getFullYear()-1, now.getMonth(), 1);
  var lye = new Date(now.getFullYear(), now.getMonth(), 1);

  function inR(l,s,e){var d=new Date(l.created_at);return d>=s&&d<e;}
  function cntIn(s,e){return leads.filter(function(l){return inR(l,s,e);}).length;}
  function clIn(s,e){return leads.filter(function(l){return l.status==='closed'&&inR(l,s,e);}).length;}

  var thisLeads = leads.filter(function(l){return new Date(l.created_at)>=tms;});
  var total   = thisLeads.length;
  var closed  = thisLeads.filter(function(l){return l.status==='closed';}).length;
  var pending = thisLeads.filter(function(l){return ['new','invited','submitting','approved','pending_guarantor'].indexOf(l.status)>=0;}).length;
  var propL   = thisLeads.filter(function(l){return l.has_property;}).length;
  var lmL=cntIn(lms,lme), lmC=clIn(lms,lme);
  var lqL=cntIn(lqs,lme), lqC=clIn(lqs,lme);
  var lyL=cntIn(lys,lye), lyC=clIn(lys,lye);

  function arrowSpan(now,prev){
    if(prev===0) return now>0?'<span style="color:var(--grn);font-size:13px">▲ 新增</span>':'<span style="color:var(--t3);font-size:13px">—</span>';
    var pct=Math.round((now-prev)/prev*100);
    var col=pct>0?'var(--grn)':pct<0?'var(--red)':'var(--t3)';
    return '<span style="color:'+col+';font-size:13px">'+(pct>0?'▲':'▼')+' '+Math.abs(pct)+'%</span>';
  }

  var memberName = currentMember ? (currentMember.name||'') : '';
  var planLabel = currentMember ? (currentMember.plan==='team'?'團隊版':currentMember.plan==='pro'?'進階版':'基本版') : '基本版';
  var code = currentMember ? (currentMember.invite_code||'') : '';
  var linkUrl = BASE_URL + '/app.html?ref=' + code;

  var html = '';

  // ── 頂部歡迎列 ──
  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">';
  html += '<div><div style="font-size:20px;font-weight:700">儀表板</div>';
  html += '<div style="font-size:14px;color:var(--t2);margin-top:2px">' + memberName + ' · ' + planLabel + '顧問</div></div>';
  html += '</div>';

  // ── 四格統計卡 ──
  html += '<div class="stat-grid" style="margin-bottom:14px">';
  html += '<div class="stat-card"><div class="stat-l">本月名單</div><div class="stat-v">' + total + '</div><div class="stat-s">'+arrowSpan(total,lmL)+' vs 上月</div></div>';
  html += '<div class="stat-card"><div class="stat-l">本月成交</div><div class="stat-v" style="color:var(--grn)">' + closed + '</div><div class="stat-s">'+arrowSpan(closed,lmC)+' vs 上月</div></div>';
  html += '<div class="stat-card"><div class="stat-l">待跟進</div><div class="stat-v" style="color:var(--acc)">' + pending + '</div><div class="stat-s">需聯繫客戶</div></div>';
  html += '<div class="stat-card"><div class="stat-l">不動產名單</div><div class="stat-v">' + propL + '</div><div class="stat-s">含三胎 ' + thisLeads.filter(function(l){return l.property_loan3>0;}).length + ' 筆</div></div>';
  html += '</div>';

  // ── 業績收入比較（四欄大卡片風格）──
  html += '<div class="card" style="margin-bottom:14px">';
  html += '<div class="ct">業績收入比較</div>';
  html += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px">';

  var periods = [
    {label:'本月',      leads:total,  closed:closed, base:true,  cmp:lmL,  cmpLbl:'前月'},
    {label:'前月',      leads:lmL,    closed:lmC,    base:false, cmp:lmL,  cmpLbl:'—基準月份'},
    {label:'前一季合計',leads:lqL,    closed:lqC,    base:false, cmp:lqL,  cmpLbl:'vs 同期'},
    {label:'前一年同期', leads:lyL,   closed:lyC,    base:false, cmp:lyL,  cmpLbl:'YoY'},
  ];
  periods.forEach(function(p,i) {
    var isBase = i===1;
    var pctLeads = (!isBase && p.cmp>0) ? Math.round((total-p.cmp)/p.cmp*100) : null;
    var pctCol = pctLeads===null?'var(--t3)':pctLeads>=0?'var(--grn)':'var(--red)';
    html += '<div style="background:var(--inp);border-radius:10px;padding:12px 10px">';
    html += '<div style="font-size:13px;color:var(--t2);margin-bottom:6px">' + p.label + '</div>';
    html += '<div style="font-size:22px;font-weight:700;color:' + (i===0?'var(--acc)':'var(--t0)') + ';margin-bottom:4px">' + p.leads + ' 件</div>';
    if (isBase) {
      html += '<div style="font-size:12px;color:var(--t3)">— 基準月份</div>';
    } else if (pctLeads!==null) {
      html += '<div style="font-size:13px;color:'+pctCol+'">' + (pctLeads>=0?'▲':'▼') + ' ' + Math.abs(pctLeads) + '% ' + arrowSpan(total,p.cmp).replace(/<[^>]+>/g,'') + '</div>';
      var sym = pctLeads>=0?'▲':'▼';
      html += '<div style="font-size:12px;color:'+pctCol+'">' + sym + ' ' + Math.abs(pctLeads) + '% vs ' + p.cmpLbl + '</div>';
    } else {
      html += '<div style="font-size:12px;color:var(--t3)">—</div>';
    }
    html += '</div>';
  });
  html += '</div>';

  // ── 比較表 ──
  html += '<table style="width:100%;border-collapse:collapse;font-size:14px">';
  html += '<tr style="border-bottom:0.5px solid var(--bdr);color:var(--t2)">';
  ['期間','成交件數','筆數','支出','淨收入','成長率'].forEach(function(h2){
    html += '<th style="text-align:'+(h2==='期間'?'left':'center')+';padding:7px 6px;font-weight:400;font-size:13px">'+h2+'</th>';
  });
  html += '</tr>';

  // 假設每件成交估算（顧問可在收支理財設定實際數字）
  var expense = fixedExpenses ? fixedExpenses.reduce(function(s,e){return s+e.amount;},0) : 0;
  var rows2 = [
    {label:'本月',     leads:total,  closed:closed,  exp:expense, base:false, highlight:true},
    {label:'前月',     leads:lmL,    closed:lmC,     exp:expense, base:true,  highlight:false},
    {label:'前一季',   leads:lqL,    closed:lqC,     exp:expense*3, base:false, highlight:false},
    {label:'前一年',   leads:lyL,    closed:lyC,     exp:expense*12, base:false, highlight:false},
  ];
  rows2.forEach(function(row) {
    var net = (row.closed*20000) - row.exp; // 估算每件成交2萬，可調整
    var pct = row.base ? '— 基準' : (lmC>0?Math.round((row.closed-lmC)/lmC*100)+'%':'—');
    var pctCol = row.base?'var(--t3)':net>=0?'var(--grn)':'var(--red)';
    html += '<tr style="border-bottom:0.5px solid var(--bdr);' + (row.highlight?'background:rgba(200,81,26,.06)':'') + '">';
    html += '<td style="padding:9px 6px;font-weight:' + (row.highlight?'600':'400') + ';color:' + (row.highlight?'var(--acc)':'var(--t1)') + '">' + row.label + '</td>';
    html += '<td style="text-align:center;padding:9px 6px;color:var(--grn)">' + row.closed + '</td>';
    html += '<td style="text-align:center;padding:9px 6px">' + row.leads + '</td>';
    html += '<td style="text-align:center;padding:9px 6px;color:var(--red)">$' + row.exp.toLocaleString() + '</td>';
    html += '<td style="text-align:center;padding:9px 6px;color:' + (net>=0?'var(--grn)':'var(--red)') + '">' + (net>=0?'+':'') + '$' + net.toLocaleString() + '</td>';
    html += '<td style="text-align:center;padding:9px 6px;color:'+pctCol+'">' + (row.base?'— 基準':(row.closed>lmC?'▲ ':'▼ ')+pct) + '</td>';
    html += '</tr>';
  });
  html += '</table>';
  html += '<div style="font-size:12px;color:var(--t3);margin-top:8px">💡 淨收入為估算值（每件成交 $20,000 減固定支出），請至收支理財設定實際數字</div>';
  html += '</div>';

  // ── 下半：最新名單 + 繳款提醒 並排 ──
  html += '<div style="display:grid;grid-template-columns:1fr;gap:10px" id="dash-bottom">';

  // 最新名單
  html += '<div class="card"><div class="ct">最新名單 <button class="btn-sm" onclick="navTo(\'leads\',null)">查看全部</button></div><div id="dash-list"></div></div>';

  // 繳款提醒
  var today = new Date();
  var reminders = (typeof fixedExpenses !== 'undefined' ? fixedExpenses : []).map(function(e) {
    var due = new Date(today.getFullYear(), today.getMonth(), e.due_day);
    if (due < today) due = new Date(today.getFullYear(), today.getMonth()+1, e.due_day);
    var diff = Math.ceil((due-today)/(1000*60*60*24));
    return Object.assign({}, e, {diff:diff});
  }).sort(function(a,b){return a.diff-b.diff;}).slice(0,4);

  if (reminders.length > 0) {
    html += '<div class="card"><div class="ct">本月繳款提醒</div>';
    reminders.forEach(function(e) {
      var col = e.diff<=3?'red':e.diff<=7?'yel':'grn';
      var lbl = e.diff===0?'今天到期':e.diff<0?'已過期':'剩 '+e.diff+' 天';
      html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--'+col+'-l);border-radius:8px;margin-bottom:6px">';
      html += '<div><div style="display:flex;align-items:center;gap:6px"><span style="font-size:16px">'+e.icon+'</span><span style="font-size:15px;font-weight:500">'+e.name+'</span></div>';
      html += '<div style="font-size:13px;color:var(--t2);margin-top:2px">'+today.getMonth()+1+'/'+e.due_day+' 到期，'+lbl+'</div></div>';
      html += '<span style="font-size:15px;font-weight:600;color:var(--'+col+')">$'+e.amount.toLocaleString()+'</span>';
      html += '</div>';
    });
    html += '</div>';
  }

  // 推廣連結
  html += '<div class="card"><div class="ct">我的推廣連結</div>';
  if (!code) {
    html += '<div class="ib-yel" style="font-size:14px">⚠️ 邀請碼尚未設定</div>';
  } else {
    html += '<div style="background:var(--inp);border-radius:8px;padding:10px 12px;font-size:12px;font-family:monospace;color:var(--acc);word-break:break-all;margin-bottom:8px">' + linkUrl + '</div>';
    html += '<div style="display:flex;gap:6px;flex-wrap:wrap">';
    html += '<button class="btn-sm" onclick="copyLink()">複製連結</button>';
    html += '<button class="btn-sm" onclick="shareToLine()">分享到 LINE</button>';
    html += '<button class="btn-sm" onclick="toggleQR()">QR Code</button>';
    html += '</div>';
  }
  html += '<div id="qr-wrap" style="display:none;text-align:center;padding:12px 0">';
  html += '<canvas id="qr-canvas" width="160" height="160" style="border-radius:8px;background:white;padding:8px"></canvas>';
  html += '<div style="font-size:13px;color:var(--t2);margin-top:6px">掃描加入顧問PRO評估</div>';
  html += '<button class="btn-sm" style="margin-top:6px" onclick="downloadQR()">下載 QR Code</button>';
  html += '</div></div>';

  html += '</div>'; // dash-bottom

  el.innerHTML = html;

  // 桌機版下半並排
  var bot = document.getElementById('dash-bottom');
  if (bot && window.innerWidth >= 768) {
    bot.style.gridTemplateColumns = '1fr 1fr';
  }

  var dashList = document.getElementById('dash-list');
  if (dashList) {
    if (thisLeads.length === 0) {
      dashList.innerHTML = '<div style="text-align:center;padding:20px;color:var(--t2)">本月還沒有客戶，點底部「新增」開始</div>';
    } else {
      var lhtml = '';
      thisLeads.slice(0,5).forEach(function(l) { lhtml += buildLeadItem(l, false); });
      dashList.innerHTML = lhtml;
    }
  }
}

async function renderLeads() {
  var el = document.getElementById('member-content');
  if (leads.length === 0) {
    var r = await sb.from('leads').select('*').eq('member_id', currentUser.id).order('created_at', { ascending: false });
    leads = r.data || [];

  var html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">';
  html += '<div style="font-size:16px;font-weight:600">客戶名單 <span class="badge b-gray">' + leads.length + '筆</span></div>';
  html += '<button class="btn-sm" onclick="navTo(\'add-lead\',null)">+ 新增客戶</button></div>';

    html += '<div class="card" style="text-align:center;padding:30px;color:var(--t2)"><div style="font-size:30px;margin-bottom:10px">👥</div>還沒有客戶名單</div>';
  } else {
    leads.forEach(function(l) { html += buildLeadItem(l, true); });
  }
  el.innerHTML = html;
}

function togglePropFields(val) {

function updatePropRatio() {
  var pv = gi('n-prop-val');
  var p1 = gi('n-prop1-amt'), p2 = gi('n-prop2-amt'), p3 = gi('n-prop3-amt');
  var el = document.getElementById('prop-ratio-display');
  if (!el || pv <= 0) { if (el) el.innerHTML = ''; return; }
  var ratio = parseFloat(((p1 + p2 + p3) / pv * 100).toFixed(1));
  var st = ratio <= propThresholds.t1 ? 'ok' : ratio <= propThresholds.t2 ? 'warn' : 'bad';
  var col = st === 'ok' ? 'grn' : st === 'warn' ? 'yel' : 'red';
  var lbl = st === 'ok' ? '有效成交' : st === 'warn' ? '有效買賣' : '空間不足';
  el.innerHTML = '<div style="background:var(--' + col + '-l);border:0.5px solid rgba(45,138,78,.15);border-radius:8px;padding:8px 12px">' +
    '<div style="font-size:14px;font-weight:500;color:var(--' + col + ')">負債比：' + ratio + '% — ' + lbl + '</div>' +
    '<div style="font-size:12px;color:var(--t2)">合計 $' + (p1+p2+p3).toLocaleString() + ' ÷ 估價 $' + pv.toLocaleString() + '</div></div>';
}

function calcMaxLoanDisplay() {
  var sal = parseInt(gv('n-salary')) || 0;
  var labSal = parseInt(gv('n-labor-salary')) || 0;
  var hasTransfer = gv('n-transfer') === 'true';
  var ccLimit = parseInt(gv('n-cc-limit')) || 0;
  var base = hasTransfer ? sal : (labSal || sal);
  var max = base > 0 ? Math.max(0, base * scoreRules.salaryMultiplier - ccLimit) : 0;
  var el = document.getElementById('max-loan-display');
  if (el) el.textContent = max > 0 ? '$' + max.toLocaleString() : '—';
}

async function saveLead() {
  var name = gv('n-name').trim();
  if (!name) { document.getElementById('add-err').textContent='請填寫客戶姓名'; document.getElementById('add-err').style.display='block'; return; }
  document.getElementById('add-err').style.display='none';
  showLoading('儲存中…');

  var hasProp = gv('n-property') === 'true';
  var propVal = gi('n-prop-val');
  var p1 = gi('n-prop1-amt'), p2 = gi('n-prop2-amt'), p3 = gi('n-prop3-amt');
  var totalPropDebt = p1 + p2 + p3;
  var propRatio = (hasProp && propVal > 0) ? parseFloat((totalPropDebt / propVal * 100).toFixed(1)) : null;

  var payload = {
    member_id: currentUser.id, name: name,
    age: parseInt(gv('n-age')) || null, work_type: [gv('n-company'),gv('n-position')].filter(Boolean).join(' · ') || null,
    alert_status: gv('n-alert'), address: gv('n-addr'), huji_address: gv('n-huji'),
    required_amount: parseInt(gv('n-amount')) || null, fund_purpose: gv('n-purpose'),
    monthly_salary: parseInt(gv('n-salary')) || null,
    has_salary_transfer: gv('n-transfer') === 'true',
    labor_insurance_years: gv('n-labor'), credit_card_age: gv('n-cc'),
    has_car_license: gv('n-car-lic') === 'true', has_bike_license: gv('n-bike-lic') === 'true',
    has_property: hasProp, has_collateral: gv('n-collateral') === 'true',
    bank_recent_reject: gv('n-bank-rej'), finance_recent_reject: gv('n-fin-rej'),
    advisor_note: gv('n-note'), status: 'new',
    property_ratio: propRatio, property_valuation: hasProp ? propVal : null,
    property_loan1: p1 || null, property_loan2: p2 || null, property_loan3: p3 || null,
  };

  var r = await sb.from('leads').insert(payload).select().single();
  if (r.error) { hideLoading(); document.getElementById('add-err').textContent='儲存失敗：'+r.error.message; document.getElementById('add-err').style.display='block'; return; }

  // 收集貸款
  var loans = [];
  var typeMap = { credit:'credit', car:'car_new', bike:'bike', phone:'phone', pawn:'pawn' };
  var itypeMap = { credit:'bank', car:'finance', bike:'finance', phone:'finance', pawn:'civil' };
  Object.keys(loanCounters).forEach(function(type) {
    for (var i = 1; i <= loanCounters[type]; i++) {
      var id = type + '_' + i;
      if (!document.getElementById('row_' + id)) continue;
      var amt = parseInt(document.getElementById(id + '_amt') ? document.getElementById(id + '_amt').value : 0) || 0;
      if (amt <= 0) continue;
      var loan = { lead_id: r.data.id, loan_type: typeMap[type], institution_type: itypeMap[type], balance: amt };
      var payEl = document.getElementById(id + '_pay');
      if (payEl) loan.monthly_payment = parseInt(payEl.value) || 0;
      var instEl = document.getElementById(id + '_inst');
      if (instEl) loan.institution_name = instEl.value;
      var penEl = document.getElementById(id + '_penalty');
      if (penEl) loan.penalty_fee = parseInt(penEl.value) || 0;
      loans.push(loan);
    }
  });
  [[p1,'property_1st','bank','n-prop1'],[p2,'property_2nd','bank','n-prop2'],[p3,'property_3rd','civil','n-prop3']].forEach(function(x) {
    if (x[0] > 0) {
      var instEl = document.getElementById(x[3]+'-inst');
      var payEl = document.getElementById(x[3]+'-pay');
      var penEl = document.getElementById(x[3]+'-penalty');
      loans.push({ lead_id:r.data.id, loan_type:x[1], institution_type:x[2], balance:x[0],
        institution_name: instEl ? instEl.value : '',
        monthly_payment: payEl ? (parseInt(payEl.value)||0) : 0,
        penalty_fee: penEl ? (parseInt(penEl.value)||0) : 0 });
    }
  });
  if (loans.length > 0) await sb.from('lead_loans').insert(loans);

  loanCounters = { credit:0, car:0, bike:0, phone:0, pawn:0 };
  hideLoading();
  leads.unshift(r.data);
  showLeadDetail(r.data.id);
}

function showLeadDetail(id) {

  }
  html += '<div style="margin-top:10px"><div class="flbl" style="margin-bottom:6px">案件進度</div>';
  html += '<select class="fi" id="status-sel-' + id + '" onchange="updateStatus(\'' + id + '\',this.value)">';
  ['new','invited','submitting','approved','closed','pending_guarantor','rejected','lost'].forEach(function(s) {
    html += '<option value="' + s + '"' + (lead.status===s?' selected':'') + '>' + statusText(s) + '</option>';

  var totalAllRate  = (parseFloat(myRate)||0) + totalPartnerRate + (isEmployee ? (parseFloat(companyRate)||0) : 0);
  var myShare       = actualIncome && myRate !== '' ? Math.round(actualIncome*(parseFloat(myRate)||0)/100) : '';
  var companyShare  = actualIncome && isEmployee && companyRate !== '' ? Math.round(actualIncome*(parseFloat(companyRate)||0)/100) : 0;
  var rateWarn      = totalAllRate > 0 && Math.round(totalAllRate) !== 100;

function buildDocSection(opts) {
  var id = opts.id, type = opts.type, lead = opts.lead;
  var docs = leadDocuments[id] ? (leadDocuments[id][type] || []) : [];
  var bgStyle = opts.color ? 'background:var(--' + opts.color + 'l);border:0.5px solid ' + opts.borderColor : 'background:var(--inp);border:0.5px solid ' + opts.borderColor;
  var titleColor = opts.color ? 'var(--'+opts.color+')' : 'var(--t1)';

  var h = '<div style="' + bgStyle + ';border-radius:9px;padding:10px 13px;margin-bottom:8px">';

  // 標題 + 查詢按鈕
  h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">';
  h += '<div style="font-size:14px;font-weight:500;color:' + titleColor + '">' + opts.title + '</div>';
  h += '<div style="display:flex;gap:5px;flex-wrap:wrap">';
  if (opts.queryFn) h += '<button class="btn-sm" onclick="' + opts.queryFn + '" style="font-size:12px;padding:3px 9px">' + (opts.queryBtn||'開啟查詢 →') + '</button>';
  if (opts.extraBtn) h += opts.extraBtn;
  h += '</div></div>';

  // 各類型的原本說明文字
  if (type === 'asset') {
    h += '<div style="font-size:13px;color:var(--t2);margin-bottom:6px">點「開啟查詢」→ 自動複製姓名「<strong style="color:var(--t0)">' + (lead.name||'') + '</strong>」並開啟網頁，進入後貼上查詢</div>';
    h += '<div style="font-size:12px;color:var(--t3);margin-bottom:8px">不需登入即可查詢，輸入姓名或身分證字號</div>';
  } else if (type === 'verdict') {
    h += '<div style="font-size:13px;color:var(--t2);margin-bottom:6px">點「開啟查詢」→ 自動搜尋「<strong style="color:var(--t0)">' + (lead.name||'') + '</strong>」相關裁判書</div>';
    h += '<div style="font-size:12px;color:var(--t3);margin-bottom:8px">📸 請截圖客戶現居地與戶籍地相關結果後上傳儲存</div>';
  } else if (type === 'traffic') {
    h += '<div style="font-size:13px;color:var(--t2);margin-bottom:6px">點「開啟查詢」→ 自動複製身分證字號，進入後貼上查詢（需身分證字號）</div>';
    h += '<div style="font-size:12px;color:var(--t3);margin-bottom:8px">📸 截圖查詢結果後上傳儲存</div>';
  } else if (type === 'license') {
    h += '<div style="font-size:13px;color:var(--t2);margin-bottom:6px">點「開啟查詢」→ 自動複製姓名，進入後貼上並輸入身分證字號查詢</div>';
    h += '<div style="font-size:12px;color:var(--t3);margin-bottom:8px">📸 截圖查詢結果後上傳儲存</div>';
  }

  // 原本查詢展開區（動產擔保保留 queryAsset 展開說明）
  if (type === 'asset') {
    h += '<div id="asset-result-' + id + '"></div>';
  } else if (type === 'verdict') {
    h += '<div id="verdict-result-' + id + '"></div>';
  }

  // 分隔線
  h += '<div style="border-top:0.5px dashed rgba(255,255,255,.1);margin:8px 0"></div>';

  // 上傳區 - 用隱藏 input + button 觸發，一鍵開啟
  var inputId = 'file-' + id + '-' + type;
  h += '<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:4px">';
  h += '<input type="file" id="' + inputId + '" accept="image/*,application/pdf" style="display:none" onchange="uploadDoc(event,\'' + id + '\',\'' + type + '\',\'' + opts.aiPrompt.replace(/'/g,"\\'").replace(/\n/g,' ') + '\')">';
  h += '<button onclick="document.getElementById(\'' + inputId + '\').click()" style="display:inline-flex;align-items:center;gap:5px;padding:5px 12px;background:var(--card);border:0.5px solid var(--bdr2);border-radius:6px;cursor:pointer;font-size:13px;color:var(--t1);font-family:var(--sans);white-space:nowrap">📷 上傳截圖 / 儲存圖檔</button>';
  if (docs.length > 0) h += '<span style="font-size:12px;color:var(--t3)">已儲存 ' + docs.length + ' 筆</span>';
  h += '</div>';

  // 已上傳文件
  docs.forEach(function(doc, di) {
    h += renderDocResult(id, type, doc, di);
  });

  h += '<div id="doc-loading-' + id + '-' + type + '" style="display:none;font-size:13px;color:var(--t2);margin-top:8px;padding:8px 0">⏳ AI 讀取圖片中，請稍候...</div>';
  h += '</div>';
  return h;
}

function renderDocResult(leadId, type, doc, di) {
  var h = '<div style="margin-top:8px;background:var(--card);border:0.5px solid var(--bdr2);border-radius:8px;overflow:hidden">';
  // 圖片預覽
  h += '<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:0.5px solid var(--bdr)">';
  h += '<img src="' + doc.url + '" onclick="window.open(\'' + doc.url + '\')" style="width:48px;height:36px;object-fit:cover;border-radius:4px;cursor:pointer" onerror="this.style.display=\'none\'">';
  h += '<div style="flex:1"><div style="font-size:13px;font-weight:500">' + (doc.filename||'截圖') + '</div>';
  h += '<div style="font-size:11px;color:var(--t3)">' + (doc.uploaded_at||'') + '</div></div>';
  h += '<a href="' + doc.url + '" download target="_blank" style="font-size:12px;padding:3px 8px;background:transparent;border:0.5px solid var(--bdr2);border-radius:5px;color:var(--t2);text-decoration:none">下載</a>';
  h += '<button onclick="deleteDoc(\'' + leadId + '\',\'' + type + '\',' + di + ')" style="font-size:12px;padding:3px 8px;border-radius:5px;border:0.5px solid rgba(192,64,48,.3);background:transparent;color:var(--red);cursor:pointer;font-family:var(--sans)">刪</button>';
  h += '</div>';

  // AI 分析結果
  if (doc.ai_summary) {
    h += '<div style="padding:10px 12px">';
    if (type === 'verdict') {
      h += renderVerdictSummary(doc.ai_summary);
    } else if (type === 'traffic') {
      h += renderTrafficSummary(doc.ai_summary);
    } else if (type === 'license') {
      h += renderLicenseSummary(doc.ai_summary);
    } else {
      h += '<div style="font-size:13px;color:var(--t2);line-height:1.7;white-space:pre-wrap">' + doc.ai_summary + '</div>';
    }
    h += '</div>';
  }
  h += '</div>';
  return h;
}

function renderVerdictSummary(summary) {
  var data;
  try { data = typeof summary==='string' ? JSON.parse(summary) : summary; } catch(e) { return '<div style="font-size:13px;color:var(--t2)">' + summary + '</div>'; }
  if (!Array.isArray(data) || data.length === 0) return '<div style="font-size:13px;color:var(--grn)">✓ 查無相關裁判書記錄</div>';
  // 依法院分組
  var courts = {};
  data.forEach(function(v) { var c=v.court||'未知法院'; if(!courts[c]) courts[c]=[]; courts[c].push(v); });
  var h = '';
  Object.keys(courts).forEach(function(court) {
    var cases = courts[court];
    var cid = 'vc-' + Math.random().toString(36).slice(2,8);
    h += '<div style="margin-bottom:6px;border:0.5px solid rgba(184,128,32,.3);border-radius:7px;overflow:hidden">';
    h += '<div onclick="toggleVerdictCourt(\'' + cid + '\')" style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--yl);cursor:pointer">';
    h += '<span style="font-size:13px;font-weight:500;color:var(--yel)">⚖️ ' + court + '</span>';
    h += '<span style="font-size:13px;color:var(--yel);font-weight:600">' + cases.length + ' 筆 ▾</span>';
    h += '</div>';
    h += '<div id="' + cid + '" style="display:none">';
    cases.forEach(function(v) {
      h += '<div style="display:flex;gap:8px;align-items:flex-start;padding:7px 10px;border-top:0.5px solid var(--bdr)">';
      h += '<span style="font-size:11px;color:var(--t3);white-space:nowrap;margin-top:1px">' + (v.date||'') + '</span>';
      h += '<div><span style="font-size:12px;padding:1px 6px;border-radius:4px;background:' + (v.type==='刑事'?'var(--rl)':'var(--bl)') + ';color:' + (v.type==='刑事'?'var(--red)':'var(--blu)') + '">' + (v.type||'') + '</span>';
      h += ' <span style="font-size:13px;color:var(--t1)">' + (v.title||'—') + '</span></div>';
      h += '</div>';
    });
    h += '</div></div>';
  });
  return h;
}

function renderTrafficSummary(summary) {
  var data;
  try { data = typeof summary==='string' ? JSON.parse(summary) : summary; } catch(e) { return '<div style="font-size:13px;color:var(--t2)">' + summary + '</div>'; }
  var violations = data.violations || [];
  var totalFine = data.total_fine || 0;
  if (violations.length === 0) return '<div style="font-size:13px;color:var(--grn)">✓ 查無交通違規記錄</div>';
  var h = '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--bdr);margin-bottom:6px">';
  h += '<span style="font-size:13px;font-weight:600">總罰款金額</span>';
  h += '<span style="font-size:16px;font-weight:700;color:var(--red)">$' + totalFine.toLocaleString() + '</span></div>';
  violations.forEach(function(v) {
    h += '<div style="display:flex;gap:8px;align-items:center;padding:5px 0;border-bottom:0.5px solid var(--bdr)">';
    h += '<div style="flex:1"><div style="font-size:13px">' + (v.reason||'—') + '</div>';
    h += '<div style="font-size:11px;color:var(--t3)">' + (v.date||'') + (v.location?' · '+v.location:'') + '</div></div>';
    h += '<span style="font-size:13px;font-weight:600;color:var(--red)">$' + (v.fine||0).toLocaleString() + '</span>';
    h += '</div>';
  });
  return h;
}

}



function toggleLeadEdit(id) {
  var view = document.getElementById('lead-view-' + id);
  var edit = document.getElementById('lead-edit-' + id);
  var btn  = document.getElementById('edit-btn-' + id);
  if (!view || !edit) return;
  var isEditing = edit.style.display !== 'none';
  view.style.display = isEditing ? 'block' : 'none';
  edit.style.display = isEditing ? 'none'  : 'block';
  if (btn) btn.textContent = isEditing ? '✏️ 編輯' : '✕ 取消';
}

async function saveLeadEdit(id) {
  var gv = function(suffix) {
    var el = document.getElementById('ef-' + suffix + '-' + id);
    return el ? el.value : '';
  };
  var idno = gv('idno').trim().toUpperCase();
  var payload = {
    name:               gv('name').trim() || null,
    id_number_hash:     idno || null,
    age:                parseInt(gv('age')) || null,
    work_type: [gv('company'), gv('position')].filter(Boolean).join(' · ') || null,
    alert_status:       gv('alert') || 'none',
    address:            gv('addr') || null,
    huji_address:       gv('huji') || null,
    monthly_salary:     parseInt(gv('salary')) || null,
    has_salary_transfer:gv('transfer') === 'true',
    has_car_license:    gv('carlic') === 'true',
    has_bike_license:   gv('bikeic') === 'true',
    required_amount:    parseInt(gv('amount')) || null,
    fund_purpose:       gv('purpose') || null,
  };
  showLoading('儲存中…');
  var r = await sb.from('leads').update(payload).eq('id', id);
  hideLoading();
  if (r.error) { alert('儲存失敗：' + r.error.message); return; }
  // 更新本地資料
  var lead = leads.find(function(l){ return l.id === id; });
  if (lead) Object.assign(lead, payload);
  // 重新整理詳情頁
  showLeadDetail(id);
}

async function updateStatus(id, status) {
  // 更新 DB
  await sb.from('leads').update({ status: status }).eq('id', id);

  // 更新本地快取
  var lead = leads.find(function(l) { return l.id === id; });
  if (lead) lead.status = status;

  // 結案收入欄顯示/隱藏（先確認 DOM 還在）
  var incomeDiv = document.getElementById('closed-income-' + id);
  if (incomeDiv) incomeDiv.style.display = status === 'closed' ? 'block' : 'none';

  // 自動同步行事曆：今天建立一筆行程記錄
  if (currentUser && lead) {
    var today = new Date().toISOString().split('T')[0];
    var statusLabel = statusText(status);
    var schedTitle = (lead.name||'客戶') + ' · ' + statusLabel;

    // 先刪除該客戶今天的自動行程（避免重複）
    await sb.from('schedules')
      .delete()
      .eq('member_id', currentUser.id)
      .eq('lead_id', id)
      .eq('schedule_date', today)
      .eq('type', 'auto_status');

    // 新增今天的進度記錄
    await sb.from('schedules').insert({
      member_id: currentUser.id,
      lead_id: id,
      title: schedTitle,
      schedule_date: today,
      type: 'auto_status',
      description: '案件進度：' + statusLabel,
      is_done: false
    });
  }
}

function addPartnerLead(leadId) {
  if (!dealData[leadId]) dealData[leadId] = {};
  if (!dealData[leadId].partners) dealData[leadId].partners = [];
  dealData[leadId].partners.push({ name:'', work:'', rate:'' });
  showLeadDetail(leadId);
}

function removePartnerLead(leadId, idx) {
  if (dealData[leadId] && dealData[leadId].partners) {
    dealData[leadId].partners.splice(idx,1);
    showLeadDetail(leadId);
  }
}

function refreshClosedBlock(leadId) {
  // 輕量更新：只刷新結算數字，不重繪整頁
  var d = dealData[leadId] || {};
  var ai = d.actualIncome || 0;
  var partners = d.partners || [];
  var totalRate = Math.min(partners.reduce(function(s,p){return s+(parseFloat(p.rate)||0);},0), 100);
  var myShare = ai ? Math.round(ai*(1-totalRate/100)) : 0;
  // 更新我的收入顯示
  var el = document.getElementById('my-share-' + leadId);
  if (el && myShare) el.textContent = '$' + myShare.toLocaleString();
}

async function saveClosedIncome(leadId) {
  var inp = document.getElementById('closed-amt-' + leadId);
  var amount = inp ? parseInt(inp.value)||0 : 0;
  var d = dealData[leadId] || {};
  if (amount) {
    await sb.from('leads').update({ closed_amount: amount }).eq('id', leadId);
    var lead = leads.find(function(l){return l.id===leadId;});
    if (lead) lead.closed_amount = amount;
    if (!dealData[leadId]) dealData[leadId] = {};
    dealData[leadId].actualIncome = amount;
  }
  alert('✓ 已儲存結案收入');
}

async function saveNote(id) {
  var note = document.getElementById('note-' + id) ? document.getElementById('note-' + id).value : '';
  await sb.from('leads').update({ advisor_note: note }).eq('id', id);
  var lead = leads.find(function(l) { return l.id === id; });
  if (lead) lead.advisor_note = note;
  alert('備註已儲存');
}

function renderFinance() {
  var el = document.getElementById('member-content');
  var now = new Date();
  var tms = new Date(now.getFullYear(), now.getMonth(), 1);
  var lms = new Date(now.getFullYear(), now.getMonth()-1, 1);
  var lme = tms;
  var lqs = new Date(now.getFullYear(), now.getMonth()-3, 1);
  var lys = new Date(now.getFullYear()-1, now.getMonth(), 1);
  var lye = tms;

  // 計算業績數字
  function leadsIn(s, e) { return leads.filter(function(l){var d=new Date(l.created_at);return d>=s&&d<e;}); }
  function closedIn(s, e) { return leadsIn(s,e).filter(function(l){return l.status==='closed';}); }

  var thisLeads  = leadsIn(tms, new Date());
  var thisClosed = closedIn(tms, new Date());
  var lmClosed   = closedIn(lms, lme);
  var lqClosed   = closedIn(lqs, lme);
  var lyClosed   = closedIn(lys, lye);

  var perDeal    = finSettings.revenuePerDeal || 20000;
  var totalFixed = fixedExpenses.reduce(function(s,e){return s+e.amount;},0);
  var totalExtraOut = extraExpenses.reduce(function(s,e){return s+e.amount;},0);
  var totalExtraIncome = extraIncome.reduce(function(s,e){return s+e.amount;},0);

  // 實際佣金（填了比例就用實際，沒填用估算每件20000）
  function calcRealRevenue(closedArr) {
    return closedArr.reduce(function(s,l) {
      var rate = dealCommissions[l.id];
      if (rate !== undefined && rate !== '') {
        var amt = l.required_amount || 0;
        return s + Math.round(amt * parseFloat(rate) / 100);
      }
      return s + perDeal; // 未填用估算
    }, 0);
  }

  var thisRev    = calcRealRevenue(thisClosed) + totalExtraIncome;
  var lmRev      = lmClosed.length * perDeal;
  var lqRev      = lqClosed.length * perDeal;
  var lyRev      = lyClosed.length * perDeal;
  var thisExp    = totalFixed + totalExtraOut;
  var thisNet    = thisRev - thisExp;
  var lmNet      = lmRev - totalFixed;
  var lqNet      = lqRev - totalFixed*3;
  var savingsRate = thisRev > 0 ? Math.round(thisNet/thisRev*100) : 0;
  var debtTotal  = fixedExpenses.reduce(function(s,e){return s+(e.is_debt?e.amount:0);},0);
  var debtRatio  = thisRev > 0 ? Math.round(debtTotal/thisRev*100) : 0;

  function pct(n,p) {
    if(p===0) return n>0?'<span style="color:var(--grn)">▲ 新增</span>':'<span style="color:var(--t3)">—</span>';
    var v=Math.round((n-p)/p*100);
    return '<span style="color:'+(v>=0?'var(--grn)':'var(--red)')+'\">'+(v>=0?'▲':'▼')+Math.abs(v)+'%</span>';
  }

  var tabs = ['overview','expenses','income','remind'].map(function(t) {
    var label = {overview:'📊 本月總覽', expenses:'💸 支出管理', income:'💰 收入設定', remind:'🔔 繳款提醒'}[t];
    var on = financeTab===t;
    return '<button onclick="financeTab=\'' + t + '\';renderFinance()" style="padding:7px 14px;border-radius:20px;font-size:14px;cursor:pointer;border:0.5px solid '+(on?'var(--acc)':'var(--bdr2)')+';background:'+(on?'var(--al)':'transparent')+';color:'+(on?'var(--acc)':'var(--t1)')+';font-family:var(--sans)">' + label + '</button>';
  }).join('');

  var content = '';

  // ──────────────────────────────────
  if (financeTab === 'overview') {

    // ① 本月核心數字（四格）
    content += '<div class="stat-grid" style="margin-bottom:12px">';
    content += '<div class="stat-card"><div class="stat-l">本月業績收入</div><div class="stat-v" style="color:var(--grn)">$' + thisRev.toLocaleString() + '</div><div class="stat-s">' + pct(thisRev,lmRev) + ' vs 前月</div></div>';
    content += '<div class="stat-card"><div class="stat-l">本月總支出</div><div class="stat-v" style="color:var(--red)">$' + thisExp.toLocaleString() + '</div><div class="stat-s">固定 $' + totalFixed.toLocaleString() + '</div></div>';
    content += '<div class="stat-card"><div class="stat-l">本月淨結餘</div><div class="stat-v" style="color:' + (thisNet>=0?'var(--acc)':'var(--red)') + '">$' + thisNet.toLocaleString() + '</div><div class="stat-s">儲蓄率 ' + savingsRate + '%</div></div>';
    content += '<div class="stat-card"><div class="stat-l">本月成交</div><div class="stat-v">' + thisClosed.length + ' 件</div><div class="stat-s">' + pct(thisClosed.length, lmClosed.length) + ' vs 前月</div></div>';
    content += '</div>';

    // ② 健康指標儀表板
    content += '<div class="card" style="margin-bottom:12px">';
    content += '<div class="ct">📈 財務健康指標</div>';

    // 儲蓄率
    var srColor = savingsRate>=50?'var(--grn)':savingsRate>=30?'var(--yel)':'var(--red)';
    var srLabel = savingsRate>=50?'健康':savingsRate>=30?'普通':'偏低';
    content += '<div style="margin-bottom:12px">';
    content += '<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:14px;color:var(--t2)">儲蓄率（淨結餘/收入）</span><span style="font-size:14px;font-weight:600;color:'+srColor+'">'+savingsRate+'% · '+srLabel+'</span></div>';
    content += '<div style="background:rgba(255,255,255,.08);border-radius:6px;height:8px;overflow:hidden"><div style="height:100%;border-radius:6px;background:'+srColor+';width:'+Math.min(100,savingsRate)+'%;transition:width .5s"></div></div>';
    content += '<div style="font-size:12px;color:var(--t3);margin-top:3px">建議 ≥ 30%</div></div>';

    // 負債比
    var drColor = debtRatio<=30?'var(--grn)':debtRatio<=50?'var(--yel)':'var(--red)';
    var drLabel = debtRatio<=30?'健康':debtRatio<=50?'注意':'偏高';
    content += '<div style="margin-bottom:12px">';
    content += '<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:14px;color:var(--t2)">固定負債比（負債/收入）</span><span style="font-size:14px;font-weight:600;color:'+drColor+'">'+debtRatio+'% · '+drLabel+'</span></div>';
    content += '<div style="background:rgba(255,255,255,.08);border-radius:6px;height:8px;overflow:hidden"><div style="height:100%;border-radius:6px;background:'+drColor+';width:'+Math.min(100,debtRatio)+'%;transition:width .5s"></div></div>';
    content += '<div style="font-size:12px;color:var(--t3);margin-top:3px">建議 ≤ 30%（勾選「負債」的固定支出）</div></div>';

    // 債務健康評分
    var score = 100;
    if(savingsRate<30) score-=20;
    if(savingsRate<10) score-=15;
    if(debtRatio>50) score-=20;
    if(debtRatio>70) score-=15;
    if(thisNet<0) score-=15;
    score = Math.max(0, score);
    var scoreColor = score>=80?'var(--grn)':score>=60?'var(--yel)':'var(--red)';
    var scoreLabel = score>=80?'優質 👍':score>=60?'普通 📊':'需改善 ⚠️';
    content += '<div style="display:flex;align-items:center;justify-content:space-between;background:var(--inp);border-radius:8px;padding:10px 12px">';
    content += '<div><div style="font-size:15px;font-weight:600">財務健康評分</div><div style="font-size:13px;color:var(--t3)">綜合儲蓄率、負債比、結餘狀況</div></div>';
    content += '<div style="font-size:32px;font-weight:800;color:'+scoreColor+'">'+score+'<span style="font-size:16px;color:var(--t3)">/100</span></div>';
    content += '</div>';
    content += '<div style="font-size:13px;font-weight:500;color:'+scoreColor+';text-align:center;margin-top:6px">'+scoreLabel+'</div>';
    content += '</div>';

    // ③ 業績 vs 前月/前季/前年比較
    content += '<div class="card" style="margin-bottom:12px">';
    content += '<div class="ct">📊 業績收支歷史比較</div>';

    // 四欄大數字
    content += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">';
    var periods2 = [
      {label:'本月', rev:thisRev, net:thisNet, deals:thisClosed.length, hl:true},
      {label:'前月', rev:lmRev, net:lmNet, deals:lmClosed.length, hl:false},
      {label:'前季累計', rev:lqRev, net:lqNet, deals:lqClosed.length, hl:false},
      {label:'去年同月', rev:lyRev, net:lyRev-totalFixed, deals:lyClosed.length, hl:false},
    ];
    periods2.forEach(function(p) {
      content += '<div style="background:'+(p.hl?'var(--al)':'var(--inp)')+';border:0.5px solid '+(p.hl?'rgba(200,81,26,.3)':'var(--bdr)')+';border-radius:10px;padding:10px 8px">';
      content += '<div style="font-size:12px;color:var(--t2);margin-bottom:4px">'+p.label+'</div>';
      content += '<div style="font-size:18px;font-weight:700;color:'+(p.hl?'var(--acc)':'var(--t0)')+'">$'+p.rev.toLocaleString()+'</div>';
      content += '<div style="font-size:12px;color:'+(p.net>=0?'var(--grn)':'var(--red)')+';margin-top:2px">淨 $'+p.net.toLocaleString()+'</div>';
      content += '<div style="font-size:12px;color:var(--t3);margin-top:1px">'+p.deals+' 件</div>';
      content += '</div>';
    });
    content += '</div>';

    // 詳細比較表
    content += '<table style="width:100%;border-collapse:collapse;font-size:13px">';
    content += '<tr style="border-bottom:0.5px solid var(--bdr);color:var(--t2)">';
    ['期間','收入','支出','淨收入','成長率'].forEach(function(h2){
      content += '<th style="text-align:'+(h2==='期間'?'left':'right')+';padding:6px 4px;font-weight:400">'+h2+'</th>';
    });
    content += '</tr>';
    [
      {label:'本月',rev:thisRev,exp:thisExp,net:thisNet,cmp:lmNet,hl:true},
      {label:'前月',rev:lmRev,exp:totalFixed,net:lmNet,cmp:null,hl:false},
      {label:'前季均',rev:Math.round(lqRev/3),exp:totalFixed,net:Math.round(lqNet/3),cmp:null,hl:false},
      {label:'去年同月',rev:lyRev,exp:totalFixed,net:lyRev-totalFixed,cmp:null,hl:false},
    ].forEach(function(r) {
      var growPct = (r.cmp!=null&&lmNet>0) ? Math.round((thisNet-lmNet)/Math.abs(lmNet)*100) : null;
      content += '<tr style="border-bottom:0.5px solid var(--bdr);'+(r.hl?'background:rgba(200,81,26,.06)':'')+'">';
      content += '<td style="padding:8px 4px;font-weight:'+(r.hl?'600':'400')+';color:'+(r.hl?'var(--acc)':'var(--t1)')+'">'+r.label+'</td>';

  // ──────────────────────────────────

    content += '<button class="btn-p" onclick="saveRemind()" style="flex:1">新增</button>';
    content += '</div></div>';

    // 提醒列表
    var allReminders = fixedExpenses.slice().sort(function(a,b) {
      var da = new Date(now.getFullYear(), now.getMonth(), a.due_day);
      var db = new Date(now.getFullYear(), now.getMonth(), b.due_day);
      if(da < now) da = new Date(now.getFullYear(), now.getMonth()+1, a.due_day);
      if(db < now) db = new Date(now.getFullYear(), now.getMonth()+1, b.due_day);
      return da - db;
    });

    if (allReminders.length === 0) {
      content += '<div style="text-align:center;padding:20px;color:var(--t2)">尚無繳款提醒，點「+ 新增提醒」開始建立</div>';
    } else {
      allReminders.forEach(function(e) {
        var due = new Date(now.getFullYear(), now.getMonth(), e.due_day);
        if (due < now) due = new Date(now.getFullYear(), now.getMonth()+1, e.due_day);
        var diff = Math.ceil((due - now) / (1000*60*60*24));
        var remindDays = e.remind_days || 3;
        var isActive = diff <= remindDays; // 在提醒範圍內
        var color = diff <= 3 ? 'red' : diff <= 7 ? 'yel' : 'grn';
        var label = diff < 0 ? '已過期' : diff === 0 ? '今天到期' : diff === 1 ? '明天到期' : '剩 ' + diff + ' 天';

        content += '<span style="font-size:22px">' + e.icon + '</span>';
        content += '<div style="flex:1">';
        content += '<div style="font-size:15px;font-weight:600">' + e.name + '</div>';
        content += '<div style="font-size:13px;color:var(--t2);margin-top:2px">每月 ' + e.due_day + ' 日 · ' + label;
        content += ' · <span style="color:var(--t3)">' + remindLabel + '</span></div>';
        content += '</div>';
        content += '<div style="text-align:right">';
        content += '<div style="font-size:15px;font-weight:700;color:var(--' + (isActive?color:'t2') + ')">$' + e.amount.toLocaleString() + '</div>';
        content += '</div>';
        content += '<button onclick="removeExpense(' + e.id + ')" style="font-size:12px;padding:2px 8px;border-radius:5px;border:0.5px solid rgba(192,64,48,.3);background:transparent;color:var(--red);cursor:pointer;font-family:var(--sans)">刪</button>';
        content += '</div>';
      });
      content += '<div style="display:flex;justify-content:space-between;padding:10px 0;border-top:0.5px solid var(--bdr);margin-top:4px">';
      content += '<span style="color:var(--t2)">本月合計</span>';
      content += '<span style="font-weight:600;font-size:16px;color:var(--red)">$' + totalFixed.toLocaleString() + '</span>';
      content += '</div>';
    }
    content += '</div>';
  }

  el.innerHTML = '';
  var title = document.createElement('div');

  tabDiv.innerHTML = tabs;
  el.appendChild(tabDiv);

  contentDiv.innerHTML = content;
  el.appendChild(contentDiv);
}

function showAddRemind() {
  var el = document.getElementById('add-remind-form');
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}
function saveRemind() {
  var icon    = document.getElementById('rm-icon')   ? document.getElementById('rm-icon').value   || '💳' : '💳';
  var name    = document.getElementById('rm-name')   ? document.getElementById('rm-name').value.trim()   : '';
  var amount  = parseInt(document.getElementById('rm-amount') ? document.getElementById('rm-amount').value : 0) || 0;
  var due_day = parseInt(document.getElementById('rm-day')    ? document.getElementById('rm-day').value    : 1) || 1;
  var remind  = parseInt(document.getElementById('rm-remind') ? document.getElementById('rm-remind').value : 3) || 3;
  if (!name)    { alert('請填寫提醒名稱'); return; }
  if (!due_day) { alert('請填寫繳款日期'); return; }
  fixedExpenses.push({ id: Date.now(), icon:icon, name:name, amount:amount||0, due_day:due_day, remind_days:remind });
  renderFinance();
}

function showAddExtra() {
  var el = document.getElementById('add-extra-form');
  if (el) { el.style.display = 'block'; var d = document.getElementById('ext-date'); if(d) d.value = new Date().toISOString().split('T')[0]; }
}
function saveExtra() {
  var icon = document.getElementById('ext-icon') ? document.getElementById('ext-icon').value||'💸' : '💸';
  var name = document.getElementById('ext-name') ? document.getElementById('ext-name').value.trim() : '';
  var amount = parseInt(document.getElementById('ext-amount') ? document.getElementById('ext-amount').value : 0) || 0;
  var date = document.getElementById('ext-date') ? document.getElementById('ext-date').value : '';
  if (!name||!amount) { alert('請填寫名稱和金額'); return; }
  extraExpenses.push({ icon:icon, name:name, amount:amount, date:date });
  renderFinance();
}
function removeExtra(idx) { extraExpenses.splice(idx,1); renderFinance(); }
