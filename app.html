<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>顧問PRO</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#111111;--bg2:#1A1A1A;--card:#242424;--bdr:rgba(255,255,255,.08);--bdr2:rgba(255,255,255,.15);
  --inp:#2E2E2E;--inpt:#EEE;
  --t0:#FFF;--t1:#CCC;--t2:#888;--t3:#555;
  --acc:#C8511A;--acc2:#E8712A;--al:rgba(200,81,26,.12);
  --grn:#2D8A4E;--gl:rgba(45,138,78,.12);
  --red:#C04030;--rl:rgba(192,64,48,.12);
  --yel:#B88020;--yl:rgba(184,128,32,.12);
  --blu:#2A6AB8;--bl:rgba(42,106,184,.12);
  --serif:'Georgia',serif;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--t0);font-family:var(--sans);overflow-x:hidden;font-size:16px}

/* ── LAYOUT ── */
#app{height:100%;display:flex;flex-direction:column}
.page{display:none;flex:1;overflow-y:auto}
.page.active{display:flex;flex-direction:column}

/* ── AUTH PAGES ── */
.auth-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;width:100%}
.auth-logo{font-size:34px;font-weight:800;margin-bottom:8px;letter-spacing:-.5px;text-align:center}
.auth-logo span{color:var(--acc)}
.auth-sub{font-size:16px;color:var(--t2);margin-bottom:32px;text-align:center}
.auth-box{background:var(--card);border:0.5px solid var(--bdr2);border-radius:16px;padding:32px 28px;width:100%;max-width:440px}
.auth-title{font-size:20px;font-weight:600;margin-bottom:20px}
.auth-tabs{display:flex;border-bottom:0.5px solid var(--bdr);margin-bottom:20px}
.auth-tab{flex:1;padding:10px;font-size:16px;cursor:pointer;color:var(--t2);border:none;background:none;font-family:var(--sans);border-bottom:2px solid transparent;margin-bottom:-0.5px;transition:all .15s}
.auth-tab.on{color:var(--acc);border-bottom-color:var(--acc);font-weight:500}
.frow{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
.flbl{font-size:16px;color:var(--t1);font-weight:500}
.fi{width:100%;padding:12px 14px;background:var(--inp);border:0.5px solid var(--bdr2);border-radius:9px;color:var(--inpt);font-size:16px;font-family:var(--sans);transition:border-color .15s;-webkit-appearance:none}
.fi:focus{outline:none;border-color:var(--acc)}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-p{width:100%;padding:12px;background:var(--acc);color:#FFF;border:none;border-radius:9px;font-size:16px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:all .2s;margin-top:4px}
.btn-p:hover{background:var(--acc2)}
.btn-p:disabled{opacity:.5;cursor:not-allowed}
.btn-sm{padding:7px 14px;background:transparent;color:var(--t1);border:0.5px solid var(--bdr2);border-radius:7px;font-size:16px;cursor:pointer;font-family:var(--sans);transition:all .15s}
.btn-sm:hover{border-color:var(--t2)}
.btn-grn{padding:8px 16px;background:var(--grn);color:#FFF;border:none;border-radius:8px;font-size:16px;font-weight:500;cursor:pointer;font-family:var(--sans)}
.auth-hint{font-size:16px;color:var(--t2);text-align:center;margin-top:14px;line-height:1.5}
.err-msg{background:var(--rl);border:0.5px solid rgba(192,64,48,.3);border-radius:7px;padding:8px 12px;font-size:16px;color:#E06050;margin-bottom:12px;display:none}
.ok-msg{background:var(--gl);border:0.5px solid rgba(45,138,78,.3);border-radius:7px;padding:8px 12px;font-size:16px;color:#50C070;margin-bottom:12px;display:none}

/* ── TOPBAR ── */
.topbar{background:var(--bg);border-bottom:0.5px solid var(--bdr);padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;flex-shrink:0}
.top-logo{font-size:17px;font-weight:800;letter-spacing:-.3px}
.top-logo span{color:var(--acc)}
.top-right{display:flex;align-items:center;gap:8px}
.badge{display:inline-block;font-size:16px;padding:3px 9px;border-radius:20px;font-weight:500}
.b-acc{background:var(--al);color:var(--acc)}
.b-grn{background:var(--gl);color:var(--grn)}
.b-red{background:var(--rl);color:var(--red)}
.b-yel{background:var(--yl);color:var(--yel)}
.b-blu{background:var(--bl);color:var(--blu)}
.b-gray{background:rgba(255,255,255,.06);color:var(--t2)}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--al);color:var(--acc);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;cursor:pointer}

/* ── BOTTOM NAV ── */
.bottom-nav{background:var(--bg);border-top:0.5px solid var(--bdr);display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 6px;cursor:pointer;border:none;background:none;font-family:var(--sans);color:var(--t3);font-size:16px;gap:3px;transition:color .15s}
.bn-item.on{color:var(--acc)}
.bn-icon{font-size:20px;line-height:1}

/* ── CONTENT ── */
.content{padding:14px 16px;flex:1}
.card{background:var(--card);border:0.5px solid var(--bdr);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.ct{font-size:16px;font-weight:600;color:var(--t0);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:5px;flex-wrap:wrap}
.ri{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:0.5px solid var(--bdr);font-size:16px;gap:6px}
.ri:last-child{border-bottom:none}
.rl{color:var(--t2);font-size:16px;flex-shrink:0;min-width:85px}
.rv{font-weight:500;color:var(--t0);text-align:right;flex:1;font-size:16px}
.sl{font-size:16px;font-weight:600;color:var(--t1);margin:10px 0 6px;padding-bottom:4px;border-bottom:0.5px solid var(--bdr)}
.ib-acc{background:var(--al);border:0.5px solid rgba(200,81,26,.3);border-radius:8px;padding:8px 11px;font-size:16px;color:var(--acc);line-height:1.5;margin-bottom:8px}
.ib-grn{background:var(--gl);border:0.5px solid rgba(45,138,78,.3);border-radius:8px;padding:8px 11px;font-size:16px;color:var(--grn);line-height:1.5;margin-bottom:8px}
.ib-red{background:var(--rl);border:0.5px solid rgba(192,64,48,.3);border-radius:8px;padding:8px 11px;font-size:16px;color:var(--red);line-height:1.5;margin-bottom:8px}
.ib-yel{background:var(--yl);border:0.5px solid rgba(184,128,32,.3);border-radius:8px;padding:8px 11px;font-size:16px;color:var(--yel);line-height:1.5;margin-bottom:8px}

/* ── STATS ── */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
.stat-card{background:var(--card);border:0.5px solid var(--bdr);border-radius:10px;padding:11px 13px}
.stat-l{font-size:16px;color:var(--t2);margin-bottom:3px}
.stat-v{font-size:24px;font-weight:700;color:var(--t0)}
.stat-s{font-size:16px;color:var(--t3);margin-top:2px}

/* ── PROB CARDS ── */
.prob-row{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:6px}
.prob-row-2{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.pcard{border:0.5px solid var(--bdr);border-radius:8px;padding:7px;text-align:center;background:var(--inp)}
.pcard-n{font-size:16px;color:var(--t3);margin-bottom:3px}
.pcard-v{font-size:16px;font-weight:700}
.pb-w{height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;margin-top:3px}
.pb-f{height:100%;border-radius:2px}
.p-red{color:var(--red)}.pb-red{background:var(--red)}
.p-yel{color:var(--yel)}.pb-yel{background:var(--yel)}
.p-grn{color:var(--grn)}.pb-grn{background:var(--grn)}
.p-lgrn{color:#259A3E}.pb-lgrn{background:#259A3E}
.p-none{color:var(--t3)}.pb-none{background:var(--bdr2)}

/* ── LEADS LIST ── */
.lead-item{background:var(--card);border:0.5px solid var(--bdr);border-radius:10px;padding:11px 13px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;display:flex;align-items:center;gap:10px}
.lead-item:hover{border-color:var(--bdr2)}
.lead-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;flex-shrink:0}
.lead-info{flex:1;min-width:0}
.lead-name{font-size:16px;font-weight:500;color:var(--t0)}
.lead-sub{font-size:16px;color:var(--t2);margin-top:2px}
.lead-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}

/* ── FORM ── */
.form-section{background:var(--card);border:0.5px solid var(--bdr);border-radius:12px;padding:14px;margin-bottom:10px}
.fs-title{font-size:16px;font-weight:600;color:var(--t1);margin-bottom:10px;padding-bottom:6px;border-bottom:0.5px solid var(--bdr);display:flex;align-items:center;gap:6px}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.frow.full{grid-column:1/-1}
.req{color:var(--acc);font-size:16px}

/* ── TOGGLE ── */
.tgl-row{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border:0.5px solid var(--bdr);border-radius:8px;margin-bottom:5px;cursor:pointer;transition:border-color .15s}
.tgl-row.opted{border-color:var(--grn)}
.tgl-row.opted-blu{border-color:var(--blu)}
.tgl-row.req-row{opacity:.7;pointer-events:none}
.tgl-info{flex:1}
.tgl-t{font-size:16px;font-weight:500;color:var(--t0)}
.tgl-s{font-size:16px;color:var(--t2);margin-top:2px;line-height:1.4}
.tgl{width:32px;height:18px;border-radius:9px;background:var(--bdr2);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;display:inline-block;margin-top:2px}
.tgl.on{background:var(--grn)}
.tgl.on-blu{background:var(--blu)}
.tgl::after{content:'';position:absolute;width:12px;height:12px;border-radius:50%;background:white;top:3px;left:3px;transition:left .2s}
.tgl.on::after,.tgl.on-blu::after{left:17px}
.tgl-lbl{font-size:16px;margin-top:3px;text-align:center;white-space:nowrap}
.all-btn{display:flex;align-items:center;gap:8px;padding:8px 11px;background:var(--gl);border:0.5px solid rgba(45,138,78,.3);border-radius:8px;cursor:pointer;margin-bottom:6px}
.all-t{font-size:16px;color:var(--grn);font-weight:500}

/* ── STEPS ── */
.steps{display:flex;align-items:center;margin-bottom:14px}
.step{display:flex;flex-direction:column;align-items:center;flex:1}
.sc{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600}
.sc-done{background:var(--grn);color:#FFF}
.sc-act{background:var(--acc);color:#FFF}
.sc-todo{background:var(--inp);color:var(--t3);border:0.5px solid var(--bdr)}
.slbl{font-size:16px;margin-top:2px;text-align:center;white-space:nowrap}
.sld{color:var(--grn)}.sla{color:var(--acc)}.slt{color:var(--t3)}
.step-line{height:0.5px;flex:1;background:var(--bdr);margin-bottom:13px}
.step-line.done{background:var(--grn)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:20px 16px 32px}
.modal-handle{width:36px;height:4px;background:var(--bdr2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:600;margin-bottom:14px}

/* ── SCORE DISPLAY ── */
.score-prop{border-radius:9px;padding:10px 12px;margin-top:8px}
.sp-ok{background:var(--gl);border:0.5px solid rgba(45,138,78,.3)}
.sp-warn{background:var(--yl);border:0.5px solid rgba(184,128,32,.3)}
.sp-bad{background:var(--rl);border:0.5px solid rgba(192,64,48,.3)}

/* ── LOADING ── */
.loading{position:fixed;inset:0;background:rgba(10,10,10,.9);z-index:300;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.loading.show{display:flex}
.spinner{width:32px;height:32px;border:2px solid var(--bdr2);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-t{font-size:16px;color:var(--t1)}

/* ── DESKTOP ── */
@media(min-width:768px){
  .page.active{flex-direction:row}
  .desktop-sidebar{width:220px;min-width:220px;background:var(--bg2);border-right:0.5px solid var(--bdr);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;overflow-y:auto;flex-shrink:0}
  .ds-logo{padding:16px 16px 12px;border-bottom:0.5px solid var(--bdr);font-size:18px;font-weight:800}
  .ds-logo span{color:var(--acc)}
  .ds-navs{padding:8px 8px 0}
  .ds-lbl{font-size:16px;color:var(--t3);padding:0 7px;margin:6px 0 3px;text-transform:uppercase;letter-spacing:.07em}
  .ds-ni{display:flex;align-items:center;gap:7px;padding:9px 11px;border-radius:8px;cursor:pointer;font-size:16px;color:var(--t2);background:transparent;border:none;font-family:var(--sans);width:100%;text-align:left;transition:all .12s}
  .ds-ni:hover{background:rgba(255,255,255,.04);color:var(--t0)}
  .ds-ni.on{background:var(--al);color:var(--acc);font-weight:500}
  .desktop-main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
  .bottom-nav{display:none}
  .topbar{display:none}
  .stat-grid{grid-template-columns:repeat(4,1fr)}
  .prob-row,.prob-row-2{grid-template-columns:repeat(6,1fr)}
}
@media(max-width:767px){
  .desktop-sidebar{display:none}
}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-t" id="loading-text">載入中…</div>
</div>

<div id="app">

<!-- ── 登入/註冊頁 ── -->
<div class="page active" id="page-auth">
  <div class="auth-wrap">
    <div class="auth-logo">顧問<span>PRO</span></div>
    <div class="auth-sub">貸款評估專業平台</div>
    <div class="auth-box">
      <div class="auth-tabs">
        <button class="auth-tab on" onclick="switchAuthTab('login',this)">登入</button>
        <button class="auth-tab" onclick="switchAuthTab('register',this)">加入成為顧問</button>
      </div>
      <div id="err-msg" class="err-msg"></div>
      <div id="ok-msg" class="ok-msg"></div>

      <!-- 登入表單 -->
      <div id="form-login">
        <div class="frow">
          <div class="flbl">Email</div>
          <input class="fi" type="email" id="login-email" placeholder="your@email.com" autocomplete="email">
        </div>
        <div class="frow">
          <div class="flbl">密碼</div>
          <input class="fi" type="password" id="login-pw" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn-p" id="login-btn" onclick="doLogin()">登入</button>
        <div class="auth-hint">還沒有帳號？點上方「加入成為顧問」</div>
      </div>

      <!-- 註冊表單 -->
      <div id="form-register" style="display:none">
        <div class="fg2">
          <div class="frow">
            <div class="flbl">姓名 <span class="req">*</span></div>
            <input class="fi" id="reg-name" placeholder="真實姓名">
          </div>
          <div class="frow">
            <div class="flbl">公司名稱</div>
            <input class="fi" id="reg-company" placeholder="可空白">
          </div>
        </div>
        <div class="frow">
          <div class="flbl">Email <span class="req">*</span></div>
          <input class="fi" type="email" id="reg-email" placeholder="your@email.com" autocomplete="email">
        </div>
        <div class="frow">
          <div class="flbl">手機號碼</div>
          <input class="fi" type="tel" id="reg-phone" placeholder="09XX-XXXXXX">
        </div>
        <div class="fg2">
          <div class="frow">
            <div class="flbl">所在縣市</div>
            <select class="fi" id="reg-city" onchange="updateDistricts()">
              <option value="">選擇縣市</option>
              <option>台北市</option><option>新北市</option><option>桃園市</option>
              <option>台中市</option><option>台南市</option><option>高雄市</option>
              <option>基隆市</option><option>新竹市</option><option>新竹縣</option>
              <option>苗栗縣</option><option>彰化縣</option><option>南投縣</option>
              <option>雲林縣</option><option>嘉義市</option><option>嘉義縣</option>
              <option>屏東縣</option><option>宜蘭縣</option><option>花蓮縣</option>
              <option>台東縣</option><option>澎湖縣</option><option>金門縣</option><option>連江縣</option>
            </select>
          </div>
          <div class="frow">
            <div class="flbl">行政區</div>
            <select class="fi" id="reg-district"><option value="">請先選縣市</option></select>
          </div>

        </div>
        <div class="frow">
          <div class="flbl">密碼 <span class="req">*</span></div>
          <input class="fi" type="password" id="reg-pw" placeholder="至少8碼英數混合" autocomplete="new-password">
        </div>

        <!-- 服務須知 -->
        <div style="background:var(--inp);border-radius:8px;padding:12px 14px;font-size:16px;color:var(--t2);line-height:1.6;max-height:100px;overflow-y:auto;margin:10px 0">
          <strong style="color:var(--t0)">會員服務須知摘要</strong><br>
          本平台供貸款顧問使用。您有義務依個資法保護客戶個人資料，不得超出授權範圍使用、不得轉售客戶資料。違規者停權並保留法律追訴權。完整條款請見服務條款頁面。
        </div>
        <div class="tgl-row opted" id="terms-row" onclick="toggleTerms()">
          <div class="tgl-info">
            <div class="tgl-t">我已閱讀並同意會員服務須知與個資保護義務</div>
            <div class="tgl-s">必要同意，不同意無法建立帳號</div>
          </div>
          <div style="text-align:center">
            <div class="tgl on" id="terms-tgl"></div>
            <div class="tgl-lbl" id="terms-lbl" style="color:var(--grn)">同意</div>
          </div>
        </div>

        <button class="btn-p" id="reg-btn" onclick="doRegister()">建立顧問帳號</button>
        <div class="auth-hint">已有帳號？點上方「登入」</div>
      </div>
    </div>
  </div>
</div>

<!-- ── 會員後台 ── -->
<div class="page" id="page-member">
  <!-- 桌機側欄 -->
  <div class="desktop-sidebar">
    <div class="ds-logo">顧問<span>PRO</span></div>
    <div class="ds-navs">
      <div class="ds-lbl">會員後台</div>
      <button class="ds-ni on" onclick="navTo('dash',this)">📊 儀表板</button>
      <button class="ds-ni" onclick="navTo('leads',this)">👥 客戶名單</button>
      <button class="ds-ni" onclick="navTo('add-lead',this)">➕ 新增客戶</button>
      <button class="ds-ni" onclick="navTo('finance',this)">💰 收支理財</button>
      <button class="ds-ni" onclick="navTo('invite',this)">🎁 邀請碼</button>
      <div class="ds-lbl">評估設定</div>
      <button class="ds-ni" onclick="navTo('score-rules',this)">🎯 AI評分規則</button>
      <button class="ds-ni" onclick="navTo('prop-thresholds',this)">🏠 不動產門檻</button>
      <div class="ds-lbl">系統</div>
      <button class="ds-ni" onclick="navTo('appearance',this)">🎨 外觀設定</button>
      <button class="ds-ni" onclick="navTo('settings',this)">⚙️ 帳號設定</button>
      <button class="ds-ni" onclick="navTo('report',this)">🚩 問題回報</button>

// ════════════════════════════════════════
// 評分引擎
// ════════════════════════════════════════
function calcScores(lead) {
  const salary = lead.monthly_salary || 0;
  const hasTransfer = lead.has_salary_transfer;
  const hasCarLic = lead.has_car_license;
  const hasBikeLic = lead.has_bike_license;
  const hasAlert = ['alert','negotiation','rehabilitation','liquidation'].includes(lead.alert_status);
  const ccAge = lead.credit_card_age || 'none';
  const bankReject = lead.bank_recent_reject || 'none';
  const finReject = lead.finance_recent_reject || 'none';
  const R = scoreRules;

  // 銀行信貸
  let bank = (hasAlert && R.bankAlertBlock) ? 0 : 40;
  if (bank > 0) {
    if (hasTransfer) bank += R.bankTransferBonus;
    if (ccAge === '1y+') bank += R.bankCC1y;
    else if (ccAge === '6m+') bank += R.bankCC6m;
    else if (ccAge === '3m+') bank += R.bankCC3m;
    if (bankReject === 'none') bank += 12;
    else if (bankReject === '3-6m') bank += R.bankReject3_6m;
    else if (bankReject === '1-3m') bank += R.bankReject1_3m;
    else if (bankReject === '<1m') bank += R.bankRejectLt1m;
    bank = Math.min(95, Math.max(0, bank));
  }

  // 汽車貸款
  let car = 0;
  if (salary > 0) {
    if (hasCarLic) car += R.carLicBonus;
    car += salary >= 50000 ? 35 : salary >= 35000 ? 25 : salary >= 25000 ? 15 : 5;
    if (finReject === 'none') car += 15;
    else if (finReject === '3-6m') car += R.finReject3_6m;
    else if (finReject === '1-3m') car += R.finReject1_3m;
    else if (finReject === '<1m') car += R.finRejectLt1m;
    car = Math.min(92, Math.max(0, car));
  }

  // 機車貸款
  let bike = 0;
  if (salary > 0) {
    if (hasBikeLic) bike += R.bikeLicBonus;
    bike += salary >= 25000 ? 40 : salary >= 18000 ? 28 : 15;
    if (finReject === 'none') bike += 15;
    else if (finReject === '<1m') bike += R.finRejectLt1m;
    bike = Math.min(95, Math.max(0, bike));
  }

  // 商品手機貸
  let phone = 0;
  if (salary >= 22000) {
    phone = 45 + (salary >= 40000 ? 20 : salary >= 30000 ? 12 : 5);
    if (finReject === '<1m') phone += R.finRejectLt1m;
    phone = Math.min(88, Math.max(0, phone));
  }

  // 當鋪
  const pawn = lead.has_collateral ? R.pawnCollateral : R.pawnNone;

  // 不動產
  let propRatio = null;
  let propStatus = null;
  if (lead.has_property && lead.property_valuation) {
    const totalDebt = (lead.property_loan1||0) + (lead.property_loan2||0) + (lead.property_loan3||0);
    propRatio = totalDebt > 0 ? parseFloat((totalDebt / lead.property_valuation * 100).toFixed(1)) : 0;
    propStatus = propRatio <= propThresholds.t1 ? 'ok' : propRatio <= propThresholds.t2 ? 'warn' : 'bad';
  }

  return { bank, car, bike, phone, pawn, propRatio, propStatus };
}

function scoreColor(s) {
  if (s >= 80) return 'p-lgrn';
  if (s >= 70) return 'p-grn';
  if (s >= 60) return 'p-yel';
  return 'p-red';
}
function scoreBarColor(s) {
  if (s >= 80) return 'pb-lgrn';
  if (s >= 70) return 'pb-grn';
  if (s >= 60) return 'pb-yel';
  return 'pb-red';
}

function renderProbCards(scores) {
  const items = [
    ['銀行信貸', scores.bank],
    ['汽車貸款', scores.car],
    ['機車貸款', scores.bike],
    ['商品手機貸', scores.phone],
    ['當鋪借貸', scores.pawn],
  ];
  let propCard = '';
  if (scores.propRatio !== null) {
    const col = scores.propStatus === 'ok' ? 'p-lgrn' : scores.propStatus === 'warn' ? 'p-yel' : 'p-red';
    const bcol = scores.propStatus === 'ok' ? 'pb-lgrn' : scores.propStatus === 'warn' ? 'pb-yel' : 'pb-red';
    const label = scores.propStatus === 'ok' ? '有效成交' : scores.propStatus === 'warn' ? '有效買賣' : '空間不足';
    propCard = `<div class="pcard" style="border-color:var(--grn)"><div class="pcard-n">不動產</div><div class="pcard-v ${col}" style="font-size:16px">${scores.propRatio.toFixed(1)}%</div><div class="pb-w"><div class="pb-f ${bcol}" style="width:${Math.min(100,scores.propRatio)}%"></div></div><div style="font-size:16px;color:var(--grn);margin-top:2px">${label}</div></div>`;
  } else {
    propCard = `<div class="pcard" style="opacity:.4"><div class="pcard-n">不動產</div><div class="pcard-v p-none">無</div><div class="pb-w"><div class="pb-f pb-none" style="width:0%"></div></div></div>`;
  }
  const cards = items.map(([n,s]) => `
    <div class="pcard">
      <div class="pcard-n">${n}</div>
      <div class="pcard-v ${s > 0 ? scoreColor(s) : 'p-none'}">${s > 0 ? s + '%' : '—'}</div>
      <div class="pb-w"><div class="pb-f ${s > 0 ? scoreBarColor(s) : 'pb-none'}" style="width:${s}%"></div></div>
    </div>`).join('');
  return `<div class="prob-row">${cards}${propCard}</div>`;
}

function getVal(id) { const el = document.getElementById(id); return el ? el.value : ''; }
function getInt(id) { const el = document.getElementById(id); return el ? parseInt(el.value) || 0 : 0; }

const LOAN_CFG = {
  credit: { label:'銀行信用貸款', type:'bank', placeholder_inst:'例：玉山銀行', hasPenalty:false },
  car:    { label:'汽車貸款',     type:'finance', placeholder_inst:'例：和潤企業', hasPenalty:true },
  bike:   { label:'機車貸款',     type:'finance', placeholder_inst:'例：裕融企業', hasPenalty:true },
  phone:  { label:'商品手機貸',   type:'finance', placeholder_inst:'例：中租零顧', hasPenalty:true },
  pawn:   { label:'當鋪/民間',    type:'civil',   placeholder_inst:'', hasPenalty:false, hasPawnRate:true },
};
let loanCounters = { credit:0, car:0, bike:0, phone:0, pawn:0 };

function addLoanRow(listId, type) {
  const cfg = LOAN_CFG[type];
  const idx = ++loanCounters[type];
  const id = `${type}_${idx}`;
  const list = document.getElementById(listId);
  const div = document.createElement('div');
  div.id = `row_${id}`;
  div.style.cssText = 'background:var(--inp);border-radius:8px;padding:10px 12px;margin-bottom:8px;border:0.5px solid var(--bdr)';
  div.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <span style="font-size:16px;font-weight:500;color:var(--t1)">第 ${idx} 筆</span>
      <button onclick="document.getElementById('row_${id}').remove()" style="font-size:16px;padding:2px 8px;border-radius:5px;border:0.5px solid rgba(192,64,48,.3);background:transparent;color:var(--red);cursor:pointer;font-family:var(--sans)">刪除</button>
    </div>
    <div class="frow2">
      <div class="frow"><div class="flbl">貸款金額（元）</div><input class="fi" id="${id}_amt" type="number" placeholder="0" inputmode="numeric"></div>
      <div class="frow"><div class="flbl">月繳（元）</div><input class="fi" id="${id}_pay" type="number" placeholder="0" inputmode="numeric"></div>
    </div>
    <div class="frow2">
      ${cfg.hasPenalty ? `<div class="frow"><div class="flbl">違約金（元）</div><input class="fi" id="${id}_penalty" type="number" placeholder="0" inputmode="numeric"></div>` : ''}
      ${cfg.hasPawnRate ? `<div class="frow"><div class="flbl">月利率（%）</div><input class="fi" id="${id}_rate" type="number" placeholder="5" step="0.1" inputmode="decimal"></div>` : ''}
      <div class="frow"><div class="flbl">繳款狀況</div><select class="fi" id="${id}_status"><option value="normal">正常</option><option value="overdue">遲繳</option></select></div>
    </div>
    <div class="frow"><div class="flbl">機構名稱</div><input class="fi" id="${id}_inst" placeholder="${cfg.placeholder_inst}"></div>
  `;
  list.appendChild(div);
}

function collectLoans(leadId) {
  const loans = [];
  const typeMap = { credit:'credit', car:'car_new', bike:'bike', phone:'phone', pawn:'pawn' };
  const instTypeMap = { credit:'bank', car:'finance', bike:'finance', phone:'finance', pawn:'civil' };
  Object.keys(loanCounters).forEach(type => {
    for (let i = 1; i <= loanCounters[type]; i++) {
      const id = `${type}_${i}`;
      const el = document.getElementById(`row_${id}`);
      if (!el) continue;
      const amt = parseInt(document.getElementById(`${id}_amt`)?.value) || 0;
      if (amt <= 0) continue;
      const loan = {
        lead_id: leadId,
        loan_type: typeMap[type],
        institution_type: instTypeMap[type],
        institution_name: document.getElementById(`${id}_inst`)?.value || '',
        balance: amt,
        monthly_payment: parseInt(document.getElementById(`${id}_pay`)?.value) || 0,
        payment_status: document.getElementById(`${id}_status`)?.value || 'normal',
      };
      const penEl = document.getElementById(`${id}_penalty`);
      if (penEl) loan.penalty_fee = parseInt(penEl.value) || 0;
      loans.push(loan);
    }
  });
  // 不動產
  [['property_1st','bank','n-prop1'],['property_2nd','bank','n-prop2'],['property_3rd','civil','n-prop3']].forEach(([ltype,itype,pre])=>{
    const amt = parseInt(document.getElementById(`${pre}-amt`)?.value)||0;
    if (amt>0) loans.push({ lead_id:leadId, loan_type:ltype, institution_type:itype, institution_name:document.getElementById(`${pre}-inst`)?.value||'', balance:amt, monthly_payment:parseInt(document.getElementById(`${pre}-pay`)?.value)||0, penalty_fee:parseInt(document.getElementById(`${pre}-penalty`)?.value)||0 });
  });
  return loans;
}

async function saveLead() {
  const name = getVal('n-name').trim();
  if (!name) { document.getElementById('add-err').textContent = '請填寫客戶姓名'; document.getElementById('add-err').style.display = 'block'; return; }
  document.getElementById('add-err').style.display = 'none';
  showLoading('儲存中…');

  const hasProp = getVal('n-property') === 'true';
  const propVal = parseInt(document.getElementById('n-prop-val')?.value)||0;
  const prop1 = parseInt(document.getElementById('n-prop1-amt')?.value)||0;
  const prop2 = parseInt(document.getElementById('n-prop2-amt')?.value)||0;
  const prop3 = parseInt(document.getElementById('n-prop3-amt')?.value)||0;
  const totalPropDebt = prop1+prop2+prop3;
  const propRatio = hasProp && propVal>0 ? parseFloat((totalPropDebt/propVal*100).toFixed(1)) : null;

  const payload = {
    member_id: currentUser.id, name,
    age: parseInt(getVal('n-age'))||null,
    work_type: getVal('n-work'), alert_status: getVal('n-alert'),
    address: getVal('n-addr'), huji_address: getVal('n-huji'),
    required_amount: parseInt(getVal('n-amount'))||null,
    fund_purpose: getVal('n-purpose'),
    monthly_salary: parseInt(getVal('n-salary'))||null,
    has_salary_transfer: getVal('n-transfer')==='true',
    labor_insurance_years: getVal('n-labor'), credit_card_age: getVal('n-cc'),
    has_car_license: getVal('n-car-lic')==='true', has_bike_license: getVal('n-bike-lic')==='true',
    has_property: hasProp, has_collateral: getVal('n-collateral')==='true',
    bank_recent_reject: getVal('n-bank-rej'), finance_recent_reject: getVal('n-fin-rej'),
    advisor_note: getVal('n-note'), status: 'new',
    property_ratio: propRatio, property_valuation: hasProp?propVal:null,
    property_loan1: prop1||null, property_loan2: prop2||null, property_loan3: prop3||null,
  };

  const { data, error } = await sb.from('leads').insert(payload).select().single();
  if (error) { hideLoading(); document.getElementById('add-err').textContent = '儲存失敗：'+error.message; document.getElementById('add-err').style.display='block'; return; }

  const loans = collectLoans(data.id);
  if (loans.length>0) await sb.from('lead_loans').insert(loans);

  // 重置計數器
  loanCounters = { credit:0, car:0, bike:0, phone:0, pawn:0 };
  hideLoading();
  leads.unshift(data);
  showLeadDetail(data.id);
}

async function updateStatus(id, status) {
  await sb.from('leads').update({ status }).eq('id', id);
  const lead = leads.find(l => l.id === id);
  if (lead) lead.status = status;
}

async function saveNote(id) {
  const note = document.getElementById('note-'+id).value;
  await sb.from('leads').update({ advisor_note: note }).eq('id', id);

  if (lead) lead.advisor_note = note;

function showAddExpense() {

function saveExpense() {
  const icon = document.getElementById('exp-icon').value || '💳';
  const name = document.getElementById('exp-name').value.trim();
  const amount = parseInt(document.getElementById('exp-amount').value) || 0;
  const due_day = parseInt(document.getElementById('exp-day').value) || 1;
  const remind_days = parseInt(document.getElementById('exp-remind').value) || 3;
  if (!name || !amount) return;
  fixedExpenses.push({ id: Date.now(), icon, name, amount, due_day, remind_days });
  document.getElementById('add-expense-form').style.display = 'none';
  renderFinance();
}
function removeExpense(id) {
  fixedExpenses = fixedExpenses.filter(e => e.id !== id);

}
function addExtraItem(type) {
  const name = prompt(type==='income'?'額外收入項目名稱：':'臨時支出項目名稱：');
  if (!name) return;
  const amt = parseInt(prompt('金額（元）：'));

  if (type==='income') extraIncome.push({ name, amount: amt });
  else extraExpenses.push({ icon:'💳', name, amount: amt });
  renderFinance();
}

function shareToLine() {
  const url = 'https://line.me/R/share?text=' + encodeURIComponent('我在用顧問PRO做貸款評估，你也可以用我的連結試試看：' + window.location.origin + '/?ref=' + (currentMember?.invite_code || ''));
  window.open(url, '_blank');
}
function shareInviteToLine(code) {
  const url = 'https://line.me/R/share?text=' + encodeURIComponent('我的顧問PRO邀請碼是：' + code + '\n加入使用這個專業貸款評估平台：' + window.location.origin);
  window.open(url, '_blank');
}
function shareLeadLine(id) {
  const lead = leads.find(l => l.id === id);
  if (!lead) return;
  const s = calcScores(lead);
  const text = `【顧問PRO評估結果】\n客戶：${lead.name}\n銀行信貸：${s.bank}%\n汽車：${s.car}%\n機車：${s.bike}%\n需求：$${(lead.required_amount||0).toLocaleString()}\n\n顧問PRO 專業評估`;
  window.open('https://line.me/R/share?text=' + encodeURIComponent(text), '_blank');
}

function showErr(msg) {
  const e = document.getElementById('err-msg');
  if (e) { e.textContent = msg; e.style.display = 'block'; }
}
function showOk(msg) {
  const e = document.getElementById('ok-msg');
  if (e) { e.textContent = msg; e.style.display = 'block'; }
}
function clearMsgs() {
  const e = document.getElementById('err-msg');
  const o = document.getElementById('ok-msg');
  if (e) e.style.display = 'none';
  if (o) o.style.display = 'none';
}
function showLoading(txt) {
  document.getElementById('loading-text').textContent = txt || '載入中…';
  document.getElementById('loading').classList.add('show');
}
function hideLoading() {
  document.getElementById('loading').classList.remove('show');
}
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
}

function updateDistricts() {
  const city = document.getElementById('reg-city').value;
  const sel = document.getElementById('reg-district');
  sel.innerHTML = '<option value="">選擇行政區</option>';
  if (DISTRICTS[city]) {
    DISTRICTS[city].forEach(d => {
      const opt = document.createElement('option');
      opt.value = d; opt.textContent = d;
      sel.appendChild(opt);
    });
  }
}

// QR Code 功能
// ════════════════════════════════════════
function toggleQR() {
  const wrap = document.getElementById('qr-wrap');
  if (!wrap) return;
  if (wrap.style.display === 'none') {
    wrap.style.display = 'block';
    generateQR();
  } else {
    wrap.style.display = 'none';
  }
}

function generateQR() {
  const url = window.location.origin + '/app.html?ref=' + (currentMember?.invite_code || '');
  const canvas = document.getElementById('qr-canvas');
  if (!canvas) return;

  if (typeof QRCode !== 'undefined') {
    QRCode.toCanvas(canvas, url, { width:180, margin:2, color:{dark:'#1A1A1A',light:'#FFFFFF'} });
    return;
  }

  // 載入 QRCode 庫
  const script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js';
  script.onload = () => {
    QRCode.toCanvas(canvas, url, { width:180, margin:2, color:{dark:'#1A1A1A',light:'#FFFFFF'} });
  };
  script.onerror = () => {
    // 備用方案：顯示連結
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0,0,180,180);
    ctx.fillStyle = '#1A1A1A';
    ctx.font = 'bold 13px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('推廣連結：', 90, 70);
    ctx.font = '11px monospace';
    const shortUrl = url.length > 30 ? url.substring(0,30)+'...' : url;
    ctx.fillText(shortUrl, 90, 90);
  };
  document.head.appendChild(script);
}

function downloadQR() {
  const canvas = document.getElementById('qr-canvas');
  if (!canvas) return;
  const a = document.createElement('a');
  a.download = '顧問PRO_QRCode.png';
  a.href = canvas.toDataURL();
  a.click();
}
